body:
  text: 卷之二辨太陽病脈證並治中篇第二凡五十七條方三十二太陽統攝之榮衛乃風寒始入之兩途寒則傷榮故以營傷於寒而病者為中篇夫寒冬令也秋末春初以間乎冬寒則有之他時雖或暴變清冷大率不外本序之令氣耳終不得入隆冬嚴寒之例以病言之必也證候顯見如經始可謂為傷寒不可少有分毫違錯蓋經之所以條例各病對比而辨論者正為與傷寒分別爭差也讀者極力反復精究其旨久久成熟一旦貫通則認病自然親切而於凡異說之紛紜者皆不為其所惑矣慎哉一太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒或未定之詞寒為陰陰不熱以其著人而客於人之陽經鬱而與陽爭爭則蒸而為熱已發熱者時之所至郁爭而蒸也未發熱者始初之時鬱而未爭也必定然之詞惡寒見上篇然此以寒邪郁榮故榮病而分見惡寒曰必者言發熱早晚不一而惡寒則必定即見也體痛者寒主堅凝而傷榮則榮實而強衛虛而弱矣榮強則血澀衛弱則氣滯故痛也嘔吐也逆俗謂噁心是也胃口畏寒而寒湧也陰謂關後陽謂關前俱緊三關通度而急疾寒性強徑而然也難經曰傷寒之脈陰陽俱盛而緊澀是也傷猶中也彼此兩相更互發明言太陽之為病中風固如彼矣若或有如此者則又是觸犯於寒而中之也然陰寒之襲人從榮而入榮血道也寒之所以從榮入者榮亦陰亦從類也猶龍虎之於風雲水火之於燥濕各以其類而相從之自然也此揭太陽分病之紀二乃此篇之小總下條乃申此而互言之詳其義以出其治余皆此條之差分耳首尾脈絡綱領條目大端悉類上篇乃上篇之對待太陽之太三辨上篇一此其二以下凡首稱傷寒者則又皆指有此云云之謂也二太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之麻黃湯方麻黃三兩去節桂枝二兩去皮甘草一兩炙杏仁七十個湯浸去皮尖上四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥余如桂枝法將息此申上條而更互言之所以致其詳而出其治也頭痛已見太陽病而此猶出者以其專太陽而主始病也上條先言或已發熱或未發熱而此先言頭痛次言發熱者則是以其已發熱者言也身疼腰痛骨節疼痛即上條之體痛而詳言之也上條言必惡寒而此言惡風者乃更互言之與上篇嗇嗇惡寒淅淅惡風雙關互文之意同無汗乃對上篇之有汗而言以見彼此兩相反所以為風寒之辨別不然無是證者則不言也然所以無汗者汗乃血之液血為榮榮強則腠理閉密雖熱汗不出也喘氣逆也衛主氣衛弱則氣乏逆呼吸不利而聲息所以不遂也然上條言嘔而此言喘嘔與喘皆氣逆亦互言以明互見之意麻黃味苦而性溫力能發汗以散寒然桂枝湯中忌麻黃而麻黃湯中用桂枝何也曰麻黃者突陳擒敵之大將也桂枝者運籌帷幄之參軍也故委之以麻黃必勝之算也監之以桂枝節制之妙也甘草和中而除熱杏仁下氣而定喘惟麻黃有專功之能故不須啜粥之助三傷寒一日太陽受之脈若靜者為不傳頗欲吐若燥煩脈數急者為傳也傷寒者以上二條互言者而言也下仿此一日太陽受之太陽主表而屬外故外者先當也靜謂恬退而和平也緊退恬靜和平其為不傳而欲愈可診矣頗欲吐屬上言不甚待吐而不吐蓋嘔逆未全止也燥干也數五六至已上也其主熱急躁疾也欲傳而加進可知也四傷寒二三日陽明少陽證不見者為不傳也見音現上條舉太陽而以脈言此復舉陽明少陽而以證言次第反復互相發明也然不傳有二一則不傳而遂自愈一則不傳而猶或不解若陽明少陽雖不見太陽亦不解則始終太陽者有之余經同推要皆以脈證所見為準若只蒙龍拘拘數日以論經則去道遠矣五脈浮者病在表可發汗宜麻黃湯表太陽也傷寒脈本緊不緊而浮則邪見還表而欲散可知矣發拓而出之也麻黃湯者乘其欲散而拓出之之謂也方見前六脈浮而數者可發汗宜麻黃湯浮與上同而此多數數者傷寒之欲傳也可發汗而宜麻黃湯者言乘寒邪有向表之浮當散其數而不令其至於傳也七脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈此承上條復以其治不如法因而致變者言曉人當知謹也身重下後陰虛而倦怠也悸屬心心主血陰虛則血虛所以心不寧也蓋不當下而反下之故證變如此不可汗者禁勿重亡津液以復損其陰也當自汗出乃解者言下雖反而病未甚變須待其津液回當得自汗而解也所以然者以下乃申釋上文之詞裡虛以亡津液言須表裡實以待津液回邪還表言也八傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯主之更平聲傷寒發汗者服麻黃湯以發之之謂也解散也復重復也既解而已過半日之久矣何事而復哉言發汗不如法汗後不謹重新又有所復中也蓋汗出過多則腠理反開護養不謹邪風又得易入所以新又煩熱而脈轉浮數故曰可更發汗更改也言當改前法故曰宜桂枝湯桂枝湯者中風解肌之法微哉旨也庸俗不省病加小愈之義不遵約制自肆粗下不喻汗法微似之旨騁以大汗為務病致變矣反謂為邪不盡汗而又汗輾轉增劇卒致莫救不知悔悟噫讀書不喻旨趙括鑑矣學醫廢人命伊誰鑑邪傷哉九發汗已脈浮數煩渴者五苓散主之已言發汗畢非謂病罷也浮數煩與上同而此多渴渴者亡津液而內燥里證也以證有里而人燥渴故用四苓以滋之以表在而脈浮數故憑一桂以和之謂五苓散能兩解表裡者此也方見上篇十傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之茯苓甘草湯方茯苓二兩桂枝二兩去皮生薑三兩切甘草一兩上四味以水四升煮取二升去滓分溫三服傷寒不汗出汗出者以發之而出者言也然則此條二節上節乃承上條而以其不煩者再言下節乃承上節而以其更不渴者又出也不煩則熱較輕可知故治亦不殊不渴則內燥更減可識故但用四苓之一以潤之然里證既輕則表為猶多可必故須桂枝之三以解之然則此湯之四物其桂枝五苓二方之變制與十一傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之生薑瀉心湯方生薑四兩切甘草三兩炙人參三兩乾薑一兩黃芩三兩半夏半升洗黃連一兩大棗十二枚擘上八味以水一斗煮取六升去滓再煎取三升溫服一升日三服噫影戒切解謂大邪退散也胃為中土溫潤則和不和者汗後亡津液邪乍退散正未全復而尚弱也痞硬伏飲摶膈也噫飽食息也食臭毈氣也平人過飽傷食則噫食臭病人初瘥脾胃尚弱化輸未強雖無過飽猶之過飽而然也水氣亦謂飲也雷鳴者脾為陰胃為陽陰陽不和薄動之聲也下利者惟陰陽之不和則水穀不分清所以雜迸而走注也生薑大棗益胃而健脾黃芩黃連清上而堅下半夏乾薑蠲飲以散痞人參甘草益氣而和中然則瀉心者健其脾而脾輸益其胃而胃化斯所以為瀉去其心下痞硬之謂也十二發汗病不解反惡寒者虛故也芍藥甘草附子湯主之芍藥甘草附子湯方芍藥三兩甘草三兩炙附子一枚炮去皮破八片以上三味以水五升煮取一升五合去滓分溫三服未汗而惡寒邪盛而表實仇讎之惡也已汗而惡寒邪退而表虛怯懦之惡也蓋汗出之後大邪退散榮氣衰微衛氣疏慢病雖未盡解不他變而但惡寒故曰虛言表氣新虛而非病變也然榮者陰也陰氣衰微故用芍藥之酸以收之衛者陽也陽氣疏慢故用附子之辛以固之甘草甘平合榮衛而和諧之乃國老之所長也十三發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯上節乃略上條而復言所以起下文而以其反者出也不惡寒其人表氣強也但熱亡津液而胃中干故曰實也當和胃氣以干在胃而實也故曰與調胃承氣湯然湯以瀉實而甘草則和中益氣何也蓋實成於虛也所謂量鑿而正枘其斯之謂與方見大陽下十四發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之桂枝新加湯方桂枝三兩去皮芍藥四兩甘草二兩炙人參三兩生薑四兩切大棗十二枚擘上六味以水一斗一升微火煮取三升去滓分溫服如桂枝法發汗後身疼痛脈沉遲者邪氣驟去血氣暴虛也用桂枝者和其榮衛不令暴虛易得重傷也加人參芍藥者收復其陰陽以益其虛也加生薑者健其乍回之胃以安其谷也曰新加者得非足一百一十三而成之之謂邪微火皆當仿效首方此蓋後人之贅耳十五發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之麻黃杏仁甘草石膏湯方麻黃四兩去節杏仁五十個去皮尖甘草二兩炙石膏半斤碎綿裹上四味以水七升先煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升更行猶言再用不可再用桂枝湯則是已經用過所以禁止也蓋傷寒當發汗不當用桂枝桂枝固衛寒不得泄而氣轉上逆所以喘益甚也無大熱者鬱伏而不顯見也以傷寒之表猶在故用麻黃以發之杏仁下氣定喘甘草退熱和中本麻黃正治之佐使也石膏有徹熱之功尤能助下喘之用故易桂枝以石膏為麻黃湯之變制而太陽傷寒誤汗轉喘之主治所以必四物者而後可行也十六發汗後飲水多者必喘以水灌之亦喘喘屬肺肺屬金金性寒故曰形寒飲冷則傷肺汗後肺氣新虛易得重傷飲水飲冷也水灌則形寒肺傷矣其主氣所以皆喘也十七發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之桂枝甘草湯方桂枝四兩去皮甘草二兩炙上二味以水三升煮取一升去滓頓服汗多則血傷血傷則心虛心虛則動惕而悸故叉手自冒覆而欲得人接也桂枝走陰斂液宅心能固疏慢之表甘草緩脾和中益氣能調不足之陽然則二物之為方收陰補陽之為用也十八發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之茯苓桂枝甘草大棗湯方茯苓半斤桂枝四兩去皮甘草二兩炙大棗十五枚擘上四味以甘瀾水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水二斗置大盆內以勺揚之水上有珠子五六千顆相逐取用之臍下悸者腎乘心汗後液虛欲上凌心而克之故動惕於臍下也欲作待作未作之謂奔豚見上篇然水停心下則悸茯苓淡滲勝水能伐腎臟之淫邪桂枝走陰降腎能御奔豚於未至甘草益氣能補汗後之陽虛大棗和土能製為邪之腎水甘瀾水者操之而使其性抵於純不令其得以助黨而長禍也十九發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之厚朴生薑甘草半夏人參湯方厚朴半斤去皮炙生薑半斤切半夏半升洗人參一兩甘草二兩炙上五味以水一斗煮取三升去滓溫服一升日三服汗後腹脹滿者胃中干陽虛氣滯而伏飲停蓄也人參甘草之甘益胃而滋干生薑半夏之辛蠲飲而散滿然脹非苦不泄所以厚朴者君四物而主治也二十傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之甘草瀉心湯方甘草四兩炙黃芩三兩黃連一兩乾薑三兩半夏半升洗大棗十二枚擘上六味以水一斗煮取六升去滓再煎取三升溫服一升日三傷寒中風言傷寒與中風皆有此變證大意與上篇第六十條同醫反下之至心下痞硬而滿大略與上篇第三十五條同此多既誤而復誤不得安以上前誤成痞也醫見至益甚言復誤而痞加重也此非結熱至末乃原致痞之因以出其治也甘草大棗之甘益反下之虛乾薑半夏之辛散上逆之滿黃芩黃連之苦解邪熱之煩然證大略與上篇第三十五條同而方物有同有異者不用桂枝以無表也同用甘草乾姜同為益虛而散硬也不用參朮惡益氣也用大棗取滋干也以既誤復誤而痞益甚故用芩連以為乾薑之反佐協同半夏以主散此其所以有異同之分焉二十一傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便赤石脂禹餘糧湯方赤石脂一斤碎禹餘糧一斤碎以上二味以水六升煮取二升去滓分三服服瀉心湯已以上承上條而再言之也復以他藥下之利不止言再治之不對醫以理中與之利益甚言愈誤也理中者以下乃明其誤而出其治難經曰中焦者在胃中脘主腐熟水穀下焦者當膀胱上口主分別清濁主出而不內以傳道也靈樞曰水穀者常並居於胃中成糟粕而俱下於大小腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉然則利在下焦者膀胱不滲而大腸滑脫也禹餘糧甘平消痞硬而鎮定其臟腑赤石脂甘溫固腸虛而收其滑脫然收滑脫矣而利仍不止者膀胱不滲而水穀不分也利小便者導其水而分清之使腑司各行其所有事也腑司各行其所有事則利無餘治而愈可必矣二十二傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯表非病初之表下復發汗言疏緩其表之表也解猶救也如解渴解急之類是也解表與發表不同傷寒病初之表當發故用麻黃湯此以汗後之表當解故曰宜桂枝湯言與中風之表同當解肌而固衛也桂枝湯方見上篇攻痞方說見下篇二十三傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯清穀不止身疼痛者下後胃傷裡虛寒甚飲食不腐化而水穀不分亡津液而骨屬不利也救護也利甚身疼痛而急當救護其里者下后里虛為重也清便自調言小便清而大便調也小便清大便調裡氣和矣裡氣和而身疼痛者衛不外固而不與榮和也急當救護其表者不令重虛之表又易得重傷也救里宜四逆湯者復陽而收陰也救表宜桂枝湯者固衛以和榮也此救表救里之所以各有其急也四逆湯方見下篇桂枝湯方同上二十四傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之旋覆代赭石湯方旋覆花三兩人參二兩生薑五兩切代赭石一兩半夏半升洗甘草三兩炙大棗十二枚擘上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服解謂大邪已散也心下痞硬噫氣不除者正氣未復胃氣尚弱而伏飲為逆也旋覆半夏蠲飲以消痞硬人參甘草養正以益新虛代赭以鎮墜其噫氣薑棗以調和其脾胃然則七物者養正散餘邪之要用也二十五傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之柴胡加龍骨牡蠣湯方柴胡四兩半夏二合洗龍骨一兩半牡蠣一兩半煅人參一兩半茯苓一兩半鉛丹一兩半桂枝一兩半去皮生薑一兩半切大黃二兩大棗六枚擘上十一味以水八升煮取四升內大黃切如棋子更煮一二沸去滓溫服一升胸滿者下后里虛外熱入里挾飲而上摶於膈所以煩也驚屬心心藏神而居膈正虛邪勝所以不寧也一身盡重不可轉側者傷寒本一身疼痛亡津液而血澀不利故變沉滯而重甚也夫以心虛則驚也故用人參茯苓之甘淡入心以益其虛龍骨牡蠣鉛丹之重澀斂心以鎮其驚半夏辛溫以散胸膈之滿柴胡苦寒以除鬱熱之煩亡津液而小便不利參苓足以潤之胃中燥而譫語薑棗有以調也滿在膈中半夏開之非大黃不能滌重在一身人參滋之非桂枝不能和然是證也雖無三陽之明文而於是湯也總三陽以和之之治可徵也二十六下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之前第十五條發汗後不可更行桂枝湯云云與此止差下字余皆同夫以汗下不同而治同者汗與下雖殊其為反誤而致變喘則一惟其喘一所以同歸於一治也然以上篇第四十條誤汗變喘用桂枝厚朴杏子湯而觀之則此汗下後不可更用桂枝湯可知矣通考則義全二十七傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之梔子厚朴湯方梔子十四枚擘厚朴四兩姜炙枳實四兩湯浸去穰炒以上三味以水三升半煮取一升半去滓分三服溫進一服得吐止後服凡下而致變者皆誤也心煩者外邪入里摶膈而鬱悶也腹滿者虛邪壅胃彭亨而不散也臥屬陰腹滿者陰滯也起屬陽心煩者陽郁也所以皆不安寧也梔子苦寒快湧心胸之煩厚朴枳實主泄胃腹之滿所以三物者能安誤下後之不安也二十八傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之梔子乾薑湯方梔子十四枚擘乾薑二兩上二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服丸藥誤用不惟病變而且毒遺誤於大下不獨亡陰而陽亦損所以身熱不去而微煩也梔子酸苦湧內熱而除煩乾薑辛熱散遺毒而益氣吐能散滯辛能復陽此之謂也二十九傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之梔子豉湯方梔子十四枚擘香豉四合綿裹上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服得吐者止後服此條結痛比上條微煩則較重一證而爭差分也前以差輕故散之以乾薑此以差重故解之以香豉蓋香豉能主傷寒寒熱惡毒煩躁滿悶然則二條者大同小異之分也三十發汗若下之而煩熱胸中窒者梔子豉湯主之此條亦與上同窒者邪熱壅滯而窒塞未至於痛而比痛較輕也心居胸膈所以同為一治三十一發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之虛煩不得眠者大邪乍退正氣暴虛餘熱悶亂胃中干而不和也劇極也反覆顛倒心中懊憹者胸膈壅滯不得舒快也所以用梔子豉高者因而越之之法也若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之梔子甘草豉湯方於梔子豉湯方內加入甘草二兩余依前法得吐止後服梔子生薑豉湯方於梔子豉湯方內加生薑五兩余依前法得吐止後服少氣者氣傷也故加甘草以益之嘔者氣逆也故加生薑以散之三十二凡用梔子湯病人舊微溏者不可與服之梔子酸苦大寒而湧泄病人舊微溏者裡氣本虛而臟腑寒也裡氣虛則易湧臟腑寒則易泄故揭示禁止如此三十三下之後復發汗必振寒脈微細所以然者以內外俱虛故也內謂反下則亡陰而裡虛所以脈微細也外謂復汗則亡陽而表虛所以振寒也三十四下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之乾薑附子湯方乾薑一兩附子一枚去皮生用破八片上二味以水三升煮取一升去滓頓服反下亡陰陰既虛矣又復發汗以亡其陽則陽之虛比之陰為尤甚然陽用事於晝熱之煩陽之亢也躁雖陰陽之擾也不得眠者陽不能勝陰而爭奪於陰也陰用事於夜安靜者無陽事也不嘔不渴無表證脈沉微身無大熱則陽大虛不足以勝陰為諦矣故用乾薑附子偏於辛熱以為湯者恢復重虛之陽而求以協和於偏勝之陰也三十五傷寒若吐若下後心中逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之茯苓桂枝白朮甘草湯方茯苓四兩桂枝三兩去皮白朮二兩甘草二兩炙上四味以水六升煮取三升去滓分溫三服心下逆滿伏飲上溢摶實於膈也氣上衝胸寒邪上湧挾飲為逆也動經傷動經脈振振奮動也蓋人之經脈賴津液以滋養飲之為飲津液類也靜則為養動則為病病宜制勝之不宜發汗既吐下後脈又沉緊而復發汗則重亡津液氣血衰耗故變如此術與茯苓勝濕導飲桂枝甘草固表和中故發汗動經所需者四物也三十六傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿此申上條而復言失於不治則致廢之意上條脈沉緊以未發汗言也此條脈甚微以已發汗言也經脈動即動經之變文惕即振振搖也大抵兩相更互發明之詞久言既經八九日若猶不得解而更失於不治則津液內亡濕淫外漬必致痹而成痿痿者兩足痿軟而不相及也三十七太陽傷寒者加溫針必驚也溫針者針用必先燒溫以去其寒性也驚者心有所動而惶懼也蓋心乃神之舍故謂心藏神榮氣通於心故榮與心皆主血寒邪傷於榮鬱而蒸熱矣溫針以攻寒火之性大熱血得熱則耗耗則虛血虛則心虛心虛則舍空舍空則神無所依而氣浮越於外故失守而驚惶也三十八傷寒二三日心中悸而煩者小建中湯主之小建中湯方桂枝三兩去皮芍藥六兩甘草二兩炙生薑三兩切膠飴一升大棗十二枚擘上六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也二三日當傳之時不傳不變但心中悸而煩者邪雖衰微正亦虛弱不足以退散之所以持也小建中者桂枝湯倍芍藥而加膠飴也桂枝湯扶陽而固衛衛固則榮和倍芍藥者酸以收陰陰收則陽歸附也加膠飴者甘以潤土土潤則萬物生也建定法也定法惟中不偏不黨王道蕩蕩其斯之謂乎三十九傷寒脈結代心動悸炙甘草湯主之甘草四兩炙生薑三兩切桂枝三兩去皮麥門冬半升麻子仁半升大棗十二枚擘人參二兩生地黃一斤阿膠二兩上九味以清酒七升水八升先煮八味取三升去滓內膠煬消盡溫服一升日三服一名復脈湯脈結代而心動悸者虛多實少譬如寇欲退散主弱不能遣發而反自倣徨也人參甘草麥冬益虛以復結代之脈地黃阿膠麻仁生血以寧動悸之心桂枝和榮衛以救實薑棗健脾胃以調中清酒為長血氣之助復脈乃核實義之名然則是湯也必欲使虛者加進而馴至於實則實者自退散而還復於元之意也本條結代下文無代而有代陰中間疑漏代一節脈按之來緩而時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治結陰也下當有代脈一股此承結代而推言結陰代陰以各皆詳辨其狀與辨脈下第四章意同四十傷寒八九日風濕相摶身體疼煩不能自轉側不嘔不渴脈浮虛而澀者與桂枝附子湯主之桂枝附子湯方桂枝四兩去皮附子三枚炮去皮破八片生薑三兩切甘草二兩炙大棗十二枚擘上五味以水六升煮取二升去滓分溫三服風濕相摶見上篇此以得之寒因故身體疼煩不嘔不渴也不能自轉側者濕主重著也浮風也虛則汗後之不足澀濕也與上篇小異而大同桂枝附子湯者即上篇之甘草附子湯以薑棗易術之變制也去朮者以寒本無汗不似風之自汗而濕多也用薑棗者以寒屬陰不如風陽之能食也然去彼取此雖少殊而其所以為散風除濕則均耳若其人大便硬小便自利者去桂枝加白朮湯主之脈經末句湯名無白字桂枝附子去桂枝加白朮湯方於桂枝附子湯方內去桂枝加朮三兩余依前法大便硬裡實矣故去桂枝惡其主表而不知里也小便自利濕勝也故加朮以其益土而能燥濕也此加減舊缺今補四十一太陽病項背強𠘧𠘧無汗惡風者葛根湯主之葛根湯方葛根四兩麻黃三兩去節桂枝二兩去皮芍藥二兩甘草二兩炙生薑三兩切大棗十二枚擘上七味㕮咀以水一斗先煮麻黃葛根減二升去沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌太陽病項背強𠘧𠘧與上篇同者風寒過太陽之榮衛初交陽明之經絡經絡同所以風寒皆然也無汗者以起自傷寒故汗不出乃上篇有汗之反對風寒之辨別也惡風乃惡寒之互文風寒皆通惡而不偏有無也夫以太陽中風項背強𠘧𠘧汗出惡風用桂枝加葛根而論之則此太陽傷寒項背強𠘧𠘧無汗惡風當用麻黃加葛根而用葛根湯者何哉蓋𠘧𠘧乃加陽明之時喘已不作故去杏仁不用麻黃湯之全方不可以麻黃加為名而用麻黃桂枝甘草葛根以為湯者實則是麻黃加之規制也用薑棗芍藥者以陽明屬胃胃為中宮薑棗皆和中之物芍藥有緩中之義也不須啜粥麻黃類例也四十二太陽與陽明合病喘而胸滿者不可下麻黃湯主之合病見上篇肺主氣氣逆則喘喘甚則肺脹胸滿者肺脹也胸乃陽明之部分喘乃太陽傷寒之本病以喘不除甚而至於胸滿故曰合病然肺不屬太陽陽明而太陽陽明合病之傷寒病全在肺何也曰肺為五臟之華蓋內受諸經百脈之朝會其臟金其性寒寒邪湊於榮肺以寒召寒類應故也不可下者喘來自太陽之初滿惟在胸不在胃也夫麻黃湯者主治太陽傷寒之初病有陽明何以獨從太陽之主治也曰麻黃固善於散寒其功尤能瀉肺家之實滿杏仁惟其利於下氣故其效則更長於定喘桂枝雖佐其實有綱維之妙甘草雖使其才有和緩之高是故太陽表之治行則陽明胸之功自奏矣四十三太陽與陽明合病者必自下利葛根湯主之必定然之詞自謂自然而然也蓋太陽者膀胱也膀胱主水陽明者胃經也胃主谷寒為陰陰氣主下降故傷寒無他故自然而然下利者太陽陽明合病經中之邪熱甚胃氣弱不化谷不分清雜迸而走注所以謂之必也以必定自然而然下利故但用葛根湯散經中之寒邪而以不治治利以不治治利者麻黃散太陽之表葛根解陽明之肌桂枝主榮衛之和薑棗健脾之弱甘草者和中之國老芍藥者緩中而佐使夫如是而經中之邪散則胃中之正回不分清者自分清不顯治者而治在其中矣噫王者不治夷狄而夷狄治聖人無為而無不為所謂仁之盡義之至吾於是乎重有感焉彼以煦煦為仁孑孑為義竊聖人之王道以亂名實者謂不自欺以欺人公孫龍不能為之說也悲哉四十四二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也轉與傳同見第五問並病見上篇太陽初得病時至不惡寒是原致並之因若太陽證不罷至解之熏之是言治之之次第若發汗不徹至末是反復申上文之詳徹除也去也不徹言汗發不如法病不除去也越散也言怫鬱不散也澀為血虛血虛者汗出過多也所以轉陽明也四十五傷寒六七日結胸熱實脈沉緊心下痛按之石硬者大陷胸湯主之沉為里緊為寒結胸故心下痛熱實故石硬方見上篇蓋證同也四十六小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之小陷胸湯方黃連一兩半夏半升洗栝蔞實一枚大者上三味以水六升先煮栝蔞取三升去滓內諸藥煮取二升去滓分溫三服正在心下言不似大結胸之高而在上也按之則痛言比不按亦痛則較輕也浮則淺於沉滑則緩於緊此結胸之所以有大小之分也黃連苦寒以泄熱也半夏辛溫以散結也栝蔞實苦而潤苦以益苦則致熱於易泄為可知潤以濟辛則散結於無難開可必所謂有兼人之勇而居上功者惟此物為然也四十七傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之水即飲也以不實硬故曰水結胸脅亦裡也以熱結不高故曰在裡此條兩節上節以往來寒熱故用大柴胡湯下節以水結無大熱故用大陷胸湯然熱結與水結胸脅與里皆互詞大同小異皆下法也二方俱見上篇四十八太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之黃芩湯方黃芩三兩甘草二兩炙芍藥二兩大棗十二枚擘上四味以水一斗煮取三升去滓溫服一升日再夜一服黃芩加半夏生薑湯方於黃芩湯方內加半夏半升生薑三兩余依黃芩湯法陽明間太少而中居太少病陽明獨能逃其中乎是故芍藥利太陽膀胱而去水緩中黃芩除少陽寒熱而主腸胃不利大棗益胃甘草和中是則四物之為湯非合三家而和調一氣乎然氣一也下奪則利上逆則嘔半夏逐水散逆生薑嘔家聖藥加所當加無如二物四十九傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之柴胡加桂枝湯方柴胡四兩桂枝一兩半去皮人參一兩半甘草一兩炙半夏二合半洗黃芩一兩半芍藥一兩半生薑一兩半切大棗六枚擘上九味以水七升煮取三升去滓分溫三服支節四肢百節也支結言支飲摶聚而結也發熱至微嘔太陽之表也故曰外證未去以微而未去也故加桂枝以解之支結屬少陽以結則難開也故用柴胡為主治然則是證也雖無太少之明文而於太少之治以究之則亦因藥可以知病矣五十傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之身熱惡風太陽表也頸項強有陽明也脅下滿少陽也然則三陽俱見病矣手足溫而渴者邪湊半表半裡而里證見也夫以三陽俱見病而獨從少陽之小柴胡以為治者太陽陽明之邪微少陽近里而里證見故從少陽一於和而三善則皆得也五十一傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不瘥者與小柴胡湯主之陽主氣澀主痛陰主血弦主急投以小建中者求之於益陰而和陽也不瘥則不對可知矣小柴胡者少陽之主治也蓋少陽屬木其脈弦木盛則土受制故澀而急痛也然則是治也者伐木以救土之謂也五十二傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之柴胡桂枝幹薑湯方柴胡半斤桂枝三兩去皮乾薑三兩栝蔞根四兩黃芩三兩牡蠣三兩熬甘草二兩炙上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩後服汗出便愈胸太陽陽明也脅少陽也小便不利太陽之膀胱不清也渴而不嘔陽明之胃熱而氣不逆也頭汗出者三陽之邪熱甚於上而氣不下行也往來寒熱心煩者少陽半表半裡之邪出入不常也柴胡黃芩主除往來之寒熱桂枝甘草和解未罷之表邪牡蠣乾薑咸以軟其結辛以散其滿栝蔞根者苦以滋其渴涼以散其熱是湯也亦三陽平解之一法也五十三太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯脈浮細而嗜臥者大邪已退血氣乍虛而肢體倦怠也胸滿脅痛則少陽未除故與小柴胡以和之脈但浮則邪還表故與麻黃湯以發之五十四傷寒十三日胸脅滿而嘔日哺所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯生之柴胡加芒硝湯方於小柴胡湯方內加芒硝六兩余依小柴胡湯法十三日過經也不解壞例也非其治也以上乃原其壞由於醫之誤以下至末救誤之治也然微利矣加芒硝以更下之者丸之為丸大率辛熱物雖快攻下下者藥也熱以益熱熱結反實而不出故須咸以軟之也五十五傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯半夏瀉心湯方半夏半升洗黃芩三兩乾薑三兩人參三兩黃連一兩甘草三兩炙大棗十二枚擘上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服此條上節與上篇第六十三條互相發明蓋風寒至少陽證治無差殊故更互為文而互言之以見彼此皆然也若心下滿以下二節乃復言其變以出其治結胸乃其變之重者以其重而結於胸故從大陷胸湯痞則其變之輕者以其輕而痞於心故用半夏瀉心湯半夏乾薑辛以散虛滿之痞黃芩黃連苦以泄心膈之熱人參甘草甘以益下後之虛大棗甘溫潤以滋脾胃於健曰瀉心者言滿在心膈而不在胃也五十六本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之瀉心湯者本所以治虛熱之氣痞也治痞而痞不解則非氣聚之痞可知矣渴而口燥煩小便不利者津液澀而不行伏飲停而凝聚內熱甚而水結也五苓散者潤津液而滋燥渴導水飲而蕩結熱所以又得為消痞滿之一治也五十七婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈無與毋通此與上篇末三條文少異而證同上篇言脈與如結胸狀此言晝日明瞭暮則譫語上篇言刺期門及與小柴胡湯此言無犯胃氣及上二焦皆互言以明互見之意晝屬陽明瞭者陰邪退也暮屬陰譫語者血證得陰而劇也毋者禁止之詞犯胃氣以禁下言也上二焦謂上焦中焦以禁汗吐言也蓋衛氣出上焦津液蓄於中焦汗則損衛氣而亡津液是汗則犯二焦也又上焦主受納中焦主受盛吐則納與盛俱為逆是吐則上中二焦亦俱犯也然下固損胃下焦犯矣是三法皆不可用也三法皆不可用者邪本在血室亦非三者攻之所可能及也必自愈者言伺其經行血下則邪熱得以隨血而俱出猶之紅汗而然故決言必定自解而愈以警人勿妄攻取致謬誤以生變亂之意夫以三法既皆不可用則與其欲治寧刺期門及與小柴胡湯而法在焉即此條之必自愈而觀之則上篇之期門雖不刺小柴胡湯雖不行亦皆得終當自愈從可知矣且上篇出三條而此篇一條下篇雖無出要皆欲人同推也讀者通考而參詳之則男子婦人風寒為病證治之異同大端可見矣
