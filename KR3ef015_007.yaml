body:
  text: 卷之七辨痙濕暍病證第十二此篇相傳謂為叔和述仲景金匱之文雖遠不可考觀其揭首之辭信有之也然既曰以為與傷寒相似而致辨焉則亦述所當述者是故後人稱之為仲景之徒云傷寒所致太陽痙濕暍三種宜應別論以為與傷寒相似故此見之痙見太陽上篇暍音謁下同痙見下素問諸痙項強是也濕沾潤不幹也天之雨露上濕也地之水潦下濕也人之汗液身中之濕也凡著沾潤經久不幹皆能致病傷濕之謂也暍傷暑也史記羽扇暍淮南子武王蔭暍人於樾下左擁而右扇之是也叔和之意蓋謂三者皆風寒之變證既成變證則當別為立論然自風寒變來本屬太陽猶有風寒涉似之疑須當併為辨論故揭己意而述之如下太陽病發熱脈沉而細名曰痙此揭痙之狀發熱太陽未除也沉寒也細濕也中風傷寒病猶在太陽而脈變如此者則是重感寒濕而變痙不可仍以中風傷寒稱也詳見下太陽病發汗太多因致痙此承上條復原變痙之由千金曰太陽中風重感寒濕則變痙然則發汗太多者重感寒濕而變痙之原因也蓋中風自汗傷寒發汗汗出過多衣被必濕濕勝寒生過時不更汗後新虛易於感受濕漬寒侵滲注關節所以有痙之變也不然則太陽病而發汗安得別有所謂寒濕而可以為重感哉太陽病發熱汗出不惡寒者名曰柔痙此以中風而致變言汗出不惡寒風傷衛也柔風性軟緩也太陽病發熱無汗反惡寒者名曰剛痙此以傷寒而致變言無汗反惡寒寒傷榮也剛寒性徑急也病身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙病也卒清勿切噤郡軫切此以痙之具證言身熱頭熱面赤目脈赤陽邪發於陽也足寒陰邪逆於陰也獨頭面搖者風行陽而動於上也卒忽然也噤寒而口閉也蓋口者脾之竅胃為脾之合而脈挾口環唇脾虛胃寒故忽然唇口吻合噤急而飲食不通也背反張者太陽之脈挾背故寒則筋急而拘攣熱則筋緩而縱弛也然剛柔二痙則各見證之一偏惟風寒俱有而致變者則具見也痙止此詳見痙書濕家之為病一身盡疼發熱身色如似熏黃一身盡疼者人身之土內則主脾胃外則主肌肉土惡濕濕自外入肌肉先傷也發熱濕鬱而蒸也熏黃者土本黃色濕則昏滯故黧暗而不明也濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈塞心勿切內音納此以上濕言亦風濕也身上疼痛與上條互詞面黃喘煩脈大者風為陽而陽受之也能飲食者陽能化谷所以胃和而里無病也病在頭以下申上文之意寒以濕之性言鼻氣通於天故邪獨甚而專主治也濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲則口燥煩也強上聲此以下濕言亦寒濕也但頭汗出者寒為陰陰邪客於陰陽上越而不通於下也背強欲得被覆向火者太陽之脈挾背背居北最為畏寒寒濕之陰邪注經絡滲骨髓所以筋脈牽急而惡寒甚也噦胸滿者凡在太陽下早皆然也丹田下焦也胸中上焦也熱在下而寒在上所以渴欲得水反逆而不能飲且又亡津液所以口乾燥而內作煩悗也太陽病關節疼痛而煩脈沉而細者此名濕痹之候其人小便不利大便反快但當利其小便此以濕之入里者言關節疼痛者寒濕之氣走注內滲所以脈沉而細也痹以疼痛言小便不利大便反快者濕即水甚則橫流不遵故道妄逆而暴亂也利其小便者導其遵故道而行禹之治功也病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也發熱日晡所劇者陽明主胃而屬土土主濕所以熱甚於陽明之王時也然汗出當風而為風濕則是以身中之濕言此其所以陽明王而熱則劇與久傷取冷與夏月傷於冷水之意同問曰風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也此承上條復設問答而喻治陰雨不止則濕不除所以益當發汗也然風濕本由汗出當風而得則汗之大出者必反濕轉加甚可知也微微似欲汗出而不見出則濕消而風散矣此固發汗之微機後之動輒以大汗為言者其去道奚啻尋常而已哉濕家下之額上汗出微喘小便利者死若下利不止者亦死額上汗出微喘者陽亡於上也小便利與下利不止者陰脫於下也然治濕當利其小便而以小便利主死何也誤治而陰陽散亡也濕止此太陽中熱者暍是也其人汗出惡寒身熱而渴也蒸熱謂之暑傷暑謂之暍汗出惡寒者太陽表不固也身熱者暑邪傷陽也渴者亡津液而內燥也然渴為內證太陽主表而有渴何也炎暑之時陽浮外越人之津液本少渴為常事況更汗出而重亡津液乎且太陽溫病已有渴又況暍乎太陽中暍者身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也身熱疼重而曰夏月傷冷水水行皮中所致者土主肌肉而惡濕水滲土而蒸發也脈微弱者熱則血乾而氣耗也然夏日則飲水故人之常事而曰傷何哉良由暑迫飲之過多或得之澡洗暑反內入也然則庸俗以當盛暑時濯流飲泉而得身熱疼重遽謂為閉水傷寒者水其暑之訛而傷寒則浮謠之謬也太陽中暍者發熱惡寒身重而疼痛其脈弦細而芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚數音速發熱惡寒身重而疼痛總上文具證而言下乃申其詳而致戒也弦細芤遲亦詳微弱之意小便已灑灑然毛聳者陰虛而寒內作也手足逆冷者陽熱內陷也小有勞身即熱者陽虛氣怯不勝力任之甚也口開者熱甚也故反則噤是也前板齒燥者陽明熱甚而津液干也惡寒甚者以虛其表也發熱甚者以擾其陽而損其陰也淋甚者損其陰而津液竭也言三法皆不可也然則治之奈何金匱治暍以白虎加人參湯白虎有嘯則生風之能薦涼解秋之義人參有益陽補虛之用生津止渴之功是故通寒暑而妙應神矣哉所謂方而世為萬病祖者此之謂也辨脈法上篇第十三此篇以下皆叔和述仲景之言附己意以為贊經之辭譬則翼焉傳類也篇目舊名平脈次第二而僭經右夫傳不可以先經論脈亦無先各脈而後平脈之理且平脈不過前數條冒事必如此耳後亦各脈安得直以平脈名篇皆非叔和之舊其為後人之紛更明甚是故重考訂而次序如今問曰脈有三部陰陽相乘榮衛血氣在人體躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沉夏洪察色觀脈大小不同一時之間變無經常尺寸參差或短或長上下乘錯或存或亡病輒易改進退低昂心迷意惑動失紀綱願為具陳令得分明師曰子之所問道之根源脈有三部尺寸及關參音攙差穿之切為去聲令平聲根源者言人之五臟六腑吉凶死生皆取決於脈所以為斯道之根本淵源也孫思邈曰從肘腕中橫文至掌魚際後文卻而十分之而入取九分是為尺從魚際後文卻還度取十分之一則是寸寸十分之而入取九分之中則寸口也關界尺寸之間古無定説朱子曰俗傳脈訣詞最鄙淺非叔和書明甚乃能直指高骨為關似得難經本旨然則關有定位自脈訣始滑氏曰寸為陽為上部主頭項以下至心胸之分也關為陰陽之中為中部主臍腹胠脅之分也尺為陰為下部主腰足脛股之分也此寸關尺為三部之説也榮衛流行不失衡銓榮當作營見馬氏素問注證發微素問曰榮者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下衛者水穀之悍氣也其氣慓悍滑利不能入於脈也故循皮膚之中分肉之間難經三十難曰人氣受於谷谷入於胃乃傳於五臟六腑五臟六腑皆受於氣其清者為榮濁者為衛榮行脈中衛行脈外靈樞同而紀氏云素問曰榮者水穀之精氣則清衛者水穀之悍氣則濁精氣入於脈中則濁悍氣行於脈外則清然則三經之文雖少別而其旨則同清濁之分雖殊而其為氣則一夫榮衛之為榮衛如此然三十二難又曰心者血肺者氣血為榮氣為衛榮行脈中衛在脈外行中行外雖同而榮則又以血言言心肺而不言水穀故王氏曰清者體之上也陽也火也離中之一陰降故午後一陰生即心之生血也故曰清氣為榮濁者體之下也陰也水也坎中之一陽升即腎之生氣也故曰濁氣為衛滑氏曰以用而言則清氣為榮者濁中之清者也濁氣為衛者清中之濁者也以體而言則清之用不離乎濁之體濁之用不離乎清之體故謂清氣為榮濁氣為衛亦可也謂榮濁衛清亦可也又曰統而言之則榮衛皆水穀之氣所為故悉以氣言可也析而言之則血為榮氣為沖固自有分矣是故榮行脈中衛行脈外猶水澤之於川澮風雲之於太虛也合經傳而觀之則榮衛之在人身可以性能言而不可以色象求榮行脈中衛行脈外蓋亦以其分體分用者之大端言也會其極而言之其猶氤氳之在天地與衡銓稱其喻平準也腎沉心洪肺浮肝弦此自經常不失銖分銖音殊腎為水臟水性就下故其脈循骨而沉心為火臟而合血脈故其脈洪洪猶洪水之洪大而有波瀾之謂也肺為金臟而合皮毛金得五行之清其脈故浮肝為木臟木性曲直其脈循筋而行故弦經正也常久也亦經也言平人之脈以如此合四時為正通常而可久也説文十黍之重曰銖六銖為一分蓋指脈之以三菽六菽約輕重而言也然言四臟而不言脾者脾之和平不可得見故其經常不可言欲人當自推也出入升降漏刻周旋水下二刻一周循環出而升氣之上來也入而降氣之下去也漏刻以一日一夜漏水下百刻而言也周旋以周身之流行旋轉而言也下二句乃申上文而詳言之也滑氏曰內經平人氣象論云人一呼脈再動一吸脈再動呼吸定急脈五動閏以太息命曰平人故平人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸以呼吸之數言之一日一夜凡一萬三千五百息每刻一百三十五息每二刻二百七十息脈行一十六丈二尺為一周身也積而盈之每時八刻計一千八十息脈行六十四丈八尺榮衛四周於身十二時九十六刻計一萬二千九百六十息脈行七百七十七丈六尺為四十八周身刻之餘分得五百四十息脈分行二周身得三十二丈四尺合一萬三千五百四十息總之為五十度周身脈得八百一十丈也此呼吸之息脈行之數周身之度合晝夜百刻之詳也當復寸口虛實見焉見音現滑氏曰寸口謂氣口也居手太陰魚際卻行一寸之分氣口之下曰關曰尺云者皆手太陰所歷之處而手太陰又為百脈流注朝會之始也此承上文而言脈行周身五十度又當復始於寸口所以謂之循環也虛實見下變化相乘陰陽相干風則浮虛寒則牢堅沉潛水蓄支飲急弦動則為痛數則熱煩凡脈言數皆音朔此承上文而言虛實所見之目病脈之大端也乘因也干犯也言脈之變化相因而乘由陰陽之邪相干而犯下文乃所乘所幹之目風為陽邪浮虛者陽主外也寒為陰邪牢堅者陰主內也水飲皆痰之異名以其聚於內故曰水蓄沉潛內伏也以其薄於外故曰支飲急弦外暴也浮沉牢弦皆脈名虛堅潛急非脈名也乃形容惟其浮則虛弱牢則堅強沉所以潛弦所以急之謂也動陰陽相搏而然也搏聚不散所以痛也數急疾也陽盛則數所以熱煩也設有不應知變所緣三部不同病各異端此言虛實之見固有如上文所言者然不可執一以拘設或脈與病有不如此而相應者則又當察識其別有傳變之緣故況三部所屬不同則變端亦各自有異豈所言之數者可以為一定之限哉太過可怪不及亦然邪不空見中必有姦審察表裡三焦別焉知其所舍消息診看料度臟腑獨見若神為子條記傳與賢人見音現別必列切度達各切為去聲傳如字太過不及總虛實而言也怪非常也言二者不常見見則當知其為怪異也姦傷犯也難經曰上焦在心下下膈在胃上口主內而不出其治在膻中玉堂下一寸六分直兩乳間陷者是中焦者在胃中脘不上不下主腐熟水穀其治在臍旁下焦者當膀胱上口主分別清濁主出而不內以傳道也其治在臍下一寸故名三焦舍謂病邪客止之處所也此條乃設問答以敷陳脈道之大概故為首章以發明診家入武之始事此節乃總結上文以起下條示學者當通此以達彼因略以致詳之意也師曰呼吸者脈之頭也呼者氣之出脈之來也吸者氣之入脈之去也頭頭緒也脈隨氣之出入而來去名狀雖多呼吸則其源頭也然脈有二此以尺寸之脈言若以周身言之則循環無端截不斷無頭尾之可言學者當別識脈經無吸字初持脈來疾去遲此出疾入遲名曰內虛外實也初持脈來遲去疾此出遲入疾名曰內實外虛也劉氏曰來者自骨肉之分而出於皮膚之際氣之升而上也去者自皮膚之際而還於骨肉之分氣之降而下也出呼而來也入吸而去也經曰來者為陽去者為陰此之謂也疾即上條之太過亦陽也遲即上條之不及亦陰也然則內虛外實者陰不及陽太過也內實外虛者陰太過而陽不及也然來去出入者脈之大關鍵也內外虛實者病之大綱領也知內外之陰陽而明其孰為虛孰為實者診家之切要也為此條以次首條者示學者下手功夫之急務也問曰上工望而知之中工問而知之下工脈而知之願聞其説師曰病家人來請云病人苦發熱身體疼病人自臥師到診其脈沉而遲者知其瘥也何以知之表有病者脈當浮大今脈反沉遲故知愈也沉遲屬陰故知表邪已解也假令病人云腹內卒痛病人自坐師到脈之浮而大者知其瘥也何以知之若里有病者脈當沉而遲今脈浮大故知愈也凡假令之令皆平聲卒清勿切卒痛言倉遽作痛也浮大屬陽故知里邪已散也此條上設三問下二節苦發熱身體疼腹內卒痛言問坐臥言望末決言知病於脈所以示診家三者不可缺一之意也問曰病家人來請云病人發熱煩極明日師到病人向壁臥此熱已去也設令脈不和處言已愈凡設令之令與假令之令同處言之處皆上聲明日到則病有進退可知矣故於其向壁臥則可以擬其安而熱已去也脈不和言雖未至於平靜亦無躁疾之謂也此與上條大意略同設令向壁臥聞師到不驚起而盻視若三言三止脈之咽唾者此詐病也設令脈自和處言此病大重當須服吐下藥針灸數十百處乃愈盻音系此復喻人恐足以勝詐覺人勿售欺之意盻恨視貌師持脈病人欠者無病也張口氣悟為欠然陰陽相引則欠故無病可知也脈之呻者病也呻呻吟苦聲言遲者風也舌強則言遲經絡牽急則舌強筋攣則經絡拘急肝屬木其合筋其主風搖頭者里痛也頭屬陽里屬陰頭搖者陰不與陽和也行遲者表強也表以經絡言強以拘急言坐而伏者短氣也短氣者里不足也坐而下腳者腰痛也下腳欲求伸舒之意里物護腹如懷卵物者心痛也懷卵物猶言自冒其心之謂此條八節皆望而知之之事師曰伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之若脈微弱者當喉中痛似傷非喉痹也病人云實咽中痛雖爾今復欲下利伏氣者舊有外感不即發而伏藏於經中之氣脈也今月之內欲有伏氣疑有錯誤微弱少陰之脈也少陰之脈從腎上貫肝膈入肺中循喉嚨故喉中痛也然咽痛下利皆少陰證故病人雖言實痛亦當知其欲自下利也問曰人病恐怖者其脈何狀師曰脈形如循絲纍纍然其面白脫色也恐怖惶懼也循理治也絲言細也纍纍聯絡貌脫色猶言失色也蓋內氣餒者則外色奪所以有卒然之變也問曰人不飲其脈何類師曰脈自澀唇口乾燥也血少則脈澀所以唇口乾燥然此以不飲而然非由此而不飲也問曰人愧者其脈何類師曰脈浮而面色乍白乍赤愧慚也脈浮而面色乍白乍赤者神遊不定故血氣亂而變不一也問曰經説脈有三菽六菽重者何謂也師曰脈者人以指按之如三菽之重者肺氣也如六菽之重者心氣也如九菽之重者脾氣也如十二菽之重者肝氣也按之至骨者腎氣也經難經也菽大豆也滑氏曰肺最居上主候皮毛故其脈如三菽之重心在肺下主血脈故其脈如六菽之重脾在心下主肌肉故其脈如九菽之重肝在脾下主筋故其脈如十二菽之重腎在肝下主骨故其脈按之至骨腎不言菽以類推之當如十五菽之重蓋五臟以上下之次第而居故其氣之至離皮膚有如此遠近之約摸乃越人教人如此用指著意候按而取診耳輕重以下指之法言故胡氏曰越人云菽大抵是個約摸的法見得輕重有差等非真如菽之重也然此條言氣難經言部部者一定之部位而氣在其中氣者元氣穀氣之精而部位亦在不言之表也虞氏有言假令左手寸口如三菽之重得之乃知肺氣之至如六菽之重得之知本經之至虞氏以氣推明越人言外之意如此然則此條以氣言者豈非發明難經此意於虞氏未言之先與不然既曰經説不易其部字也雖然難經有與皮毛相得者與血脈相得者與肌肉相得者與肝平者舉指來疾者五句在各起句重字下而此無之則是難經詳而此略參看則義全問曰脈有相乘有縱有橫有逆有順何也師曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也縱橫皆平聲乘猶乘舟車之乘縱直也橫者縱之對順從也逆者順之反水能剋火而乘火金能剋木而乘木乘其所勝其事易直故曰縱火受制於水而反乘水木受制於金而反乘金侮所不勝其事不直故曰橫水生於金而反乘金火生於木而反乘木子來犯母其勢悖故曰逆金能生水而乘水木能生火而乘火母之及子其勢從故曰順也上條言脈原於五臟合二五而成部位之次第乃推明脈之所以始也此條言脈具五行刑生制化之義乃五臟六腑吉凶死生之樞機脈之大要也而其所以為斯道之根源可見矣問曰脈有殘賊何謂也師曰脈有弦緊浮滑沉澀此六者名曰殘賊能為諸脈作病也殘傷也賊害也浮滑陽盛也沉澀弦緊陰盛也陽盛為太過陰盛為不及皆可怪之脈能傷害血氣者也諸脈謂各部之脈也作起也言六者若見於各部之脈中則皆能為其部生起病端如太陽之為病脈浮傷寒脈陰陽俱緊之類所謂邪不空見者此之謂也問曰脈有災怪何謂也師曰假令人病脈得太陽與形證相應因為作湯比還送湯如食頃病人乃大吐若下利腹中痛師曰我前來不見此證今乃變異是名災怪又問曰何緣作此吐利答曰或有舊時服藥今乃發作故名災怪耳此勉醫家病家當兩相敬慎庶不為災怪致生疑纍之意問曰東方肝脈其形何似師曰肝者木也名厥陰其脈微弦濡弱而長是肝脈也肝病自得濡弱者愈也凡脈言濡皆讀軟微非脈名蓋脈以有胃氣為吉微微之弦有胃氣之謂也難經曰春脈者肝也東方木也萬物之所以始生也故其氣來軟弱輕虛而滑端直以長故曰弦蓋肝主筋故其脈如此此述素難而成文素難詳而此略且多錯誤假令得純弦脈者死何以知之以其脈如弦直是肝臟傷故知死也純弦即素難所謂真肝脈至如弦直即素難所謂中外急如循刀刃責責然如按琴瑟弦如新張弓弦是也南方心脈其形何似師曰心者火也名少陰其脈洪大而長是心脈也心病自得洪大者愈也心主血脈其王在夏故其脈洪大而長應萬物盛長之象也然素難皆言心脈鉤鉤以性情言洪大而長以體勢言假令脈來微去大故名反病在裡也脈來頭小本大者故名覆病在表也上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死尿與溺同反覆鉤之反覆也此條下文脫二節錯一節在前此節亦疑多錯誤西方肺脈其形何似師曰肺者金也名太陰其脈毛浮也肺病自得此脈若得緩遲者皆愈若得數者則劇何以知之數者南方火火克西方金法當癰膿為難治也肺主皮毛上為華蓋故脈毛浮緩遲者脾土之脈也兼得緩遲為愈者肺金得土為逢生也法當癰膿者金逢火化也此下當有如上文假令云云之轉語一節疑脫落假令下利寸口關上尺中悉不見脈然尺中時一小見脈再舉頭者腎氣也若見損脈來至為難治下利屬少陰損脈自上下由肺而之腎為極故腎病見損脈為難治此上當有北方腎脈其形何似云云問答起語一節此乃其下文轉語一節也舊錯在第十一條前今移問曰二月得毛浮脈何以處言至秋當死師曰二月之時脈當濡弱反得毛浮者故知至秋死二月肝用事肝脈屬木應濡弱反得毛浮者是肺脈也肺屬金金來剋木故知至秋死他皆仿此應平聲此承上條復以四時脈氣屬五行生剋應病以主吉凶死生之理揭一以例其餘所以示人持診之要法也師曰脈肥人責浮瘦人責沉肥人當沉今反浮瘦人當浮今反沉故責之責求也肥人當沉者肌膚厚其脈深也故求其病於浮瘦人當浮者肌膚薄其脈淺也故求其病於沉褚氏曰肥人如沉而正沉者愈沉瘦人如浮而正浮者愈浮此之謂也師曰寸脈下不至關為陽絶尺脈上不至關為陰絶此皆不治決死也若計其餘命死生之期期以月節克之也寸為陽陽生於尺而動於寸故下不至關為陽絶尺為陰陰生於寸而動於尺故上不至關為陰絶言生息斷絶也余命謂未盡之天年也上期日期也下期期約也月節克之與前條二月得毛浮脈至秋死同推師曰脈病人不病名曰行尸以無王氣卒眩僕不識人者短命死人病脈不病名曰內虛以無穀神雖困無苦王去聲卒清勿切周氏曰形體之中覺見憔悴精神昏憒食不欣美而脈得四時之從無過不及之偏是人病脈不病也形體安和而脈息乍大乍小或至或損弦緊浮滑沉澀不一殘賊沖和之氣是脈息不與形相應乃脈病人不病也經曰形氣有餘脈氣不足者死行尸之謂也又曰人受氣於谷谷入於胃乃傳於五臟六腑五臟六腑皆受於氣然則內虛以無穀神者穀氣弗充之謂也問曰翕奄沉名曰滑何謂也沉為純陰翕為正陽陰陽和合故令脈滑關尺自平陽明脈微沉食飲自可少陰脈微滑滑者緊之浮名也此為陰實其人必股內汗出陰下濕也合音閣令平聲翕起而盛動於上旋覆叢聚而合也與論語始作翕如之翕同奄忽然覆也沉沒於下也純陰以其沒於下言也正陽以其盛於上言也和合言陰陽並集無偏勝也陽明胃也食飲自可言胃不病也少陰腎也微滑水沉如石之滑故謂緊之浮名也陰實言邪在腎也少陰之脈出膕內廉上股內貫脊屬腎腎主水腎為陽陽主熱陽陷入陰熱鬱而蒸發所以股內汗出而陰下濕也問曰曾為人所難緊脈從何而來師曰假令亡汗若吐以肺裡寒故令脈緊也假令咳者坐飲冷水故令脈緊也假令下利以胃中虛冷故令脈緊也難去聲此條一問三答以揭緊之為寒而有三因之不同以見脈非一途而可取之意寸口衛氣盛名曰高榮氣盛名曰章高章相搏名曰剛難經曰寸口者脈之大會手太陰之脈動也五臟六腑之所終始故去取於寸口是也高者豐隆而有充滿之貌章者文采而有潤澤之貌剛言血氣俱盛則脈有綱維之意衛氣弱名曰惵榮氣弱名曰卑惵卑相搏名曰損惵音牒惵震懼也言衛氣不足者則心常自怖卑伏下也言榮氣不足者則心常自抑損減也傷也言榮衛俱弱外不足以固護內不足以榮養則臟腑為之有所減而傷損也衛氣和名曰緩榮氣和名曰遲遲緩相搏名曰沉緩縱也言榮不與衛和而衛自和則血不足以榮筋病則四肢縱強而不能收痿類是也遲滯也言衛不與榮和而榮自和則氣乏神昏病則百體滯殢倦怠而嗜臥瘵類是也沉溺也言溺於所偏則病也寸口脈緩而遲緩則陽氣長其色鮮其顏光其聲商毛髮長遲則陰氣盛骨髓生血滿肌肉緊薄鮮硬陰陽相抱榮衛俱行剛柔相搏名曰強緩以候胃遲以候脾陽氣長者言胃氣有餘也顏色聲音毛髮皆陽也鮮麗也光輝也商清也長美也形容胃陽之有餘也陰氣盛者言脾氣充足也骨髓血肉皆陰也緊薄結也鮮硬堅也形容脾陰之充足也相抱言和洽也俱行言周流也相搏言合一也極言二氣得其和平皆由脾胃盈餘之所致如此則其人健王而強壯故曰強也趺陽脈滑而緊滑者胃氣實緊者脾氣強持實擊強痛還自傷以手把刃坐作瘡也趺陽在足跗上骨間動脈處去陷谷三寸一名會元主脾胃也滑為食故在胃則主穀氣實緊為寒故在脾則主邪氣強持實擊強言胃實脾強兩相搏擊而為病譬則以手把刃而自傷蓋謂非由別臟腑而傳變也寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆素問曰精氣奪則虛邪氣勝則實尺以候陰關閉也不得小便者陰閉於下則內者不得出也格拒也吐逆者陽拒於上則外者不得入也趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格趺陽見前主候脾胃故復言此以見與上條有相符之意脈浮而大浮為風虛大為氣強風氣相搏必成陰疹身體為癢癢者名泄風久久為痂癩痂與痂同音加素問曰外在腠理則為泄風又曰泄風之狀多汗汗出泄衣上口中乾上漬其風不能勞事身體盡痛則寒癩疥也寸口脈弱而遲弱者衛氣微遲者榮中寒榮為血血寒則發熱衛為氣氣微者心內飢飢而虛滿不能食也寒之為言虛也與貧之稱寒同虛寒發熱者血氣在人身猶水火在天地水乾則火熾也飢而虛滿者陽主化谷衛陽衰微不化谷故虛滿而不能食也趺陽脈大而緊者當即下利為難治大為虛緊為寒脾胃虛寒故主下利為難治也寸口脈弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於膈上也填音田陽氣以胃中之真氣言不足則不能化谷胃氣以胃中之穀氣言有餘言有宿食也有宿食則鬱而生熱故噫飽而吞酸此蓋以飲食之內傷者言也趺陽脈緊而浮浮為氣緊為寒浮為腹滿緊為絞痛浮緊相搏腸鳴而轉轉即氣動膈氣乃下少陰脈不出其陰腫大而虛也腹滿者胃氣虛而邪氣實也絞痛者脾家寒而邪壅滯也鳴者氣之鼓也轉則氣之運也下則氣之壅滯者極甚而反也少陰之脈循陰器而主水脈不出其陰腫大者正虛邪實水不得泄蓋趺陽之土敗而少陰所以無制也寸口脈微而澀微者衛氣不行澀者榮氣不逮榮衛不能相將三焦無所仰身體痹不仁榮氣不足則煩疼口難言衛氣虛則惡寒數欠三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消穀引食下焦不歸者則遺溲數音朔噫音隘酢與醋同衛主氣不行言不用事也榮主血不逮不及也不能相將言榮衛不相和諧不能相與也仰依賴也痹頑痹也不仁言不知痛癢不省人事也難言者心虛神短舌強而聲不出也惡寒數欠者衛疏表不固不能禦寒所以氣乏而好為欠也不歸其部言不還足其所有之分內也酢吞吞酸也吞酸則受納妨矣不能消穀引食者言不司腐熟也遺溲者言不司約制也蓋上焦主受納中焦主腐熟下焦分清濁主出而專約制此甚言榮衛不相和諧致三焦皆失其常故各廢其所司之職事如此趺陽脈沉而數沉為實數消穀緊者病難治沉以候里故在脾胃則主實穀氣實也數為熱陽也緊為寒陰也言趺陽主脾胃脾胃主谷穀氣實若脈見數而陽熱甚陽能化谷雖病不足為害若脈得緊而陰寒勝陰不化谷病為難治寸口脈微而澀微者衛氣衰澀者榮氣不足衛氣衰面色黃榮氣不足面色青榮為根衛為葉榮衛俱微則枝葉枯稿而寒栗咳逆唾腥吐涎沫也首三句與前條差衰字然衰則不行不足亦不逮更互發明者也氣為衛色本白白屬金黃土色也金生於土金無氣色不顯故土之色反見也血為榮色本赤赤屬火青木色也火生於木火無氣色不明故木色反見也榮為根者言血榮於人身之內猶木之根本也衛為葉者言氣衛於人身之外猶木之枝葉也寒栗榮不足以養而衛亦不能外固也咳逆唾腥吐涎沫者氣不利而血亦不調也趺陽脈浮而芤浮者衛氣衰芤者榮氣傷其身體瘦肌肉甲錯浮芤相搏宗氣衰微四屬斷絶芤音摳浮為風虛故曰衛氣衰芤為失血故曰榮氣傷身體瘦者衛衰而形損也肌肉甲錯者榮傷而枯坼也宗氣三焦隧氣之一也針經曰宗氣積於胸中出於喉嚨以貫心脈而行呼吸是也四皮肉肌髓也蓋三焦乃氣之道路衛氣衰而榮氣傷所以宗氣亦衰微四屬不相維而斷絶也寸口脈微而緩微者衛氣疏疏則其膚空緩者胃氣實實則谷消而水化也谷入於胃脈道乃行而入於經其血乃成榮盛則其膚必疏三焦絶經名曰血崩疏言不能固護衛主溫分肉肥腠理疏則分肉不溫腠理不肥故曰空也緩為胃氣有餘實猶言強也所以谷消而水化谷入於胃至其血乃成乃承上文而言水穀化消則胃益實而能淫精於脈以成其血而使榮盛榮盛則衛益衰故曰其膚必疏也三焦者氣之道路也經徑也絶經言血不歸經也崩山壞之名也陰血大下而曰崩者言其不能止靜與山壞之勢等也趺陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣脾胃虛寒則不化谷短氣者穀氣不充而神氣不足也以上叔和皆以寸口趺陽相間而成編者寸口為脈之大會五臟六腑之所終始趺陽主脾胃吉凶生死之樞機系焉二部為脈道之切要一也趺陽脈不出脾不上下身冷膚硬上闕一條補七卷之末脾不上下言其不能淫輸水穀之精氣以榮養於周身之上下也身冷膚硬者脾胃主肌肉胃陽不為溫而脾陰不為潤也少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥當刺期門巨闕奔氣言厥氣上奔也尸厥言厥逆若尸之不溫也蓋三焦主行呼吸反聚而呼吸不行則血結心阻遏陽氣不得上升反下陷入於陰中與陰相搏而動陰寒甚所以令人身體不仁而成尸厥也期門見太陽上篇刺之所以散心下之血結也巨闕在上脘上一寸五分刺之所以行宗氣之反聚也寸口脈微尺脈緊其人虛損多汗知陰常在絶不見陽也寸為陽微為虛陽虛則衛不固所以多汗汗多亡陽故曰絶不見陽也尺為陰緊為寒陰傷於寒則損以由陰損而病故曰知陰常在也寸口諸微亡陽諸濡亡血諸弱發熱諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無穀氣脾澀不通口急不能言戰而栗也諸猶凡也微為氣虛故曰亡陽濡為陰虛故曰亡血發熱陰虛也諸乘寒者之諸指上文四句而總言之也鬱冒不仁以下詳厥而言也無穀氣厥則飲食不通也脾統血無血故澀也口為脾之竅言心聲也心主血血不榮則筋牽急而舌強故不能言也戰而栗虛寒甚也問曰濡弱何以反適十一頭師曰五臟六腑相乘故令十一此義未詳或曰濡弱者萬物之初始莫不皆先濡弱適往也言五臟六腑相乘而往反初皆濡弱故濡弱者通該夫十一者之首事未知是否問曰何以知乘腑何以知乘臟師曰諸陽浮數為乘腑諸陰遲澀為乘臟也浮數陽也以陽部而見陽脈故知乘腑也遲澀陰也以陰部而見陰脈故知乘臟也辨脈法下篇第十四問曰脈有陰陽者何謂也答曰凡脈大浮數動滑此名陽也脈沉澀弱弦微此名陰也凡陰病見陽脈者生陽病見陰脈者死陰陽者通臟腑血氣表裡虛實風寒寒熱而總言之也大浮數動滑皆陽之性能故見則為陽氣至可知也沉澀弱弦微皆陰之體段故見則為陰氣至可診也陰病三陰之屬也見陽脈則陰消而陽長陽主生故有生之兆先見可明也陽病三陽之類也見陰脈則陽退而陰進陰主殺故應死之機已著可審也夫道不外乎陰陽萬物生於陽氣至而死於陰令行者造化之樞機固如是也人亦化中之一物焉能外陰陽而逃其生死乎聖賢為道之先覺故闡明生死神道以設教衆人囿於道昧而不能察故但醉生夢死於形器之中而不可與言神聖工巧之妙矣學者誠能竭心思以盡力乎此則脈道之大微雖千緒萬端大要此其推也問曰脈有陽結陰結者何以別之答曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反硬名曰陰結也期十四日當劇浮數能食皆陽也實謂胃家實陽以風言謂由中風而結為實硬也沉遲不能食身體重陰也硬實互文陰以寒言謂由傷寒而結為胃實也十七十四未詳問曰病有灑淅惡寒而復發熱者何答曰陰脈不足陽往從之陽脈不足陰往乘之曰何謂陽不足答曰假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也曰何謂陰不足答曰假令尺脈弱名曰陰不足陽氣下陷入陰中則發熱也陽先乎陰以陷入也故曰從諱之也陰隨於陽以上入也故曰乘傷之也惡寒者陽不足以勝陰而與陰俱化也發熱者陰不足以勝陽而從陽之化也上條明陽明內實此明太陽發熱惡寒蓋申二脈而詳言之也陽脈浮陰脈弱者則血虛血虛則筋急也筋賴血以榮血虛則筋失其所榮潤故拘攣而急也其脈沉者榮氣微也其脈浮而汗出如流珠者衛氣衰也榮氣微者加燒針則血流不行更發熱而躁煩也沉以候里榮行脈中故衰微可知浮以侯表衛行脈外汗出如流珠則表不固故衰憊可診榮氣微者以下申上文而言其失治之變流與從流下而亡反謂之流之流同行即循行周行之行也言榮本衰微則陰虛而有熱加以燒針則反助陽而損陰故血趨於流而不能循環陽得加助則益作熱而煩悗躁擾也脈靄靄如車蓋者名曰陽結也脈纍纍如循長竿者名曰陰結也靄靄團聚貌如車蓋言浮旋於上也纍纍聯絡貌如循長竿言沉直於下也脈瞥瞥如羹上肥者陽氣微也脈縈縈如蜘蛛絲者陽氣衰也脈綿綿如瀉漆之絶者亡其血也瞥音撇瞥過目暫見也羹上肥言輕浮而若有若無也縈縈猶繞繞也蜘蛛絲言柔弱而極細也成氏曰綿綿者連綿而軟也如瀉漆之絶者前大而後細也又曰陽氣前至陰氣後至則脈前為陽氣後為陰氣脈來前大後細為陽氣有餘陰氣不足是知亡血也脈來緩時一止復來者名曰結脈來數時一止復來者名曰促陽盛則促陰盛則結此皆病脈緩者遲於平而快於遲舒徐之謂也促催速也與短促不同陽行健故盛則促陰行鈍故盛則結病脈者言結促雖陰陽之劇盛猶為可治之意雖然退則吉進則主凶矣讀者不可不察陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒者此三焦傷也搏圜捏而攢聚也動見下陰陽相搏之陰陽以二氣言陽動陰動之陰陽以部位言陽動則陰隨故汗出陰動則陽應故發熱末二句不相蒙疑有脫誤若脈數見於關上上下無頭尾如豆大厥厥動搖者名曰動也此言動有定位與其形狀厥厥舉發貌陽脈浮大而濡陰脈浮大而濡陰脈與陽脈同等者名曰緩也緩有二義此以相兼言蓋謂氣血平和與前節之緩不同脈浮而緊者名曰弦也弦者狀如弓弦按之不移也脈緊者如轉索無常也此明弦緊之辨按之不移言如弦之張於弓一定而不可動移也轉索無常言左右旋轉而不可拘也脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下男子則亡血失精寒言陽氣減損而不足芤言陰血衰竭而空革言革易常度也婦人陰血充足而能化則得坤順之常半産漏下則不足以言坤之資生矣男子陽精充盛而能施則得乾健之常亡血失精則不足以言乾之資始矣天地之大德曰生男不足以言資始女不足以言資生則人道大壞故曰革也一説革讀亟變而促迫也亦通問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解也病久而脈浮者邪見還表而外向也緊為寒陰也戰邪爭也言邪雖還表而欲退以陰寒所持而人又本虛故邪得以與正爭惟爭所以戰也然脈浮矣邪外向矣故正卒勝邪卒散汗所以出而病解也問曰病有不戰而汗出解者何也答曰若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也此與上節是反對數為熱陽也陽熱勝而人又不虛則邪不能與正爭汗出邪退也不發戰正勝也此舊本皆二節而顛倒差錯各不相同今得蜀僧來本如此故從而訂之問曰病有不戰不汗出而解者何也答曰其脈自微此以曾經發汗若吐若下若亡血以內無津液此陰陽自和必自愈故不戰不汗出而解也曾經多治則邪已誤衰故脈微無津液言無作汗之邪也陰陽自和言血氣平復也風寒病解大率不外如此三者知此三者則知所以解矣問曰傷寒三日脈浮數而微病人身涼和者何意也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解者必大汗出也三日言遍三陽也浮數不傳陰也微邪氣衰也夜半陰盡陽生之時也濈然和而汗出貌能食胃回也大汗者其人虛多虛多則受邪多受邪多故汗大也問曰脈病欲知愈未愈者何以別之答曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈陰陽為和平雖劇當愈此以大概言不獨謂風寒也立夏得洪大脈是其本位其人病身體苦疼重者鬚髮其汗若明日不疼不重者不須發汗若汗濈濈自出者明日便解矣何以言之立夏得洪大脈是其時脈故使然也四時仿此此言脈得應時而王則病有當解之自然舉夏以例其餘式人推仿之意問曰凡病欲知何時得何時愈答曰假令夜半得病明日日中愈日中得病夜半愈何以言之日中得病夜半愈者以陽得陰則解也夜半得病明日日中愈者以陰得陽則解也凡以大概言陽得陰陰得陽則陰陽相際血氣平復所以自然當解日中夜半以大意言余時仿此同推寸口脈浮為在表沉為在裡數為在腑遲為在臟假令脈遲此為在臟也此總大意言趺陽脈浮而澀少陰脈如經也其病在脾法當下利何以知之若脈大者氣實血虛也今趺陽脈浮而澀故知脾氣不足胃氣虛也以少陰脈弦而浮才見此為調脈故稱如經也若反滑而數者故知當屎膿也見音現少當作太故曰在脾經常也滑為食數為熱屎膿謂膿血利也寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼當發其汗也此舉太陽下篇首條申其脈而詳明其義趺陽脈遲而緩胃氣如經也趺陽脈浮而數浮則傷胃數則動脾此非本病醫特下之所為也榮衛內陷其數先微脈反但浮其人必大便硬氣噫而除何以知之本以數脈動脾其數先微故知脾氣不治大便硬氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈當除緩脈因前後度數如法病者則飢數脈不時則生惡瘡也前條太陰以脾言此言胃對舉而兩見貫意惡瘡與屎膿雖不同其為血熱則皆然也瘡者如素問所謂膏粱之變足生大疔與夫多病癰疽之類是也師曰病人脈微而澀者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗令陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裡胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀故知亡血也數音速令勝皆平聲此以醫誤致惡寒發熱者言所以然者以下申明上文之詞復夾衣也脈浮而大心下反硬有熱屬臟者攻之不令發汗屬腑者不令溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻此舉結胸痞氣胃實等之當下者概致叮嚀戒慎之意屬臟主結胸痞氣也故曰攻之不令發熱屬腑指胃實等也故曰不令溲數謂不可利小便也脈浮而洪身汗如油喘而不休水漿不下體形不仁乍靜乍亂此為命絶也此節乃此條之總下五節乃五目末節乃總結上文之詞蓋指第九篇第四條而以其不可治者詳言之之意也又未知何臟先受其災若汗出發潤喘而不休者此為肺先絶也首句乃承上文重起設問之詞若汗出以下至此為腎絶也乃五答詞汗出發潤即身汗如油變文之互詞喘而不休同然上節曰命絶此曰肺絶何也曰人以氣在則生氣絶則死肺主氣氣主命故以總一身而概言之則曰命絶及以通下文析五臟而詳言之則又曰肺先絶也陽反獨留形體如煙燻直視搖頭者此心絶也此下當有為字陽反獨留乃承上接下之詞人之有生氣血焉耳氣在則生氣去則死死道之常氣先絶也然血氣之交亦有偏勝而不可以常論者故曰陽反獨留言上節之證若不先見則是肺不先絶陽氣反獨遲留陽反獨留則陰先絶陰血也心主血故次言之煙燻火欲燼而昏暗先形也直視者少陰之脈其支者從心系上挾咽系目也搖頭者頭為諸陽之會陰去則陽無所依附故不寧也唇吻反青四肢漐習者此為肝絶也吻微袞切口唇邊曰吻肝之脈其支者從目系下頰裡環口裡青肝之色也四肢手足也漐汗出焉習鳥數飛也頭搖如鳥之習飛奮振而不已蓋肝屬木而主風脾屬土而主四肢土受木賊木欲折而風不息土受傷而欲崩壞也環口黧黑柔汗發黃者此為脾絶也黧音黎口為脾之竅黧黑熏黃黑暗土敗之色也柔汗俗謂冷汗是也蓋汗者血之液血雖陰行之者陽脾敗不統血則陰不守陽不固也發黃者脾屬土而主肌肉土欲敗而色外奪也溲便遺矢狂言目反直視者此為腎絶也矢與屎同溲便遺溺也腎司闔闢闔闢廢故二便皆無禁約也腎藏志經曰狂言者是失志矣失志者死腎主骨骨之精為瞳子目反直視者骨之精不上榮於瞳子瞳子背而不能轉也又未知何臟陰陽前絶若陽氣前絶陰氣後竭者其人死身色必青陰氣前絶陽氣後竭者其人死身色必赤腋下溫心下熱也首句又承上文重起設問之詞下乃答詞也蓋五臟絶之先後不可以上文之次第為拘故復言臟氣之陰陽前後絶竭有以驗之於既死之後則臟有勝負絶有遲速大率可見矣腋左右肘脅之間也成氏曰陽主熱而色赤陰主寒而色青其人死也身色青則陰未離乎體故知陰氣後竭也身色赤腋下溫心下熱則陽未離乎體故知陽氣後竭也寸口脈浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得氣寒冷必相搏其人即䭇䭇與噎通飲去聲令平聲浮為氣故曰無血大為虛故曰寒䭇俗謂之𩚬義見下條趺陽脈浮浮則為虛浮虛相搏故令氣䭇言胃氣虛竭也脈滑則為噦此為醫咎責虛取實守空迫血脈浮鼻中燥者必衄也此承上條又出趺陽而以噦與衄言皆逼汗而不得汗之所致也咎過愆也責虛言求病於虛虛與上條寒互文取實言反以虛為實而攻取之也血屬陰而為內守故曰空迫血言劫汗也諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者蓄積有膿也此與第十三條互意脈浮而遲面熱赤而戰惕者六七日當汗出而解反發熱者瘥遲遲為無陽不能作汗其身必癢也此與太陽下篇第七條互意寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也陰中於邪必內栗也表氣微虛裡氣不守故使邪中於陰也陽中於邪必發熱頭痛項強頸攣腰痛脛酸所謂陽中霧露之氣故曰清邪中上濁邪中下陰氣為栗足膝逆冷便溺妄出表氣微虛裡氣微急三焦相溷內外不通上焦怫鬱臟氣相熏口爛食齦也中焦不治胃氣上衝脾氣不轉胃中為濁榮衛不通血凝不流若衛氣前通者小便赤黃與熱相搏因熱作使遊於經絡出入臟腑熱氣所過則為癰膿若陰氣前通者陽氣厥微陰無所使客氣內入嚏而出之聲嗢咽寒寒厥相逐為熱所擁血凝自下狀如豚肝陰陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全齦音銀嗢音殟清便之清讀圊令平聲數音朔清指風濁指寒曰潔曰渾以天地之偏氣言也陰中於邪以下至濁邪中上一節是釋上文陰即下焦陽即上焦也陰氣為栗以下至血凝不流是言證若衛氣前通以下言變癰膿之故若陰氣前通以下言變膿血利之故衛氣即陽氣榮氣亦陰氣乃承上文榮衛不通而言清濁之所以為病在其中矣陰陽俱厥以下言證並於里而加重故曰命難全也下重後重也湫以水臟言也脈陰陽俱緊者口中氣出唇口乾燥踡臥足冷鼻中涕出舌上苔滑勿妄治也到七日以來其人微發熱手足溫者此為欲解或到八日以上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也此以上條同感而異變者言微發熱邪退也大發熱邪勝也惡寒表在也腹內痛入陰也脈陰陽俱緊至於吐利其脈獨不解緊去人安此為欲解若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解至於吐利乃承上條欲嘔欲利而又以其變成者言獨不解言證變而脈獨在也晚發言後來更又發也以上三條一證而三變耳病六七日手足三部脈皆至大煩而口噤不能言其人躁擾者必欲解也六指傷寒七指中風蓋詳其欲解之狀而總言之也然手足三部脈皆至則是以十二經之病皆退言傷寒不獨傳足經明矣若脈和其人大煩目重瞼內際黃者此為欲解也上節以脈但皆至而未和故有口噤躁擾此以和也故惟大煩目重而瞼內際見黃與太陽上篇第十一條互意但此以大概言耳脈浮而數浮為風數為虛風為熱虛為寒風虛相搏則灑淅惡寒也此概出惡寒之所以然脈浮而滑浮為陽滑為實陽實相搏其脈數疾衛氣失度浮滑之脈數疾發熱汗出者此為不治滑與前第十六條洪是互文與第九篇第四條皆一意但詳略不同耳傷寒咳逆上氣其脈散者死謂其形損故也咳逆上氣肺衰也脈散血衰也肺主氣而衛外血為陰而榮內兩者俱衰故曰形損少陰脈弱而澀弱者微煩澀者厥逆弱為虛損而不足陰虛生內熱所以煩然屬少陰故雖煩亦微也澀為少血而不滑不能上與陽相順接所以厥而逆冷也此一條乃補脈法上篇中之缺
