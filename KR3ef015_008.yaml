body:
  text: 卷之八辨不可發汗病脈證並治第十五夫以為疾病至急倉卒尋按要旨難得故重集諸可與不可方治比之三陰三陽篇中此易見也又時有不止是三陰三陽出在諸可與不可中也此叔和自揭其編述以下諸篇之由脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微發汗躁不得眠此疑太陽下篇首條末節之互意叔和以不可汗類此倫序鉏鋙難曉似此者皆當缺疑可也動氣在右不可發汗發汗則衄而渴心苦煩飲即吐水五臟皆有動氣詳見難經在右以肺言也不可發汗內證也衄渴煩吐皆見太陽上篇蓋手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循腰內行少陰心主之前而其臟通竅於鼻所以有諸證之變見如此動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤在左肝之內證也肝屬少陽其脈絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其主風故頭眩也汗不止者肝納血血之液為汗迫汗則肝不納血血不歸經故液有出而無斂也筋惕肉瞤者筋賴血以榮血虛則榮衰汗多則亡陽而亡津液所以然也動氣在上不可發汗發汗則氣上衝正在心端在上心之內證也氣上衝正在心端者心屬火而主血腎屬水而主氣逼汗則心虛水能剋火故腎乘心之虛欲上凌之也而心之脈起於心中出屬心系下膈絡小腹腎足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包然則上衝之氣亦當正在心端也動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目暈惡寒食則反吐谷不得前在下腎之內證也無汗者腎水臟在時為冬陰沉在下其主閉藏其經少血也大煩者強發其汗則水乾火無制也骨節苦疼目暈者腎主骨骨之精為瞳子水乾則骨枯而瞳子無榮養也惡寒者腎合太陽也食則反吐谷不得前者王冰曰病嘔而吐食久反出是無水也此之謂也難經動氣有五此言四臟而無脾豈以脾不與四臟同禁邪抑欲人與四臟同推也咽中閉塞不可發汗發汗則吐血氣欲絶手足厥冷欲得踡臥不能自溫咽門乃胃之系而脾之脈絡胃上膈挾咽連舌本然則咽中閉塞者脾胃之邪上客於咽而作逆阻也吐血者脾統血而胃為之合脾傷不能統血故妄行上溢而從胃道出也氣欲絶者亡陽也手足為四肢乃諸陽之本陽欲外絶則陰亦不能內守陰陽不相順接而厥冷故畏寒而欲得踡臥也夫如此溫之且未得豈能自得其溫乎諸脈得動數微弱者不可發汗發汗則大便難腹中乾胃燥而煩其形相象根本異源此條三節脈經只作通長一條不分截今按文意此疑是末節其形至末乃總全條之結句蓋謂寒栗不能自還後節苦滿腹中堅與此大便難腹中乾三者之變雖相似其本源則不同之意也不如此則上下皆不相蒙脈微而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛不可發汗發汗則寒栗不能自還此疑是上節陽以風言運動也故曰上實謂邪氣實也陰以裡言寒虛也故曰下虛謂裡氣虛也微弦為虛承上起下之詞寒栗不能自還陽亡而陰獨治也咳者則劇數吐涎沫咽中必干小便不利心中飢煩晬時而發其形似瘧有寒無熱虛而寒栗咳而發汗踡而苦滿腹中復堅此當是中節首句是承上而言咳為病加劇之詞也數吐以下言劇之狀也有寒無熱二句申似瘧也咳而發汗亦承上起下之詞踡謂咳屬肺肺金寒病則脹滿所以反堅也咳而小便利若失小便者不可發汗汗出則四肢厥逆冷小便利失小便肺腎二經俱病也不可發汗二經少血也四肢厥冷金水傷而土亦同敗也厥脈緊不可發汗發汗則聲亂咽嘶舌萎聲不得前厥欲溫緊則寒勝不可發汗陰陽不相順接也聲亂咽嘶舌萎病至少陰厥陰則厥少陰之脈循喉嚨挾舌本而厥陰之脈循喉嚨之外也聲不得前者聲出於肺而生於氣氣生於腎然則少陰腎者聲之本太陰肺者聲之標標本俱病此又上敗而金水亦衰合上條反覆示教之意諸逆發汗病微者難瘥劇者言亂目眩者死命將難全逆亦厥也言亂少陰衰而志喪也目眩厥陰衰而風亂也蓋厥逆無非少陰厥陰之證故也一汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸闕心主血而藏神汗多則血虛而舍空亂舍空則神紛散也陰宗筋也疼液竭而失其所榮養也二亡血家不可發汗發汗則寒栗而振伏皮為血出則為汗陰也陰不自出出之者陽也亡血陰虛矣寒栗而振反汗復亡其陽也三衄家不可發汗汗出必額上陷脈急緊直視不能眴不得眠衄鼻血也額上通乎鼻也不能眴謂目上瞪不能開闔而動搖也所以不得瞑而眠也四淋家不可發汗發汗必便血膀胱蓄熱而血妄則淋復發汗以迫其血則血愈不循經而愈妄便出者其道順故也五瘡家雖身疼痛不可發汗發汗則痓痓通作痙病瘡身疼痛血熱表虛非實也發汗則表益虛而易得重感痙病出於重感故禁六咽喉乾燥者不可發汗咽喉乾燥者胃中無津液腎水亦耗衰少陰之脈循喉嚨也發汗則津液愈亡而腎水益衰故致戒如此末後無發汗之變疑有漏落以上六條舊本太陽中篇今移傷寒頭痛翕翕發熱形象中風常微汗出自嘔者下之益煩心中懊憹如飢發汗則致痙身強難以屈伸熏之則發黃不得小便灸則發咳唾此互第九篇第四條曲致其不可誤治之詳以重致叮嚀戒謹之意辨可發汗病脈證並治第十六大法春夏宜發汗此叔和推法外意舉大概以揭言之春夏宜發汗者順陽事也然傷寒冬病也可以此拘乎不可以此拘仲景肯言哉凡似此者後學皆當別識誠如此則進道方為有益凡發汗欲令手足俱周時出以漐漐然一時間許亦佳不可令如水流漓若病不解當重發汗汗多必亡陽陽虛不得重發汗也此叮嚀發汗之節度凡服湯發汗中病便止不必盡劑此叮嚀進湯之節度凡云可發汗無湯者丸散亦可用要以汗出為解然不如湯隨證良驗此示人用湯丸經權應變之宜以上五條疑皆叔和語夫病脈浮大問病者言但便硬爾設利者為大逆硬為實汗出而解何以故脈浮當以汗解此言便雖硬若脈見浮猶當從汗解蓋互下不宜早而曲致叮嚀之意下利後身疼痛清便自調者急當救表宜桂枝湯發汗此互太陽中篇第二十三條末節而曲致叮嚀之意辨發汗後病脈證並治第十七發汗多亡陽譫語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈此互誤汗亡陽而曲致其輕者之救法此一卷第十七篇凡三十一證前有詳説辨不可吐病脈證並治第十八合四證已具太陽篇中以上二條乃叔和類具篇目指經中條册之不能分出者而言勉人當精詳經旨務為通貫其義以期盡道之意讀者自會則書之全求可言矣辨可吐病脈證並治第十九大法春宜吐春氣上行萬物伏藏者皆冒土而上出故病之發於春者大率宜宣而吐以出之法天道也凡用吐湯中病即止不必盡劑也此與第十六篇第三條汗吐不同而意同並上條亦皆叔和語然中之為言注的也知注的之為中則知中病之節度矣宿食在上脘者當吐之上脘謂胃腑之口也病人手足厥冷脈乍結以客氣在胸中心下滿而煩欲食不能食者病在胸中當吐之第九篇第六條言脈乍緊邪氣在胸中此言乍結客氣在胸中緊者結之漸結者緊之劇客氣即邪氣彼則互相發而兩見輕重之意病胸上諸實胸中鬱郁而痛不能食欲使人按之而反有涎唾下利日十餘行其脈反遲寸口脈微滑此可吐之吐之則利止諸實總上文宿食邪氣客氣而概言之辨不可下病脈證並治第二十脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微不可下下之則心下痞硬澀與澀同此下六條即前十五篇第二條以下之六條又以不可下再出痞硬即結胸痞氣動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也頭眩者肺屬金金衰不能制木木甚則風生也然木甚火必熾而肺太陰之脈行手少陰心主之前心為火臟所以悸也動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲踡腹內拘急食不下者厥陰肝脈挾胃絡肝也身熱胃合於脾脾主肌肉而統四肢然則欲踡者裡寒也動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌掌握熱煩者手少陰心之脈抵掌後兌骨之端入掌內後廉手心主之脈入掌中也身上浮冷者火敗而土無氣也熱汗已下汗生於血而主於心心屬火敗則液不斂劇則自求救也動氣在下不可下下之則腹脹滿卒起頭眩食則下清穀心下痞也卒清勿切腹脹滿腎痹也頭眩者腎少陰之脈其直者從腎上貫肝膈肝主風也食則下清穀者水橫溢也心下痞者腎主氣其脈之支者從肺出絡心注胸中也咽中閉塞不可下下之則上輕下重水漿不下臥則欲踡身急痛下利日數十行上輕以咽言下重以胃言水漿不下以下詳下重之狀也臥則欲踡身急痛者胃主肌肉而統四肢也下利土敗而水無制也蓋咽門小腸太倉胃腑之傳送也故應病如此夫汗下者法之對比也兩比以示教前哲之心亦甚深切矣後學當仰體諸外實者不可下下之則發微熱亡脈厥者當臍握熱諸外實指凡一切邪在表而言也發微熱邪入里也亡脈陽內陷也握持也謂當臍有熱持而不散蓋以熱入深者言也諸虛者不可下下之則大渴求水者欲愈惡水者劇惡去聲諸虛指凡一切汗吐下後若亡血與精氣奪肉脫色敗脈不應者言也大渴津液竭也求水陽回也惡水無陽也然虛乃上文實之對亦兩比之意脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛虛者不可下也此舉第十五篇第五條後二節而復以不可下重出下文乃言下之之變也微則為逆咳則吐涎下之則咳止而利因不休利不休則胸中如蟲齧粥入則出小便不利兩脅拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若水眼睛不慧語言不休而穀氣多入此為除中口雖欲言舌不得前齧音孽首二句乃總前第十五篇第五條後兩節之兩首句而通互其意下之以下言變證也寒以虛言故曰反汗出身冷若冰也不得前猶言不能出也舌主於心較之聲屬脈之前條則此為重矣亦兩比也脈濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虛數為無血浮為虛數為熱浮為虛自汗出而惡寒數為痛振寒而栗微弱在關胸下為急喘汗而不得呼吸呼吸之中痛在於脅振寒相搏形如瘧狀醫反下之故令脈數發熱狂走見鬼心下為痞小便淋漓小腹甚硬小便則尿血也首三句與上條同上條弦反在上弦則為陰陰者寒也故曰微反在下此條浮反在上浮則為陽陽者風也故曰數反在下蓋兩舉中風傷寒之本虛者繹其變以曲致叮嚀之意脈數者久數不止止則邪結正氣不能復正氣卻結於臟故邪氣浮之與皮毛相得脈數者不可下下之則必煩利不止皮毛相得以上明脈之所以浮數也煩利亦協熱也脈浮大應發汗醫反下之此為大逆此重出第十四篇第十七條之大略以申致叮嚀之意嘔多雖有陽明證不可攻之此即陽明篇第三十八條重出太陽病外證未解不可下下之為逆此太陽上之第十七條蓋以凡在太陽皆然故重出以申致叮嚀之意夫病陽多者熱下之則硬陽以風言多猶言勝也熱以自汗言硬亡津液也無陽陰強大便硬者下之則必清穀腹滿陰以寒言強猶言多也清穀陰不能化也腹滿陰凝滯而內脹也亦兩比對言以互發之意脈浮而大浮為氣實大為血虛血虛為無陰孤陽獨下陰部者小便當赤而難胞中當虛今反小便利而大汗出法應衛家當微今反更實津液四射榮竭血盡干煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虛客陽去有期必下汙泥而死傷寒發熱頭痛微汗出發汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背強加溫針則衄傷寒發熱口中勃勃氣出頸痛目黃衄不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足溫者必下重便膿血頭痛目黃者若下則兩目閉貪水者脈必厥其聲嚶咽喉塞若發汗則戰栗陰陽俱虛惡水者若下之則里冷不嗜食大便完穀出若發汗則口中傷舌上白苔煩躁脈數實不大便六七日後必便血若發汗則小便自利也脈濡而緊濡則胃氣微緊則榮中寒陽微衛中風發熱而惡寒榮緊胃氣冷微嘔心內煩醫為有大熱解肌而發汗亡陽虛煩躁心下苦痞堅表裡俱虛竭卒起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷緊寒在關元技巧無所施汲水灌其身客熱應時罷栗栗而振寒重被而覆之汗出而冒巔體惕而又振小便為微難寒氣因水發清穀不容間嘔變反腸出顛倒不得安手足為微逆身冷而內煩遲欲從後救安可復追還傷寒脈陰陽俱緊惡寒發熱則脈欲厥厥者脈初來大漸漸小更來漸漸大是其候也如此者惡寒甚者翕翕汗出喉中痛熱多者目赤脈多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多者便清穀熱多者便膿血若熏之則身發黃若尉之則咽燥若小便利者可救之小便難者為危殆下利脈大者虛也以其強下之故也設脈浮革因爾腸鳴者屬當歸四逆湯以上六條皆不見有不可下之言倫類不清疑非叔和之舊亦後人之紛亂耳不敢強為之説闕疑以待博識辨可下病脈證並治第二十一大法秋宜下傷寒冬病也若謂可以春宜吐夏宜汗秋宜下為大法則三法者其如寒之傷於冬何而仲景傷寒之治大法實不外乎三者然則三言之意豈不與仲景之旨相矛盾乎嗟乎仲景之言經也權在其中三言者不知為誰經不經權不權僣揭三篇條目之首與傷寒例妄僣六經前之逆同傷寒例以當簡篇前也故削之削之則叛經之迹泯而三言者以皆揭條册首不能削只得存之存之亦亂經之罪著著與泯皆所以為狂妄戒也後之覽者宜鑑於斯凡服下藥用湯勝丸中病即止不必盡劑也此亦叔和語下利三部脈皆平按之心下硬者急下之宜大承氣湯三部脈皆平血氣和可知矣心下硬實也所以急也下利不欲食者以有宿食故也當宜下之與大承氣湯不欲猶惡也宿陳久也猶世俗所謂積也問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食當下之宜大承氣湯此承上文復設問答言脈以申明之之意下利脈反滑當有所去下之乃愈宜大承氣湯下利脈遲而滑者內實也利未欲止當下之宜大承氣湯二條亦承上文又以脈之變者言以詳明之之意病腹中滿痛者此為實也當下之宜大承氣湯實者邪氣甚之謂也下利瘥後至其年月日復發者以病不盡故也當下之宜大承氣湯其期也謂周其一年之月日期也傷寒後脈沉沉者內實也下解之宜大承氣湯沉以候陰再言沉者謂深沉在裡陰之意也脈雙弦而遲者必心下硬脈大而緊者陽中有陰也可以下之宜大承氣湯雙弦謂左右皆然也弦則為陰遲則為寒心下硬者謂客寒結滯於膈也大為陽虛緊為陰勝陽以腑言陰以寒言謂陰寒之邪內實於胃腑也辨發汗吐下後脈證並治第二十二此第十卷第二十二篇凡四十八證前三陰三陽篇中悉具載之此與第十七十八語意同上記十一篇叔和分經及述經外之餘言附己意以撰次之合經亦十一篇共目二十二以為全成仲景氏未韋之遺書者也而第十七十八二十二三篇則又皆抱空名而擁虛位無册條之可檢實則一十九篇之條册耳皆叔和所紀之舊額如此世固有少此以為非仲景之全書而起其説者嗚呼是書也仲景之作於建安漢年號也出自叔和之撰述晉太醫令也相去雖不甚遠蓋已兩朝相隔矣是仲景之全書非仲景之全書誠不可曉也然縱非全是不是全非斷可言也是是非非全責在我反我自責則是不是非不非全不全自有可見者在也見一焉則仲景之所以為仲景者可寤寐皆得全見之矣其神其妙又何待言凡我同袍尚期同勉附廬山劉復真脈訣捷要脈者天真太和之氣也王叔和七表八里之説形狀浩繁學者無條理可據夫持脈之道圖不盡言存乎心會而已先師崔紫虛真人面命心傳撮其樞要但以浮沉遲數四脈為宗知風氣冷熱為主病且如浮脈有力者風無力者虛沉脈有力者積無力者氣遲脈有力者痛無力者冷數脈有力者熱無力者瘡更看三部所屬如寸部屬上焦頭面胸膈之病關部屬中焦肚腹之病尺部屬下焦腰腿足之病又看五臟六腑所主以浮中沉表裡消息也學者當以義理精別不致按寸握尺之誚云浮脈為陽屬表言外得病有力主風無力主虛舉指在皮便見與芤滑洪脈同沉脈為陰屬裡言內得病有力者積無力者氣下指按至骨方見與弱伏濡脈同遲脈為陰主冷有力者痛與緩微澀脈同數脈為陰主熱無力者瘡與弦緊實脈同上焦病屬寸口脈浮風主頭面眼目浮腫風寒牙疼口眼喎斜沉氣主胸膈痞滿咳嗽喘急膈氣翻胃胸痛不食遲冷主嘔吐隔痞不納水穀虛汗拘急疼痛不已數熱主上壅煩燥口苦咽乾客熱煩渴頭痛口瘡中焦病屬關脈浮風主兩臂拘攣不能舉運背脊筋痛身體麻木沉氣主腹膨鳴心腹疼痛上下關格不思飲食遲冷主痃癖痛走不定上下攻刺翻胃吐食數熱主口渴咽乾嘔吐霍亂煩躁不寧下焦病屬尺脈浮風主腰痛腿膝麻木足脛腫痛大便不利沉氣主腳腫疼痛下重麻木小便不利遲冷主小腹急疼外腎偏大小便頻數大便泄瀉數熱主小便不通大便祕結腎癰煩渴不止傷寒但有腳脈不死在腳背上腕中是衝陽脈也有此脈則氣盛又有大溪脈在內踝側動脈是也又有一脈在手虎口合谷穴此脈盛則傷寒有汗劉復真先生纂七表八里之玄集為四脈曰風氣冷熱也復變為八曰虛風積氣痛冷熱瘡凡八部以定其何部得之則知病之所在先生掃除冗蔓直顯真源得傳者慎之寶之附嚴三點捷法脈浮得病宜發散脈沉得病宜疏利脈遲之病宜溫中脈數之病宜汗解右寸有力者可吐右尺有力者可下左寸有力者可汗丈夫寸口脈須浮關部脈須緊尺部脈須沉婦人寸部脈須沉關部脈須緩尺部脈須浮神聖功巧括醫門理法至微玄大要胸中有轉旋望聞問切四件事缺一偏枯不備全望第一看他神氣色潤枯肥瘦起和眠活潤死枯肥是實瘦為虛弱古今傳謙體則知腰內痛攢眉頭痛與頭眩手不舉兮肩背痛步行艱苦疼腰間叉手按胸知內痛按中臍腹痛相連但起不眠痰夾熱貪眠虛冷使之然面壁踡身多是冷仰身舒挺熱相煎身面目黃脾濕熱唇青面黑冷同煎聞第二應聲清與濁鑑他真語及狂言聲濁即知痰壅塞聲清內冷是因緣言語真誠非實熱狂言號叫熱深堅稱神説鬼逾牆壁胸膈停痰證癇癲更有病因循日久音聲遽失命歸泉問三問病因經幾日日間便利幾番行飲食少多宜冷熱更兼服過藥堪憑飲食稍通容易治不進之時不易寧喜冷定知心內熱好溫乃是臟中寒尿色赤黃真內熱尿清定是冷相干切切脈是居為四末浮沉遲數病之端四事略陳通梗概舉隅善反一同看
