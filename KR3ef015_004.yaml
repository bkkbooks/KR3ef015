body:
  text: 卷之四辨陽明病脈證並治第四凡七十七條方十陽明者胃經也其法不以經病為例而例以胃家實為正不以經病為例者陽明路接太陽經病由傳從太陽過而後受多則太陽未除故須仍從太陽例如几几合病之類是也過此再入陽明胃實當之病一入胃胃為五臟六腑之海而吉凶生死幾焉不復有經可言矣故經無例可出而凡胃實者不得不出例此陽明所以與余經不同也彼以一經再經循經越經規規於數日以論證者烏足與語聖賢言外之意哉一陽明之為病胃家實也陽明經也胃腑也實者大便結為硬滿而不得出也作於遲早不同非日數所可拘所謂二日陽明者以經言也經主三陽傳路之中不專病而專病在胃實故胃實反得以揭陽明之總與太陽之揭總者經病雖不同要之所以為揭例則一也余經皆有總揭其例則通乎二者而同推以此觀之則非全書之言不出於輕視而漫易哉二問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也此條三節此節三問一答通下文二節乃三答詞蓋原三陽所以入胃之殊因也太陽陽明者謂太陽受病經入胃而成胃實也脾約見第六十一條此舉大意詳見後正陽陽明者胃家實是也正謂本經也以病到本經遂入胃而成胃實故指首條謂即此是也然大概亦只是如此少陽陽明者發汗利小便已胃中燥煩實大便難是也少陽陽明者以病到少陽方才入胃而成胃實者言也發汗以下三陽皆然乃獨於少陽發者以少陽主半表半裡表裡皆不可攻故也然三者之因雖少殊要亦不過互明耳三問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也身熱汗自出起自中風也不惡寒反惡熱邪過榮衛入里而裡熱甚也此以太陽傳入中風陽明之外證言四問曰何緣得陽明病答曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也亡轉皆見太陽篇中風本自汗故發汗已下皆致傳陽明勢易也古人大便必更衣不更衣言不大便也此以太陽中風傳入陽明之表證言五問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也不發熱而惡寒起自傷寒也惡寒將自罷邪過表也即自汗出邪熱鬱於陽明之肌肉腠理反開津液反得外泄也惡熱裡熱甚也此以太陽傷寒傳入陽明之外證言六問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也此承上條之答詞復設問答而以其里證言無所復傳者胃為水穀之海五臟六腑四體百骸皆資養於胃最宜通暢實則祕固復得通暢則生止於祕固則死死生決於此矣尚何復傳惡寒二日自止者熱入里而將反惡熱以正陽陽明言也以病二日而其幾有如此則斯道之精微豈專專必於談經論日所能窺測哉七傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也濈照吉切發熱無汗追言太陽之時也嘔不能食熱入胃也反汗出者肌肉著熱膚腠反開也濈濈熱而汗出貌八傷寒轉系陽明者其人濈濈然微汗出也此承上條復以微汗申言重致叮嚀也九本太陽初得病時發其汗汗先出不徹因轉屬陽明也徹除也言汗發不對病不除也此言由發太陽汗不如法致病入胃之大意以為總結上文十傷寒三日陽明脈大傷寒三日該中風而大約言也凡類此者皆仿此脈大陽明氣血俱多也十一陽明病欲解時從申至戌上申酉戌陽明之王時也正氣得其王時則邪不能勝故退而自解也十二陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯遲者緩之變汗出多微惡寒者風邪猶有在表者故曰未解也可發汗例也宜桂枝湯謂仍須解其肌則入胃之路自絶也方見太陽上十三陽明病脈浮無汗而喘者發汗則愈宜麻黃湯浮者緊之轉邪外向也無汗而喘者寒邪在表未全除也故曰發汗則愈言當仍從解外也宜麻黃湯者言當散窮寇於境界也方見太陽中十四陽明病若能食者名中風不能食者名中寒此以食之能否喻人驗風寒之辨蓋陽明主水穀風能食陽能化谷也寒不能食陰不殺穀也名猶言為也中寒即傷寒之互詞大意推原風寒傳太陽而來其辨驗有如此者非謂陽明自中而然也玉機微義謂惜乎仲景不言中寒經言中寒殆不止此何嘗不言彼以經為不言者其意將以為中之與傷有各別之分也殊不知經稱中傷二字於風寒者要亦從來之通稱經因通稱以為稱非經之稱始也想從來通稱之意大約不過以風寒本天之二氣中傷是以人之被之而為稱譬如稱人之中於箭傷於刃只可在刀箭瘡上認病豈可向中傷上摸影由此言之則中風與傷寒之說必須於風寒二病上認得證候分曉不當在中傷上各別尋頭腦也且以經文大義考之措詞多是互相發則中傷二字亦是互相為用不言可知矣通篇雖無傷風一說然以傷寒復稱中寒論之則中風得稱傷風亦可推也世俗又有感冒之稱蓋由愚夫愚婦不知中傷與感本素靈之互文乃諱中傷為重而起趨感冒為輕以便慰問之風遂成弊習耳原無關輕重之義讀書貴格致窮理明道以正俗乃舍古不稽一從流俗直欲於虛文上爭差分不究事實而求多於往哲可不正謂之冥行索塗東西一聽候於呼叱哉十五脈陽微而汗出少者為自和也汗出多者為太過輕高而上前者為陽微以中風之緩言中風本自汗故言出少為自和和對太過言謂未至太過耳非直謂平和大過者以其失於不治與凡治之不對致出不已者言也陽脈實因發其汗出多者亦為太過太過為陽絶於里亡津液大便因硬也實以傷寒之緊言傷寒本無汗故曰因發其汗發而出之過多則與自出過多者同一致故曰亦為太過自此以下乃總結上文以申其義陽絶即亡陽蓋汗者血之液血為陰陰主靜本不自出蓋所以出者陽氣之動鼓之也故汗多則陽絶豈惟陽絶亡津液即亡陰也讀者最宜究識十六太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之此概言陽明發熱之大意三日舉大綱言也蒸蒸熱氣上行貌言熱自內騰達於外猶蒸炊然故曰屬胃也調胃和陽明之正也方見太陽下篇十七陽明病本自汗出醫更重發汗病已差尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也差與瘥同穿介切令平聲為去聲瘥小愈也以亡津液至大便硬是申釋上文當問其小便日幾行至末是詳言大便出不出之所以然蓋水穀入胃其清者為津液粗者成楂滓津液之滲而外出者則為汗瀦而下行者為小便故汗與小便出多皆能令人亡津液所以楂滓之為大便者乾燥結硬而難出也然二便者水穀分行之道路此通則彼塞此塞則彼通小便出少則津液還停胃中胃中津液足則大便潤潤則軟滑此其所以必出可知也十八陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導蜜煎導方蜜七合一味內銅器中微火煎之稍凝似飴狀攪之勿令焦者欲可丸並手捻作梃子令頭鋭大如指長二寸許當熱時急作冷則硬以內穀道中以手急按欲大便時乃去之豬膽汁方大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出雖上或下當有大便二字竭亦亡也上條以小便數少故知大便當自出此以小便自利而用導反復互相發也然皆不用下者以非熱也十九陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下大承氣湯方大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合上四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一兩沸分溫再服得下余勿服小承氣湯方大黃四兩酒洗厚朴二兩炙去皮枳實三枚炙大者以上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之脈遲不惡寒表罷也身必重陽明主肌肉也短氣腹滿而喘胃實也潮熱陽明王於申酉戌故熱作於此時如潮之有信也手足濈然汗出者脾王四肢而胃為之合胃中熱甚而蒸發騰達於四肢故曰此大便已硬也承氣者承上以逮下推陳以致新之謂也曰大者大實大滿非此不效也枳實泄滿也厚朴導滯也芒硝軟堅也大黃蕩熱也陳之推新之所以致也汗多微發熱惡寒皆表也故曰外未解也其熱不潮胃中未定熱陽明信不立也小承氣者以滿未硬不須軟也故去芒硝而未復致大下之戒也更衣古人致大便之恭也夫胃實一也以有輕重緩急之不同故承氣有大小調胃之異制湯有多服少服之異度蓋稱物平施由義之謂道也然則竊三益而濫稱承氣者冒也惡足與語道哉二十陽明病潮熱大便微硬者可與大承氣湯不硬者不與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便硬而少也以小承氣湯和之不轉失氣者慎不可攻也黃氏曰失漢書作屎古屎失通矢傳寫誤上條訣人以手足汗出為當下之時此以潮熱轉矢氣次第而詳言亦訣人當下之二候也轉矢氣反屁出也脹滿藥寒之過也噦亦寒傷胃也硬而少重下故也末句重致叮嚀之意二十一陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯可攻以上以轉矢氣言懊憹悔憹痛恨之意蓋藥力未足以勝病燥硬欲行而攪作故曰可攻言當更服湯以促之也腹微滿以下以不轉矢氣言頭硬後溏裡熱輕也故曰不可攻之言當止湯勿服也末二句乃申上節以決治意二十二陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也此承上文又以譫語並脈言亦訣人下候及斟酌用湯度數之意滑以候食故為大便硬之診疾裡熱甚也然滑疾有不寧之意不可不知微者陽氣不充澀者陰血不足故曰裡虛也難治者氣不充則無以為運行血不足則無以為潤送故曰陽微不可下無血不可下此之謂也二十三夫實則譫語虛則鄭聲鄭聲重語也實以邪言譫語呢喃不了之妄語也虛以正言以重語釋鄭聲者謂語聲之出由於邪實正虛濁惡而厭聽也二十四直視譫語喘滿者死下利者亦死直視精不榮於目也譫語神不主乎心也喘則陽爭於上利則陰奪於下胃中土也陰陽爭奪於上下而中氣不守故無法可治而皆主死也二十五發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死汗本血之液陽亡則陰亦虧脈者血氣之道路短則其道窮矣故亦無法可治而主死也和則病雖竭而血氣則未竭故知生可回也此疑太陽篇錯簡二十六陽明病發熱汗多者急下之宜大承氣湯胃實本由於無津液而內燥汗多則津液益亡矣急下者竭則不可治也二十七發汗不解腹滿痛者急下之宜大承氣湯發汗不解者失之過度也腹滿痛者胃不和也急下者滿去則痛止也二十八腹滿不減減不足言當下之宜大承氣湯此申明上條而訣用治之意二十九傷寒吐後腹脹滿者與調胃承氣湯吐亦無津液而胃又傷腹雖滿而非熱結調胃承氣者陽明之正也方見太陽下三十太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈此總亦胃實由於亡津液而皆宜小和者通該戒大下之意也三十一陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫復服此與上條互意多汗見後三十二傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服此以勢重言獨自也與譫互意循衣摸床陽偏勝而躁動於手也弦者陰氣強澀者陰不足陽熱劇甚有餘陰以際之故生可回也陰不足而陽獨治故死可知也三十三汗出譫語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛里實故也下之則愈宜大承氣湯過經謂寧遲遲非謂待十三日後也言出於心心為胃之母子能令母虛故下早則必亂也表虛里實謂外邪悉入胃也三十四得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎硬乃可攻之宜大承氣湯令平聲太陽不言藥以有桂枝麻黃之不同也柴胡不言證以專少陽也凡似此為文者皆互發也以無太少故知諸證屬陽明以脈弱故宜微和至六日以下歷敘可攻不可攻之節度三十五陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈上條心下硬而用下者以屬陽明胃也此謂心下硬滿不可攻者以邪聚陽明之膈也所以然者陽明之脈上至額顱其支別者從大迎前下人迎循喉嚨入缺盆下膈也攻亦下也利遂不止其人陰本虛也利止者其人陽氣勝也三十六陽明病不吐不下心煩者可與調胃承氣湯不由吐下而心煩則發於胃實可知也用調胃承氣者無雜故也三十七傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯了了猶瞭瞭也素問曰陽明主肉其脈挾鼻絡於目靈樞曰足陽明之正上循咽出於口還系目系合於陽明也又曰足陽明之筋其支者上頸上挾口合於頄下結於鼻上合於太陽太陽為目上綱陽明為目下綱所以目中不了了睛不和知胃實也急下者任脈循面入目督脈上行兩目中央諸脈皆屬於目而人之精神注焉是以如是其急也三十八傷寒嘔多雖有陽明證不可攻之嘔屬太陽故曰嘔多雖有陽明不可攻以多則太陽猶有未除可知也雖字當玩味三十九食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也吳茱萸湯方吳茱萸一升洗人參三兩生薑六兩大棗十二枚擘上四味以水七升煮取二升去滓服七合日三服食谷欲嘔胃寒也故曰屬陽明言與惡寒嘔逆不同也茱萸辛溫散寒下氣人參甘溫固氣安中大棗益胃生薑止嘔四物者所以為陽明安穀之主治也上焦以膈言亦戒下之意四十陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬爾宜大承氣湯爾與爾同不能食寒因也故屎燥能食因於風也故但硬爾四十一傷寒脈浮而緩手足自溫者是為系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也傷寒脈浮而緩見太陽下篇然緩以候脾脾主四末故手足自溫為系在太陰身當發黃者脾為濕土為胃之合若不能為胃以行其津液濕著不去則鬱蒸而身發黃黃為土色土主肌肉故也小便自利津液行也行則濕去矣所以不能發黃胃中干大便硬而為陽明病也四十二陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也陽明之脈挾口環唇然膽熱則口苦咽為膽之使故口苦則咽乾腹滿熱入陽明也微喘發熱惡寒脈浮而緊風寒俱有而太陽未除也下之腹滿者誤下則裡虛外邪未除者乘虛而盡入內陷也小便難亡津液也四十三陽明病脈浮而緊咽燥而口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動隔心中懊憹舌上苔者梔子豉湯主之憒匣僞切怵穿橘切惕透吉切燥亦干也發熱以上與上條同惡熱陽明血氣俱盛也以當太陽時惡寒今惡熱故曰反也身重陽明主肌肉濕上重著也汗出熱在肌肉腠理反開也以上三節言汗下燒針皆不可故著其變以示也憒憒心亂貌怵惕恐懼貌舌苔見太陽下篇彼以臟結故為難治此以膈熱故湧之以梔子豉方見太陽中若渴欲飲水口乾舌燥者白虎加人參湯主之此又以變渴更治言方見太陽下若脈浮發熱渴欲飲水小便不利者豬苓湯主之豬苓湯方豬苓一兩去皮茯苓一兩阿膠一兩滑石一兩澤瀉一兩上五味以水四升先煮四味取二升去滓內下阿膠煬消溫服七合日三服此又以小便不利再出治豬苓茯苓從陽而淡滲阿膠滑石滑澤以滋潤澤瀉鹽寒走腎以行水水行則熱泄滋潤則渴除四十四陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也此承上條復以汗多不宜豬苓湯申致戒謹之意四十五陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出浮而緊與前同故申言必潮熱但浮則陽盛陽盛則陰虛陰虛所以盜汗出也四十六太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散數音朔以表證與脈在故知痞為誤下之所致以表除而作渴故知轉屬陽明十日無所苦者以津液偏滲而致干非熱結也以干而渴故與水而宜五苓方見太陽上四十七陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫剌之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治尿與溺同泥叫切弦少陽浮太陽大陽明脅下痛少陽也小便難太陽之膀胱不利也腹滿鼻乾嗜臥一身及面目悉黃潮熱陽明也時時噦三陽俱見而氣逆甚也耳前後腫陽明之脈出大迎循頰車上耳前太陽之脈其支者從巔至耳少陽之脈下耳後其支者從耳後入耳中出走耳前也然則三陽俱見證而曰陽明者以陽明居多而任重也風寒俱有而曰中風者寒證輕而風脈甚也續浮謂續得浮故與小柴胡從和解也但浮無餘證者風雖外向終為微寒持也故發之以麻黃不尿腹滿加噦者邪盛於陽明而關格所以無法可治也小柴胡湯見太陽上麻黃湯見太陽中尿南人心崔切四十八陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也疸廣韻作疸遲為寒不化谷故食難用飽穀不化則與熱搏濕鬱而蒸氣逆而不下行故微煩頭眩小便難也疸黃病也谷疸水穀之濕蒸發而身黃也下則徒虛胃氣外邪反乘虛陷入所以腹滿仍舊也末乃申上文義以致不可下之意四十九陽明病若中寒不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也瘕匣牙切固堅固瘕積聚以本寒因水穀不化消積聚成堅固也末亦申上文致勿下之意五十陽明病欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈奄影檢切欲食胃氣將回也陽明以胃實為正故小便不利大便自調為反也骨節疼如有熱余表未除也奄然忽然也發狂陽明之所以作汗也水不勝以小便反不利言穀氣以欲食言蓋謂所以汗出者由小便不利胃回不作實故得汗得汗則表並解故曰脈緊則亦愈也五十一陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦攻熱皆寒藥故知必噦胃中虛以不能食言此亦戒謹之意五十二傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語滿胃實也逆溢則喘越出謂枉道而出也表虛津液越出也裡實大便難也五十三脈浮而遲表熱裡寒下利清穀者四逆湯主之若胃中虛冷不能食者飲水則噦此疑三陰篇錯簡五十四陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛眩風旋而目暈也風故不惡寒能食咳逆氣咽門胃之系也胃熱而氣逆攻咽則咳痛咽傷也五十五陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也法多汗言陽明熱鬱肌肉腠理反開應當多汗故謂無汗為反也無汗則寒勝而腠理反祕密所以身如蟲行皮中狀也久虛寒勝則不能食胃不實也五十六陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛此亦寒勝故小便利嘔手足厥手足為諸陽之本三陽皆上頭故手足厥者必苦頭痛也五十七陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之下之外有熱外者外散也故手足溫不結胸心中懊憹者雖不結胸而膈中則鬱煩也頭汗見太陽上方見太陽中五十八陽明病口燥但欲漱水不欲咽此必衄漱音瘦口為胃竅胃熱則口燥漱水不欲咽者陽明血氣俱多雖燥不渴也衄者以血氣俱多而脈起於鼻故熱甚則血妄行必由鼻而出也五十九脈浮發熱口乾鼻燥能食者則衄浮因於風也風為陽所以證如此也六十脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絶芤俗讀丘浮為氣上行故曰陽芤為血肉損故曰陰胃中生熱者陰不足以和陽津液干而成枯燥也陽絶即亡陽之互詞此上二條疑錯簡六十一趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便為難其脾為約麻仁丸主之麻仁丸方麻子二升芍藥半斤枳實半斤大黃一斤去皮厚朴一斤去皮杏仁一斤去皮尖熬研脂上六味為末煉蜜為丸桐子大飲服十丸日三服漸加以和為度數音朔趺陽胃脈也其脈在足趺上動脈處去陷谷三寸又曰衝陽一名會元浮為盛陽故主胃強澀為陰虛故小便數約約束也胃為脾之合脾主為胃以行其津液胃強則脾弱脾弱則不能為胃行其津液以四布使其得以偏滲於膀胱為小便數大便乾而胃實猶之反被胃家之約束而受其制故曰其脾為約也麻子杏仁能潤乾燥之堅枳實厚朴能導固結之滯芍藥斂液以輔潤大黃推陳以致新脾雖為約此之疏矣六十二陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴飲水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之茵陳蒿方茵陳蒿六兩梔子十四枚擘大黃二兩上三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也越散也頭汗瘀熱發黃皆見太陽篇茵陳逐濕鬱之黃梔子除胃家之熱大黃推壅塞之瘀三物者苦以泄熱熱泄則黃散也六十三陽明病面合赤色不可攻之必發熱色黃小便不利也合應也赤熱色也陽明之脈起於鼻胃熱上行面應赤色攻則亡津液故發熱色黃小便不利六十四陽明病無汗小便不利心中懊憹者身必發黃無汗小便不利則濕停懊憹濕停熱鬱也所以知黃必發也六十五陽明病被火額上微汗出小便不利者必發黃陽明之脈循髮際至額顱故被火熱甚汗出額上也黃火迫土也六十六陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈血室頭汗期門皆見太陽篇陽明之脈其直者從缺盆下乳內廉下挾臍入氣街中血室之脈起於氣街上行至胃中而散所以婦人熱入血室則似結胸而譫語陽明熱入血室則亦譫語下血男順女逆道則同也故亦刺期門六十七陽明病證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之喜忘好忘前言往事也志傷則好忘然心之所之謂志志傷則心昏心昏則血滯所以知必有蓄血也大便反易血主滑利也黑血色也方見太陽上篇六十八病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血宜抵當湯表謂無太陽里謂胃不實雖脈浮數可下者久也合熱謂數陽不退熱亦應未除也善飢猶言快飢也不大便有瘀血大意與血證反覆略同此疑太陽篇錯簡若脈數不解而下不止必協熱而便膿血也抵當下之數仍不退熱未除也利不止所以知協熱必便膿血也六十九陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之潮熱少陽陽明之涉疑也大便溏小便自可胃不實也胸脅滿不去則潮熱仍屬少陽明矣故須仍從小柴胡方見太陽上七十陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也此承上條而言即使不大便而脅下硬滿在若有嘔與舌苔則少陽為多亦當從小柴胡上焦通硬滿開也津液下大便行也百體皆受氣於胃故胃和則身和汗出而病解方見太陽上七十一二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯此以太陽陽明言謂須太陽罷方可治陽明之意七十二陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯陽明屬土其主水穀少陽屬木其主風風主飧泄故知下利可必也陽明脈大少陽脈弦不負謂大而不弦無相勝負而相得也失得之反也謂弦則木剋土不大則土受木賊少陽勝而陽明負為不相得猶言不宜也滑主食數主熱宿食可知也大承氣湯者陳宜推所以通因通用也七十三三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語甚下之則額上生汗手足逆冷若自汗出者白虎湯主之陽明主胃胃主肌肉而通竅於口不仁胃不正而飲食不利便無口之知覺也然則腹滿身重不仁譫語陽明也靈樞曰足少陽之正上肝貫心以上挾咽出頤頷中散於面故又曰是動則病口苦善太息心脅痛不能轉側甚則面微有塵垢亦塵也遺尿太陽膀胱不約也故曰三陽合病五合之表裡俱傷也發汗則偏攻太陽邪並於陽明而譫語益甚下則偏攻陽明不惟陰虛而陽亦損故手足逆冷而額上生汗生不流也是則汗下皆不可也自汗者邪遍三陽熱搏五合衛疏而表不固榮弱而里不守也夫汗下既皆不可和之於少陽則亦偏於一而非所宜是故白虎者能解秋而徹表裡之熱所以又得為三陽通該之一解也然病屬三陽治又不從陽明而類陽明篇者一則陽明居多二則陽明屬土土者萬物之所歸而病之吉凶生死機焉所以歸重於陽明而入其類例此又叔和之深意也方見太陽下七十四傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之上為去聲此揭下文三條之總濕以汗發不對言詳見痙濕暍篇中里以黃言不可下者里非表裡之裡也寒濕中求之以下文三條言也七十五傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯方麻黃二兩赤小豆一升杏仁四十枚去皮尖連軺二兩連翹根也大棗十二枚劈生薑一兩切甘草一兩炙生梓白皮一升切以上八味以潦水一斗先煮麻黃再沸去上沫內諸藥煮取三升分溫三服半日服盡此條互上條之文以出治並下二條乃三目也麻黃甘草杏仁利氣以散寒麻黃湯中之選要也連軺小豆梓皮行濕以退熱去瘀散黃之領袖也薑棗益土為剋制潦水無力不助濕軺本草作翹翹本鳥尾以草子析開其間片片相比如翹得名軺本使者小車乘馬者無義疑誤七十六傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之此與上略同而較重橘子色言黃之鮮明也腹微滿濕不行也方見前七十七傷寒身黃髮熱者梔子柏皮湯主之梔子柏皮湯方梔子十五枚擘甘草一兩炙黃柏一兩上三味以水四升煮取一升半去滓分溫再服此承上三條而以發熱出治然熱既發於外則里證較輕可知故解之以梔子柏皮而和之以甘草以為退之之輕劑所謂於寒濕中求之者蓋亦參酌乎上三條而近取云也以上四條疑太陽中篇錯簡當移辨少陽病脈證並治第五凡九條方無少陽主半表半裡半不也不表不里者隙地也夫以表實則可汗裡實則可下上實則可吐隙無實可言故汗下吐皆無其法而其合併之病又皆已雜出於太陽陽明篇中所以本篇條目少無可攻之道也無可攻者一則界限也故表裡分先後自此而終始然則隙地反當要衝無治最有關係謂小柴胡湯為通行套藥不擇地而可施豈不悖哉一少陽之病口苦咽乾目眩也少去聲下皆同之下當有為字少陽者膽經也其脈起於目鋭眥靈樞曰足少陽之正上肝貫心以上挾咽出頤頷中故又曰是動則病口苦苦膽之味也咽膽之使也口苦咽乾熱聚於膽也眩目旋轉而昏暈也少陽屬木木生火而主風風火扇搖而燔灼所以然也二少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚首句以攢名揭總舉大綱言三陰篇中如此云云者皆然少陽之脈上抵頭角下耳後其支者從耳後入耳中出走耳前其支者下胸中貫膈肝主目膽為之合風為陽而主氣耳無聞者風塞則氣塞也目赤者風熱則氣昏也胸滿而煩者風鬱則膈熱也少陽本無吐下法其經又多氣少血吐下復傷其經則血愈少而虛血虛則心虛所以神識昏亂怔忡而驚也三傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸少陽屬木故其脈弦細則欲入里也譫語者奪其血液而胃干故心荒而亂也胃和以未至實言不和言實也然上條以風言風主氣故禁吐下此以寒言寒主血故禁汗對舉以示教也四本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯少陽之脈其支者下胸中貫膈絡肝屬膽循脅裡其直者從缺盆下腋循胸過季脅故病則硬滿嘔不能食也往來寒熱見太陽上篇浮緊為弦沉緊者得之寒因也方見太陽上若已吐下發汗溫針譫語柴胡證罷此為壞病知犯何逆以法治之此承上文復以亂治不對而致變劇者言與太陽上篇第五十二條意同以法即隨證之互詞五三陽合病脈浮大上關上但欲眠睡目合則汗太陽脈浮陽明脈大關上乃少陽之部位故曰三陽合病但欲眠睡者熱聚於膽也目合則汗出者少陽少血虛則不與陽和寐屬陰故盜出也六傷寒三日三陽為盡三陰當受邪其人反能食不嘔此為三陰不受邪也陽以表言陰以裡言能食真陽勝而表邪散也不嘔裡氣和而胃氣回也陰不受邪可知也七傷寒三日少陽脈小者欲已也小謂不弦也已愈也八少陽病欲解時從寅至辰上寅卯辰少陽木王之時也邪雖不勝正解必在乎得其時道固如此也外道而言意豈不謬哉九傷寒六七日無大熱其人燥煩者此為陰去入陽故也去往也言表邪往而入於裡所以外無大熱而內則燥煩也愚按太陽中傷傳陽明轉少陽陽去入陰乃風寒之病入自表而漸里通章之大義斯道之自然仲景吃緊為人之要旨也讀者最宜精思熟玩
