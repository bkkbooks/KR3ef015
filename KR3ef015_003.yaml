body:
  text: 卷之三辨太陽病脈證並治下篇第三凡三十八條方十八中風者單隻衛中於風而病也傷寒者單隻榮傷於寒而病也若風寒俱有而中傷則榮衛皆受而俱病故以榮衛俱中傷風寒而病者為下篇蓋寒雖專令乎冬而風則無時不有所以或則單中單傷或則俱有而中傷也單中單傷而為病者已云難治矣然則俱中傷而病者其治不尤難乎何也寒鬚髮汗風則解肌欲並行而不悖其為兩難也何如哉故能發兩難發之汗者名曰青龍能解兩難解之熱者名曰白虎能救無兩難而誤服大青龍之逆者則曰真武焉夫所謂青龍白虎真武者言其靈應不難於其所難妙效驗於不可測度有如此其神神湯之謂也神其神禮記曰唯聖者能之其斯之謂乎學者能明諸此始可與言醫也已一太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈浮弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也以真武湯救之末後六字舊本大青龍湯主之黃氏正之如此蓋既曰不可服服之為逆則安得又復有大青龍湯主之之文傳寫之誤甚明黃氏正之甚是當從之後人又因其更改致疑並六字皆刪之刪之則上篇第二十五條無憑證據故存朱以備通考然此與下條互相發明而同一治故合二說並見於下二傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之大青龍湯方麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁四十枚去皮尖生薑三兩切大棗十二枚擘石膏如雞子大綿裹碎上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也上條太陽中風者言有上篇第三條之證也病屬太陽則脈浮然浮以候風緊以候寒發熱者中風熱即發也惡寒身疼痛不汗出皆寒也風為煩寒則躁蓋謂風寒俱有而中傷風多寒少之證猶指言此風之中有寒之謂也此條傷寒者言有中篇首條之證也緩者風之診身不疼亦風也但重寒也乍有輕時亦為有風而然也無少陰證者言若是但欲寐則涉於少陰之疑似矣今是但重故曰無少陰證亦謂風寒兩中傷榮衛俱受病寒多風少之證猶指言此寒之中有風之謂也蓋風寒二者大率多相因而少相離有寒時不皆無風有風時不皆無寒所以單中單傷者固嘗自是相兼而中傷者亦嘗多有此大青龍之所以作也二條者互文而互相發明以為此篇之小總太陽分病之紀上篇一中篇二此其三焉三者太陽一經吃緊太三辨也以下凡似此云云以為稱首者皆風寒俱有而中傷之證其例則又皆統乎此也夫風寒二治大法不外乎桂枝麻黃之二湯然桂枝湯中忌麻黃而麻黃湯中反用桂枝此中有極深奧義非言語文字可以形容暴白者要在人之心領神會耳大青龍者桂枝麻黃二湯合劑之變制也故為並中風寒之主治校之桂枝麻黃各半湯與桂枝二麻黃一湯則少芍藥而多石膏去芍藥者不欲其收也以其無芍藥而觀之即麻黃湯方加石膏薑棗也薑棗本桂枝湯中所有其制則重在石膏按本草石膏辛甘大寒辛以散風甘以散寒寒以除熱故為並中風寒發熱之用然青龍以桂枝麻黃得石膏之辛甘而有青龍之名其白虎亦以知母粳米得石膏之辛寒而有白虎之名一物二用得君而成其功名於異世神變於時者也夫所謂青龍白虎者青乃木色龍乃木神木主春春熱而煩躁雷雨解而致和焉人之汗以天地之雨名之龍興雲雨至發煩躁之汗而榮衛以和龍之所以為湯神湯之謂也白乃金色虎乃金神金主秋秋熱而燥渴金風解而薦涼焉人之氣以天地之疾風名之虎嘯穀風生解燥渴之熱而表裡以涼虎之所以為湯神湯之謂也然均是龍也而一則曰主之一則曰發之何也主之者以煩躁之急疾屬動而言發之者以但重之沉默屬靜而言之也上條末節脈微弱汗出惡風蓋指上篇陽浮而陰弱中風之證而言中風誤服大青龍則為逆其第二十五條是也與此參看其義自合夫以中風之用桂枝湯傷寒用麻黃湯風寒俱中傷而用大青龍湯向使認病親切於克始用湯的對於及時則三法行之之下風寒尚有餘治乎然則三百九十七一百一十三者醫藥注誤之所致十八九病病傳變之所致無二三由此觀之司命君子可能不惕惕於心乎是故仲景氏之所以若然者豈得已哉惟其不得已故諄諄然曰知犯何逆隨證治之知犯何逆以法治之斯言也豈非深憂天下後世而自致其不能盡其所欲言之意耶嗚呼以仲景氏方法之多如許而猶自致其不能盡其所欲言之意如此則後之以截江殺車活人類證纂要自謂能盡傷寒之治而膠柱以待天下後世者吾不知其是誠何心也三太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之太陽病脈浮緊無汗發熱身疼痛皆與首條同而無惡寒煩躁則是較輕於首條亦風寒俱有而中傷之證也微除言雖未全罷亦已減輕也發煩風壅而氣昏也目瞑寒鬱而血滯也劇作衄之兆也衄鼻出血也鼻為肺之竅肺為陽中之陰而主氣陽邪上盛所以氣載血上妄行而逆出於鼻也陽氣以風而言也風為陽而由氣道所以得隨衄散解故曰陽氣重故也用麻黃湯者以寒屬陰性沉滯而難解所以鬚髮之也方見中篇下同四太陽病脈浮緊發熱身無汗自衄者愈此承上條復以其更較輕者言以見證亦有不治自愈之變所以曉人勿妄治以致誤之意太陽病脈浮緊發熱身無汗與上條同而無疼痛既無疼痛則比之上條又更較輕於首條可知矣所以不待攻治得衄則亦自愈得衄自愈者汗本血之液北人謂衄為紅汗達此義也五傷寒脈浮緊不發汗因致衄者麻黃湯主之以傷寒為首稱而承之以脈浮緊者寒多風少之謂也上二條皆風多寒少前條以服藥已微除汗發不對而致衄上條以較輕得自衄此以寒多不發汗而致衄三條之所以辨差分也蓋寒多則於法當發汗當發而失於不發熱鬱血亂所以衄也衄則陽邪之風散麻黃湯者發其尚未散之寒也六脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以榮氣不足血少故也令平聲此總上三條而著其不可汗之脈所以嚴致戒慎之意也蓋尺以候陰遲為不足血陰也榮主血汗者血之液尺遲不可發汗者嫌奪血也七太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯桂枝麻黃各半湯方杏仁二十四個去皮尖桂枝一兩十六銖去皮芍藥一兩生薑一兩切甘草一兩炙麻黃一兩去節大棗四枚擘上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取一升八合去滓溫服六合八九日約言久也如瘧狀謂有往來寒熱而無作輟之常也發熱惡寒熱多寒少者風寒俱有而寒少風多也不嘔不渴清便欲自可邪之往來出者未徹表入亦未及里也一日二三度發乃邪居淺近則往來易及而頻數故脈亦微緩而謂為欲愈也脈微而惡寒已下重以不得解者言而出其治也陰言後陽言前俱虛故禁攻也更再也不可汗已過表也不可吐下未見有里也熱色陽浮外薄也然陽雖外薄以陰寒持之而不能散所以小汗亦不能得出氣鬱而癢也桂枝麻黃各半湯者總風寒而兩解之之謂也此與第十四篇第二十章互看八太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可更汗宜桂枝二越婢一湯桂枝二越婢一湯方桂枝十八銖去皮芍藥十八銖甘草十八銖炙生薑一兩三錢切大棗四枚擘麻黃十八銖去節石膏二十四銖碎綿裹上七味㕮咀以水五升煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升本方當裁為越婢湯桂枝湯合飲一升今合為一方桂枝二越婢一發熱惡寒熱多寒少與上條同上條以脈微而惡寒為陰陽俱虛此以脈微弱為無陽兩皆不可更汗亦同然風為陽病屬太陽而曰無陽誠不可曉闕疑可也或曰無陽者謂有疾在陰而無在陽也審藥識病即越婢觀之可知矣越逾也過也婢女子之卑者也女子陰也卑少也言其人本來虛弱有宿疾在少陰少陰之脈本微弱而有不可發汗之義所以但責其難發汗之過在於少陰法則謂之無陽方則謂之越婢且是湯也名雖越婢之輔桂枝實則桂枝麻黃之合濟乃大青龍以芍藥易杏仁之變制耳去杏仁者惡其從陽而主氣也用芍藥者以其走陰而酸收也以此易彼而曰桂枝二則主之以不發汗可知而越婢一者乃麻黃石膏之二物則是寓微發於不發之中亦可識也寓微發者寒少也主之以不發者風多而宿疾在少陰也又況首條末節不可服大青龍以發汗亦由脈微弱首條末節者以太陽中風言也此與上二條者皆以風多寒少言也合而觀之則無陽之陽義不微矣乎說者如此未知是否九服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯桂枝二麻黃一湯方桂枝一兩十七銖去皮芍藥一兩六銖麻黃十六銖去節生薑一兩六銖切杏仁十六個去皮尖甘草一兩二銖炙大棗五枚擘上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升日再服服桂枝湯證轉大汗出脈轉洪大者風多寒少風邪欲散而寒持之兩皆不得解而熱反甚也與桂枝湯如前法者重賾之也形如瘧日再發者邪居淺而外向終為微寒所持故曰汗出必解言鬚髮之也桂枝二麻黃一湯者重解風而輕於散寒也十服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之此與上條同而多大煩渴蓋比上條汗更出過多亡津液而表裡燥熱更甚所以用白虎兩解表裡之熱加人參潤其燥而消其渴也方見下十一服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝湯去桂加茯苓白朮湯主之桂枝去桂加茯苓白朮湯方於桂枝湯方內去桂枝加茯苓白朮各三兩余依桂枝湯法煎服小便利則愈服桂枝湯病不解而證變者不獨中風而且有寒也又或下之益誤也仍頭項強痛翕翕發熱無汗者風寒之表皆在而未除也心下滿微痛者誤下而證入里也小便不利下後亡津液而水飲停也去桂枝用芍藥甘草者收重傷之陰而益里傷之虛也薑棗健脾胃而和中下後用之更宜故二物仍其舊也茯苓淡滲以利竅術能益土以勝水本其有停飲之故所以加之以為拯前治之誤也脈經術上無白字十二傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯有熱則不大便為裡實明矣故雖頭痛亦宜承氣湯下之小便清則里無熱可知故曰仍在表宜發汗然小便清而頭痛陽邪上盛也故衄可必而宜桂枝湯解之承氣湯有四方此不明言要當隨證辨用耳桂枝湯方見上篇十三傷寒脈浮滑此表有熱里有寒白虎湯主之白虎湯方知母六兩石膏一斤碎綿裹甘草二兩炙粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服傷寒見中篇首條其脈不浮浮者風也言不獨傷於寒而亦有風則然也滑為裡熱以滑且浮知熱不獨在裡也故指言此表有熱蓋表裡俱熱之謂也里有寒者里字非對表而稱以熱之裡言蓋傷寒之熱本寒因也故謂熱里有寒指熱之所以然者言也夫寒與風俱中傷表與里既皆熱欲兩皆而解之誠哉極其難也譬如夏秋兩屆之間燥熱酷甚非金風之薦涼則暑毒不解也是故白虎者西方之金神司秋之陰獸虎嘯穀風冷涼生酷暑消神於解秋莫如白虎知母石膏辛甘而寒辛者金之味寒者金之性辛甘且寒得白虎之體焉甘草粳米甘平而溫甘取其緩溫取其和緩而且和得伏虎之用焉飲四物之成湯來白虎之嗥嘯陽氣者以天地之疾風名也湯行而虎嘯者同氣相求也虎嘯而風生者同聲相應也風生而熱解者物理必至也抑嘗以此合大小青龍真武而論之四物者四方之通神也而以命方蓋謂化裁四時神妙萬世名義兩符實自然而然者也方而若此可謂至矣然不明言其神而神卒不容掩者君子盛德此其道之所以大也與此與厥陰篇第二十五條互看十四傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之白虎加人參湯方用白虎湯方內加人參三兩余依白虎湯法傷寒脈浮與上條同發熱無汗風寒之表在也故謂不解不可與白虎者白虎義取解秋嘯穀風而涼收燥熱非為發表也渴欲飲水者裡熱燥甚希救也無表證謂惡寒頭身疼痛皆除非謂熱也以證大意與上條同故主冶亦與之同以多渴也故加人參之潤以滋之也十五傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之無大熱風微也口燥渴心煩裡熱甚也背者太陽經脈之所適人身至陰之地不勝寒而有餘惡所以微也以上三條大意互相發明所以治亦相倣佛而不甚殊十六傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方桂枝三兩去皮甘草二兩炙生薑三兩切牡蠣五兩熬龍骨四兩大棗十二枚擘蜀漆三兩洗去腳上為末以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升亡陽者陽以氣言火能助氣甚則反耗氣也驚狂起臥不安者神者陽之靈陽亡則神散亂所以動皆不安陽主動也桂枝甘草和傷寒之脈浮蜀漆辛平散火邪之錯逆龍骨牡蠣固澀以收陽神之散亂大棗生薑醒脾以緩起臥之不安去芍藥者嫌其主陰則反得以勝陽也十七火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之桂枝甘草龍骨牡蠣湯方桂枝一兩去皮甘草二兩炙牡蠣二兩熬龍骨二兩上四味為末以水五升煮取二升半去滓溫服八合日三服火逆承上條而言也然雖逆而又逆而證則未變重故方物反差少而大意不殊十八脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也痹濕病也因火逆治火邪夾陽邪而上逆真陽不下通陰不用事化不行而水不得泄故濕著下體而重痹也十九傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩燥吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之甘草乾薑湯方甘草四兩炙乾薑二兩炮上㕮咀以水三升煮取一升五合去滓分溫再服芍藥甘草湯方白芍藥四兩甘草四兩炙上二味㕮咀以水三升煮取一升半去滓分溫再服之調胃承氣湯方大黃四兩去皮清酒浸芒硝半斤甘草二兩炙上三味㕮咀以水三升煮取一升去滓內芒硝更上微火煮令沸少少溫服四逆湯方甘草二兩炙乾薑一兩半附子一枚上三味㕮咀以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩數音朔反音板腳攣急者足經始終於足寒則拘攣也以上言風寒俱有之表裡證故謂與桂枝湯為反蓋桂枝是中風之主治反不順也厥謂四肢冷也咽中干煩燥吐逆者誤汗損陽陽虛陰獨盛也甘草益氣乾薑助陽復其陽者充其氣之謂也厥愈足溫陽氣復也芍藥用白酸能斂陰而主血也甘草用炙甘能補中而益脾也腳即伸陰血行也蓋以一誤治而表裡俱傷故必求陰陽如此次第而俱復胃不和而譫語者亡津液而胃實也承氣而曰調胃者以胃屬陽而主裡故用甘草和陰陽而緩中也重發汗而復加燒針則二者皆有以大損於陽矣故用偏於助陽之四逆以救其陽也問曰證象陽旦按法治之而增劇厥逆咽中干兩脛拘急而譫語師曰言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病證象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中干煩燥陽明內結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈脛音幸此申釋上文意象似也陽以風言旦曉也言似中風分曉以不啻中風故設難詳申其義且明治不可苟序不可紊以致戒慎之意末後不復言若重發汗以下一節者以其或然或不然故也二十傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門寸口氣口也五臟別論帝曰氣口何以獨為五臟主岐伯對曰胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣而變見於氣口也故寸口主脾胃浮緊為弦是肝脈也乘脾者肝木自盛脾胃之土受制也縱見辨脈法上篇期門見太陽上篇刺之者瀉木以救土也二十一傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門傷寒發熱嗇嗇惡寒風寒尚在太陽而未除也大渴欲飲水者肝木本自盛而邪熱熾欲得潤也腹必滿者水漫而泛濫也自汗出則津液得外滲矣小便利則水得下行矣夫水木之母也母必為子木得水則益甚而橫故挾水為邪反侮所不勝而上乘於肺肺金若虛受其邪而不能派散之則水不得泄而腫作矣乃金臟實不納其邪而轉運散之渙為自汗而外滲瀦為小便而下行此肝乘肺者所以不足為害而反欲自解也橫亦見辨脈法上縱同條然縱橫不同而同刺期門者縱以木賊土橫以木侮金皆由木自盛而以瀉木為主治一也二十二脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳濡與軟同古字通用復亦反也緊反入里言寒邪轉內伏也濡言不硬不痛而柔軟也痞言氣隔不通而痞塞也易曰天地不交而萬物不生也內陰而外陽也內柔而外剛也本義曰蓋乾往居外而坤來居內也雖然傾痞有先痞後喜之象故君子不可不勉學者不可不知所務二十三心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之大黃黃連瀉心湯方大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去滓分溫再服此申上條言脈以出其治脈見關上者以痞在心下也以氣痞而濡所以浮也然痞之濡由熱聚也故用黃連清之於上聚雖氣也痞則固矣故用大黃傾之於下麻沸湯者其取圖經所謂去瘀之義歟二十四心下痞而復惡寒汗出者附子瀉心湯主之附子瀉心湯方大黃二兩黃連一兩黃芩一兩附子一枚炮去皮別煮取汁上四味切三味以麻沸湯二升漬之須臾絞去滓內附子汁分溫再服痞本陰邪內伏而虛熱上凝復惡寒汗出則表虛而陽不為衛護可知矣瀉心湯固所以為清熱傾痞之用加附子蓋所以為斂其汗而固其陽也黃芩為附子而更加表裡兩解具見矣二十五病脅下素有痞連在臍旁痛引少腹入陰筋者此名臟結死素舊常也臍旁陰分也臟陰也以陰邪結於陰經之臟攻之不可及所以於法為當死也二十六臟結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也無陽證言當臟結之時表已罷除無太陽也不往來寒熱言痞雖屬脅下由素常有而發非少陽傳經之邪也反靜言無陽明之譫妄也舌心之苗也苔滑生長滑膩如胎膜也苔滑本由丹田有熱胸中有寒而成然丹田陰也胸中陽也熱反在陰而寒反在陽所以為不可攻也二十七問曰病有結胸有臟結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也何謂臟結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治此設問答以明結胸臟結之同異時時下利者陰邪結於陰臟而寒甚也以寒甚故脈多小細與緊此其所以下同蓋結胸以陽邪結於陽臟結以陰邪結於陰故也末復申言臟結有難治之故者叮嚀戒謹之意也二十八傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之小青龍湯方麻黃三兩去節芍藥三兩五味子半升乾薑二兩甘草三兩炙半夏半升洗桂枝三兩去皮細辛三兩上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升水氣謂飲也咳與喘皆肺逆也蓋肺屬金金性寒水者金之子故水寒相摶則傷肺也或為多證者水流行不一無所不之也夫風寒之表不解桂枝麻黃甘草所以解之水寒之相摶乾薑半夏細辛所以散之然水寒欲散而肺欲收芍藥五味子者酸以收肺氣之逆也然則是湯也乃直易於散水寒也其猶龍之不難於翻江倒海之謂歟夫龍一也於其翻江倒海也而小言之以其興雲致雨也乃大言之能大能小化物而不泥於物龍固如是夫白虎真武雖無大小之可言其於主乎人身而為四體之元神則不偏殊故在風寒之厲病皆有感而遂通之妙應若謂與在天之主四時者期如此則去道遠矣故曰道不遠人而不為索隱行怪者聖腎無身外之道也老氏以降龍伏虎為造道之始其亦知夫反求諸身之謂乎讀者顧可忽哉加減法或為諸證之治若微利者去麻黃加蕘花如雞子大熬令赤色麻黃髮汗利則不宜而或為諸證皆去者以汗則重亡津液也利水橫行也加蕘花導水也若渴者去半夏加栝蔞根三兩渴津液不足也去半夏以其燥津液也加栝蔞根以其徹熱而生津也若噎者去麻黃加附子一枚炮噎與䭇咽同水寒窒氣也附子者利氣散水寒也若小便不利少腹滿去麻黃加茯苓四兩水停下焦而不行則小便不利而少腹滿茯苓淡滲故能通竅而利水道也若喘者去麻黃加杏仁半升去皮尖喘水氣射肺而聲息不利也加杏仁潤肺以下其氣也二十九傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之發熱不渴寒勝也故以服湯已而渴為寒去欲解大意與上條相仿故治亦同三十太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也二三日邪熱正熾之時也不能臥但欲起者邪屬裡而熱壅甚所以知其心下必結也寒分與溫病等篇第四條之寒分同所以脈微弱也利止作結胸熱反上逆也四日承上文二三日而言也末句此下疑有脫誤三十一傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之傷寒不汗出得汗出則解不解者以有風而誤於偏攻熱反入里所以變痞硬嘔吐而下利也大柴胡湯者合表裡而兩皆解之也方見上篇三十二發汗若下之病仍不解煩燥者茯苓四逆湯主之茯苓四逆湯方茯苓六兩人參一兩甘草二兩炙乾薑一兩附子一枚生用去皮破八片上五味以水五升煮取三升去滓溫服七合日三服誤汗則亡陽而表疏誤下則亡陰而里傷煩燥者風寒俱有而熱甚也茯苓人參入心以益虛心安則液斂也四逆湯者回陽以復陰陽倡則陰隨也三十三傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之不解以大勢言不獨謂表也表裡俱熱言風寒俱有也時時惡風言表未除也以舌乾燥煩而表裡之熱俱甚故用白虎以大渴欲飲水故加人參方見前三十四傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解表以頭汗出微惡寒手足冷言里以心下滿口不欲食大便硬言陽微結謂由陽氣衰微故結不可全責病於陰也脈沉亦在裡言不但細為在裡以見表裡證俱有也汗出為陽微至此為半在裡半在外也一節是申釋上文脈雖沉緊至故知非少陰也一節言此但以頭汗可辨為有陽不然余皆似少陰曉人當致精細大意類第二條第二條以中傷之初故脈如彼而用大青龍以發汗此以五六日證屬半表半裡而脈如此故從小柴胡以和解之也末言和之若猶不愈則當消息胃實而用治故曰得屎而解三十五傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之黃連湯方黃連三兩甘草三兩炙乾薑三兩人參二兩桂枝三兩去皮半夏半升洗大棗十二枚擘上七味以水一斗煮取六升去滓溫服一升日三服夜二服胸上焦也熱以風言陽也言陽熱摶於上焦也胃中焦也邪氣以寒言陰也言陰寒鬱於中焦也腹中痛陰凝而窒滯也欲嘔吐熱壅而上逆也夫熱摶上焦黃連清之非桂枝不解也寒鬱中焦人參理之非乾薑不散也甘草大棗益胃而和中半夏辛溫寬胸而止嘔吐也三十六傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸抵當丸方水蛭二十個熬虻蟲二十五個熬去翅桃仁二十個去皮尖大黃三兩上四味杵分為四丸以水一升煮一丸取七合服晬時當下血若不下更服應平聲晬音醉此與上篇第二十一以下三條同以風寒俱有而比上篇為難解故用上篇之方而變湯為丸然名雖丸也猶煮湯焉夫湯蕩也丸緩也變湯為丸而猶不離乎湯其取欲緩不緩不蕩而蕩之意歟且曰不可余藥言即使如上篇之用湯猶未為對必如是而後可亦奇制也其猶兵家之八陳歟八陳武侯兵也變則反正為奇以奇為正謂醫與將同道者尚在同一權變哉晬時周時也三十七得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食谷者噦六七日經盡之時也脈遲浮弱風寒入里而表未除所以猶惡風寒也手足溫半入於裡而未可下也不能食誤下而里傷也脅下滿痛邪摶少陽也面目及身黃土受木賊而色外薄也頸項強太陽陽明之證猶在也小便難亡津液也後以大便言下重者柴胡寒里陰已虛而氣滯也本渴而飲水嘔者水逆也柴胡不中與者以嘔由水逆非少陽或為之證也食谷者噦言過飽則亦當噦噫申明上文嘔非柴胡所宜之意末後疑有脫落三十八傷寒十三日不解過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之熱風也言俗謂傷寒過經不解者以庸下不省並中有風誤於治之所致也若自下利至末乃推明其所以為誤而出其救誤之治反和以不厥言非宜謂平和方見前
