body:
  text: 卷之一辨太陽病脈證並治上篇第一凡六十六條方二十太陽一經風寒所始營衛二道各自中傷風則中衛故以衛中風而病者為上篇然風之為風其義不一故其為病最為居多所謂中風者乃風寒暑濕之風也與諸家方書之所謂中風雲者義不相同諸家方書之所謂中風蓋素問曰陽之氣以天地之疾風名之之風也彼但以其所謂者為中風雲耳其於在此之所謂中風雲者則無聞焉二義辨論精切詳悉分曉惟有此書自此以下知此義者李明之而已此義不明而欲求以言醫猶緣木求魚耳其如醫何此篇舊本第五而次辨脈傷寒例痙濕暍諸篇之下然世傳諸篇皆叔和所述今案傷寒例一篇則又疑非叔和語夫以叔和編經奚恁後經而先已必後之贅附遂致顛倒錯亂故條辨之以復其初云一太陽之為病脈浮頭項強痛而惡寒強群養切惡影固切下皆仿此太陽者膀胱經也其脈起於目內眥上額交巔從巔入絡腦還出別下項連風府循肩膊內挾脊抵腰中乃六經之首主皮膚而統榮衛所以為受病之始也難經曰浮脈在肉上行也滑氏曰脈在肉上行主表也表即皮膚榮衛麗焉故脈見尺寸俱浮知為病在太陽之診也項頸後也強痛者皮膚榮衛一有感受經絡隨感而應邪正爭擾也惡寒者該風而言也風寒初襲表而鬱於表故不勝覆被風寒外忤而畏惡之及其過表而入里則不復惡仇讎之義也此揭太陽之總病乃三篇之大綱以下凡首稱太陽病者皆指此而言之也二太陽病發熱汗出惡風脈緩者名為中風惡與惡寒之惡同中音衆下皆同太陽病上條所揭云云者是也後皆仿此發熱風邪干於肌膚而鬱蒸也汗出腠理疏玄府開而不固也惡風大意見上此以風邪郁衛故衛逆而主於惡風緩即下文陽浮而陰弱之謂風性柔和所以然也中當也風謂天之八風也言既有如上條所揭云云之太陽病加之發熱汗出惡風而脈緩者則其病乃是觸犯於風而當之也靈樞曰夫天之生風者非以私百姓也其行公平正直犯者得之避者得無殆非求人而人自犯之此之謂也然風之為風其性屬陽其中人也從衛而入衛氣道也風之所以從衛入者衛亦陽從其類也此承上條而又再揭太陽分病之紀一乃此篇之小總篇內凡首稱太陽中風者則又皆指此而言也下條乃釋此條之義以出其治余則或申此義與凡此條之衆目耳中篇下篇其為證候與此雖不同其為節目在彼則亦然乃太陽之大三辨也而各篇之中其條目則各自又有辨焉皆風寒之分別也學者誠能潛心涵泳體認的當則風寒之是非瞭然明白矣尚何獨斷之難能哉三太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之桂枝湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服小促役其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物嗇審革切淅心吉切翕曉吉切去上聲滓照兒切啜與啜同漐音石差與瘥同令平聲臭惡之惡如字此申上條而詳言之釋其義以出其治太陽中風乃掇上條所揭攢名以指稱之猶上條掇首條所揭而以太陽病為首稱同一意也陽浮而陰弱乃言脈狀以釋緩之義也難經曰中風之脈陽浮而滑陰濡而弱是也陽浮者熱自發陰弱者汗自出乃承上文而言以釋發熱汗出之義言惟其脈之陽浮所以證乃熱自發也惟其脈之陰弱所以證乃汗自出也關前陽外為陽衛亦陽也風邪中於衛則衛實實則太過太過則強然衛本行脈外又得陽邪而助之強於外則其氣愈外浮脈所以陽浮陽主氣氣鬱則蒸熱陽之性本熱風善行而數變所以變熱亦快捷不待閉鬱而即自蒸發故曰陽浮者熱自發也關後陰內為陰榮亦陰也榮無故則榮比之衛為不及不及則不足不足則弱然榮本行脈內又無所助而但是不足於內則其氣愈內弱脈所以陰弱陰主血汗者血之液陰弱不能內守陽強不為外固所以致汗亦直易不待覆蓋而即自出泄故曰陰弱者汗自出也嗇嗇惡寒淅淅惡風乃雙關之句蓋原太陽本惡寒而明其所以亦惡風之情狀也嗇嗇言惡寒出於內氣餒不足以耽當其滲逼而惡之甚之意淅淅言惡風由於外體疏猶驚恨雨水卒然淅瀝其身而惡之切之意蓋風動則寒生寒生則膚粟惡則皆惡未有惡寒而不惡風惡風而不惡寒者所以經皆互文而互言之不偏此偏彼而立說也翕翕發熱乃形容熱候之輕微翕火炙也團而合也言猶雌之伏卵翕為溫熱而不蒸蒸大熱也鼻鳴乾嘔乃詳上條之未備鼻鳴者氣息不利也乾嘔者氣逆不順也蓋陽主氣而上升氣通息於鼻陽熱壅甚故鼻窒塞而息鳴氣上逆而乾嘔也然翕翕發熱難曉而鼻鳴乾嘔易見有鼻鳴乾嘔則翕翕發熱可徵矣方之為言義之所在也言中風之治宜在是物也主主當也言以是為主當而損益則存乎人蓋脈證無有不相兼而見者所以經但活潑潑不欲人拘執之意也桂枝其性味雖辛甘而屬乎陽其能事則在固衛而善走陰也芍藥擅酸寒而下氣快收陰而斂液夫衛氣實而腠理開疏矣非桂枝其孰能固之榮血虛而汗液自出矣非芍藥其誰能收之以芍藥臣事桂枝而治中風則榮衛無有不和諧者佐之以甘草而和其中則發熱無有不退除者使之以大棗而益脾使之以生薑而止嘔皆用命之士也微火者取和緩不猛而無沸溢之患也滓澱垽也古人藥大劑金鐺中煮綿絞漉湯澄濾取清故曰去滓啜大飲也熱稀粥者桂枝湯劫敵之奇兵應赤幟於必勝之陳也助藥力微旨也譬如釋氏之禪機老氏之玄關儒家之心法也漐漐和潤而欲汗之貌微似二字最為要緊有影無形之謂也不可禁止之詞也如水流漓言過當也病必不除決言不遵節制則不效驗也小促役催速值事也禁者若物皆病之反也凡此事宜皆責之醫家耳病家安能料理今人之醫惟務拱默以自崖岸至不獲效則反疑猜而多口於桂枝諸家集方何嘗見啜熱稀粥四字徒以發汗相授受微似視為羡文殊不知桂枝神算捷在出奇苟簡之弊牢不可破籲手足胼胝禹稷之所以聖也然則任治君子苟未至於胼胝亦何憚而不然也若曰何如此其屑屑則脫有不中其咎將誰歸與數變之數音速四桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此令勿誤也為去聲識與志同令平聲此原所以用桂枝之奧義因著其反而示禁以見藥有反對勉人當精其義以求的當之意解者救護而釋散之之謂也肌膚肉也蓋風中衛而衛不固發熱汗出而惡風衛行脈外膚肉之分也桂枝救護之熱粥釋散之病之所以解也故曰本為解肌浮病在太陽也緊寒也汗不出亦寒也不可與言病不對禁勿妄投也然則桂枝湯之發汗云者奧義也識記也記其政事謂之識言當常常用心以記其事勿忘勿怠而不可使有一忽之失誤蓋有寒不得用桂枝故致戒警如此其言亦甚深切著明矣而人猶自誤亦獨何哉五凡服桂枝湯吐者其後必吐膿血也桂枝辛甘大熱胃家濕熱本甚者復得桂枝之大熱則兩熱相搏於中宮搏則必傷甘又令人中滿壅氣而上溢所以胃不司納反上湧而逆出也然胃屬土土者金之母肺屬金金者土之子母病固傳子胃家濕熱甚則必傳之肺肺受胃之濕熱與邪熱搏鬱而蒸久熱為火肺為金膿血者金逢火化也六若酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也此承上條所言復舉一端以申之欲人推此以及其餘酒客者酒性濕熱所謂胃家濕熱甚者無逾此也嘔亦吐也得湯則嘔以不喜甘見上然即酒客不喜甘得湯則嘔而推之則凡服桂枝湯而吐者其義皆可以比類而察識矣觸類而通之亦存乎其人焉耳七發汗後水藥不得入口為逆若更發汗必吐下不止以上四條皆言桂枝之不對以嚴示禁之意水藥不得入口言嘔吐之甚也夫中風服桂枝湯以發汗桂枝湯者甘藥也傷寒服麻黃湯以發汗麻黃湯中亦有桂枝則亦甘藥也以發汗藥皆有桂枝之甘而言之則此條曰發汗後水藥不得入口者乃承上二條復又通以得湯則嘔之甚者言而深寓戒警之意也逆者言悖於道也蓋不通人之性氣而逆治則亦適足以致病逆而生變故曰為逆也必吐下者言水藥既不得入口則胃已傷若仍與前湯而重傷則必致大壞大壞則大亂夫胃中腑也苟大壞亂則不惟復上逆而仍嘔吐必將下加走泄而增瀉利矣不止蓋甚言害大以深著致戒之意也八病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也此原中風傷寒之所以始以要其所以終之意凡在太陽皆惡寒也發熱惡寒者中風即發熱以太陽中風言也發於陽之發起也言風為陽衛中之衛亦陽其病是起於陽也無熱惡寒者傷寒或未發熱故曰無熱以太陽傷寒言也發於陰者言寒為陰榮傷之榮亦陰其病是起於陰也七少陽之數也六老陰之數也陽數九為老七為少陰數老六而少八者陽道順陰道逆陽主進陰主退也愈瘳也風寒中傷人漸次人身六經之部位而傳進以一日一經言之中風六日經雖傳遍必七日陽進而病自愈者陽主生也傷寒六日經傳遍陰退極病乃愈者陰主殺也然則中風傷寒之所以為病其始也各從其類而起其既也各得其數而愈二氣相因天人一致道妙自然其機如此易曰知機其神乎又曰原始反終故知死生之說醫有易道至哉言也孫思邈曰不知太易不足以言醫學者不可不察苟志於道不可不勉九太陽病頭痛至七日以上自愈者以行其經盡故也若欲再作經者針足陽明使經不傳則愈傳音囀見第五問後仿此此承上條下節之自愈者復申其已然者之義而又更著其未然者之治太陽頭痛首條已具言之此又獨言者舉大意也七日以上該六日而言也行亦傳也經盡謂傳遍也欲作再經謂病加進也針足陽明奪其傳路而遏之也傳與陽明篇轉互音義猶古之驛傳今之過所云也十太陽病欲解時從巳至未上太陽者盛陽也故王於巳午未經曰自得其位而起者此之謂也十一欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也此承上條復曉人以病解之機煩字從火從頁說文頁頭也然則煩者熱悶而頭痛之謂也先煩邪欲出而與正分爭作汗之兆也乃有汗謂不如此則汗不得出也脈浮邪見還表也汗出邪出也解者邪散而病去也十二燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩桂枝加桂湯方於桂枝湯方內更加桂二兩成五兩餘依桂枝湯法令平聲少去聲上衝之上上聲此又承上條復著不喻者妄意攻之之變與其救變之治也燒針者針性寒必須先燒使之溫而後可用也被寒言寒遂從針穴反得又入也核謂針穴處肉變紅腫高起如核也奔豚腎之積名也氣從少腹上衝心奔豚證發作之狀也蓋人之素有腎積者因針穴處寒得入之其積遂發則氣自少腹上逆而衝心狀若驚豚突前而奔走故曰奔豚也灸其核上者所以散其寒也與桂枝湯者解其欲自解之肌也加桂者桂走陰而能伐腎邪故用之以泄奔豚之氣也然則所加者桂也非枝也方出增補故有成五兩云耳加減諸方經止言加減原無載方舊本後人增補成方類附卷末而多謬誤今依增補校勘移就各該法下以便用者不費尋討云十三太陽病頭痛發熱汗出惡風者桂枝湯主之此與前第二條文雖差互詳略而證治則一前條有脈無頭痛以揭病名此有頭痛無脈以言治互相詳略耳無異殊也蓋前條以為揭病名也故必言脈而後可以為得盡其詳以頭痛已見於首條之太陽病也故可得而略焉此以從泛言而論治也故雖不言脈不足以為略詳及頭痛者以前條既遺此申之所以為互相發明之意也桂枝湯方見前下同十四太陽病發熱汗出者此為榮弱衛強故使汗出欲救邪風者宜桂枝湯主之此亦申上條而釋之與前第三條申釋第二條之意同第三條言陽浮而陰弱此言榮弱衛強衛強即陽浮榮弱即陰弱彼此互言而互相發明者也救者解救救護之謂不曰風邪而曰邪風者以本體言也十五太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈此乃默喻人以救服湯不如法發汗不如經因而生變者之微旨讀者當以意逆斯則得之毋徒影射可也蓋桂枝全在服法發汗切要如經若服不如法汗不如經經曰病必不除豈惟病不除風愈得入而變愈劇所以反煩反轉也言轉加熱悶也先刺風池風府者預為杜塞風之門路也風池二穴在耳後陷者中按之引於耳中手足少陽脈之會刺可入同身寸之四分風府在項上入髮際同身寸之一寸大筋內宛宛中督脈陽維二經之會刺可入同身寸之四分十六太陽病外證未解脈浮弱者當以汗解宜桂枝湯外證未解謂頭痛項強惡寒等猶在也浮弱即陽浮而陰弱此言太陽中風凡在未傳變者仍當從於解肌蓋嚴不得下早之意故下條云十七太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯主之下去聲後皆仿此此承上條當汗解之旨更並下早之禁而申言之重致叮嚀之意也下通大便也亦謂攻裡是也夫所謂治病之道者即其病之所在從而療理之求所以去之之謂也病在東而療西欲其去也其可得乎蓋風寒者外邪也皮膚肌肉者人之外體也外邪外入猶在外體汗之所以逐其還復外散則於理為順而於道為合也下而通大便通腑也腑內也病在外而求之內欲何求哉於理則不順故於道則顛倒悖戾而謂為逆也經曰從外而之內者治其外正謂此也故上下條反復深致戒謹如此十八太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯主之反音板下仿此復亦反也此總上二條而申釋之重致反復叮嚀戒謹之意十九風家表解而不了了者十二日愈風家謂中風之病也表外證也解罷也了了猶惺惺也言中風之病外證俱罷大勢已除餘邪未盡猶未復初也十二日經盡之時也言至此時則餘邪當悉去而初當復也蓋曉人當靜養以待勿多事反擾之意素問曰食養盡之毋使過之傷其正也此之謂也二十中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散主之五苓散方豬苓十八銖去皮茯苓十八銖澤瀉一兩六銖白朮十八銖桂半兩上五味為散以白飲和服方寸匕日三多服暖水汗出愈散上聲和去聲此太陽中風失於未治久而入里之證蓋中風發熱必自汗出六七日不解出為過多可言也煩者汗出過多亡津液而內燥也表以外證未罷言里以煩渴屬腑言欲飲水者燥甚而渴希救故也吐伏飲內作故外者不得入也蓋飲亦水也以水得水湧溢而為格拒所以謂之曰水逆也澤瀉長於行水由其鹹寒能走腎也術性最善勝濕以其苦甘而益脾也二苓淡滲利水以滋干桂擅辛甘祛風而和表然術與澤瀉有苓事也桂與苓者豈非以其走陰而致師邪謂五苓散兩解表裡而得汗者里屬腑腑者陽也表本陽所以一舉而兩得故曰汗出愈也術上不當有白字說在本草鈔術條下是書編始於叔和叔和有脈經脈經術上皆無白字足可徵也然則白為後人所加明甚嗚呼一字之加雖微自夫執方者視之為禍後世甚大所謂殺人以政無異於刃者此不殆有甚邪二十一太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯桃核承氣湯方桃仁五十個去皮尖桂枝三兩去皮大黃四兩芒硝二兩甘草二兩炙上五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利去上皆上聲內音納更下先皆去聲合音鴿後皆仿此熱結膀胱即下條太陽隨經瘀熱在裡之互詞狂心病也心主血而屬火膀胱居下焦而屬水膀胱熱結水不勝火心火無制則熱與血搏不自歸經反侮所不勝而走下焦下焦蓄血心雖未病以火無制而反侮所不勝故悖亂顛倒語言妄謬與病心而狂者無異故曰如狂也血自下則邪熱不復停故曰愈也少腹指膀胱也急結者有形之血蓄積也桃仁逐血也桂枝解外也硝黃軟堅而蕩熱也甘草甘平而緩急也然則五物者太陽隨經入腑之輕劑也先食謂先服湯而飲食則續後進也二十二太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之抵當湯方水蛭三十個熬虻蟲三十個熬去翅足大黃三兩桃仁二十個去皮尖上四味為散以水五升煮取三升去滓溫服一升不下再服少下血不下之下抵當之當皆去聲瘀影據切去上聲此承上條而復以其較重者言詳其義變制以出其治上言不解此言表證仍在上言當先解外此言脈與反不結胸發狂則主血之心亦病而重於如狂硬滿即急結皆上條變文之互詞小便自利見下下血言不自下者當須下之皆互相發明者也所以然者至末結上起下以發出治之詞里膀胱也腑也故曰隨經瘀血氣壅祕也抵至也水蛭虻蟲攻堅而破瘀桃仁大黃潤滯而推熱四物者雖曰比上則為較劇之重劑然亦至當不易之症治也二十三太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之此總上二條而分曉之以決言抵當為的於用之意黃瘀熱外薄也小便不利以下承上文以辨白上二條而分別之也諦審也言如此則為血證審實無復可疑必須抵當者乃其的對勉人勿二之意也二十四太陽病發汗後大汗出胃中干煩燥不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之燥音掃乾音干令字讀平聲傷寒宜發汗發汗則病解中風宜解肌發汗則變生然則太陽病發汗後大汗出者中風誤於發汗變也胃中乾者汗出過多亡津液也煩燥者干則燥燥則熱熱則煩也不得眠者胃為陰干則不足不足則不和不和所以不得眠也素問曰胃不和則臥不安此之謂也欲得飲水者熱思涼而燥作渴引水以自救也少少與者胃屬土土乾固燥得水則潤潤則和和則萬物生所以愈也不然多則潦潦則反為土所惡矣若脈浮言或不即愈而脈又轉單浮之謂浮則邪見還表可知矣小便不利土乾則水竭也微熱邪還表則病已減故熱亦輕也消言飲水而小便又不利則其水有似乎內自消也渴言能飲且能多也五苓散者導濕滋干功兼其全也幹得滋而濕得導則熱不期退而自退病不言愈而愈可知此又用五苓之一義也方見前二十五太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之悸群季切眩匣絹切瞤日倫切振平聲劈滂吉切此舉下篇首條末後為逆之一節更互其詞以詳其義出其治以救其逆蓋太陽中風誤服大青龍而致逆之救法也發汗而病不解者其為誤汗可知也仍發熱言汗雖出病依舊在也悸怔忡也眩昏暈也瞤漐動也振振振作也劈拊心也言心怔而忡頭昏而暈肉漐而動手拊心而無何可奈厥逆筋惕肉瞤變文之互詞也夫太陽中風陽浮陰弱汗出惡風例雖名曰發汗義則實在解肌解肌者桂枝湯也法曰遍身漐漐微似汗者益佳不可令如水流漓病必不除苟至流漓豈惟病不除多見亡陽而虛甚也微弱與浮弱大略相倣佛亦互文也汗出惡風桂枝證也服大青龍勢必流漓可知仍發熱翕翕不除而變甚也厥逆而至於振振欲劈地嗇嗇淅淅變劇也病變劇矣亡陽虛甚矣大敵在前良將重選是故茯苓行水術性導濕濕導水行祖龍歸海也芍藥收陰附子回陽陽回陰收鐵甲當關也生薑以醒其昏為救厥逆之劇蓋龍之為龍方其旱也固奮然升天行雨以顯諸仁及其潦也則又幡然蹈海潛淵以藏諸用行雨者致水也潛淵者伏水也然則水也者龍之所以神其變化者也而真武者則又專位乎北而為司水之神也龍既不能外水以自神水又必由真武以神其主大哉青龍吾知其不能不降於真武矣道之所符而自然之驗固如是夫是故誤服神湯而變劇者必有神湯而後救也神乎神乎聖而不可知之之謂此非細義讀者最宜致思方見少陰篇二十六太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之桂枝加附子湯方於桂枝湯方內加附子三枚余依桂枝湯法此亦太陽中風誤汗之變證發汗遂漏不止者由反治所以汗反出而勢不容已也惡風者太陽中風本自汗出腠理疏而惡風既漏不止則腠理愈疏而惡愈甚也小便難者汗漏不止則亡陽亡津液亡陽則氣不足亡津液則水道枯竭且小便者膀胱所司也膀胱本太陽經而為諸陽主氣氣不足則化不行也四肢微急難以屈伸者脾統血而主四肢胃司津液而為之合津液亡而胃不足則脾亦傷而血亦虧血氣虧澀筋骨所以不利也夫固表斂液無出桂枝之右矣而欲復陽益氣所以有附子之加焉然三枚蓋出於增補非經之本文用者宜參酌二十七風濕相摶骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之甘草附子湯方甘草二兩炙附子二枚炮去皮臍破白朮二兩桂枝四兩去皮上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合為妙摶定文切劇群吉切去溪矩切摶掜聚也言風與濕掜合團聚共為一家之病也有本來感受天地之風濕而為風濕相摶者有中風汗出過多濕沾衣被致成風濕相摶者有傷寒發汗過多衣被不更變而為風濕相摶者三者所受之因雖殊而其為病則一故其為治亦皆大略相同此蓋以中風之風濕相搏而言煩風也痛濕也風淫則掣濕淫則痛風濕之邪注經絡流關節滲骨髓四體所以煩疼掣痛而不利也近之則痛劇者外邪客於內忤之則逆也短氣者汗多亡陽而氣傷也惡風不欲去衣者以重傷故惡甚也或未定之詞身微腫濕外薄也不外薄則不腫故曰或也甘草益氣和中附子溫經散濕術能勝水燥脾桂枝祛風固衛此四物者所以為風濕相搏之的藥也二十八太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿而喘口乾咽爛或不大便久則讝語甚者至噦手足躁擾捻衣摸床小便利者其人可治衄疑木切讝素問作譫與詹同下仿此強奪而取之之謂劫邪風被火熱承上起下之詞言太陽中風不當如此治故曰失其常度著其變以致戒之意也兩陽謂風火也黃脾土之色也脾主肌肉邪熱甚則土燥故色顯然著見於外也陽盛陽以氣言火能助氣故盛也欲衄待衄未衄之詞陰虛陰以血言熱則耗血故虛也小便血液之類也血耗故難也然火能助氣過則反敗氣所以陰陽俱虛竭言血氣俱虧乏也身體則枯燥承上文而言虧乏之徵也劑齊分也言汗自頭出至頸自頸齊分還而不下靈樞曰諸陰脈皆至頸胸中而還獨諸陽脈皆上至頭耳然則是乃陽有汗而陰不汗也腹滿邪內實也微喘熱攻於肺肺受熏蒸而氣促急也口乾陰虛而津液不足也咽爛炎蒸而成腐壞也或不大便言津液不足有時或則便硬也譫語寐中多言妄語蓋言出於心火盛血衰心虛而神亂也噦火熾而氣逆也手足為四肢乃諸陽之本陽邪盛甚氣亂神昏所以疾動而不寧也小便利者反上文陰虛小便難而言利則陰未甚虛陰未甚虛則陽猶有可以回之者所以為可治也二十九太陽病以火熏之不得汗其人必躁到不解必清血名為火邪清與圊同熏亦劫汗法蓋當時庸俗用之燒坑鋪陳灑水取氣臥病人以熏蒸之之類是也躁手足疾動也到言猶反也謂徒躁擾而反不得解也清血便血也汗為血之液血得熱則行火性大熱既不得汗則血必橫溢陰盛者所以下圊也三十太陽病二日反躁反尉其背而大汗出大熱入胃胃中水竭躁煩必發譫語十餘日振栗自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便鞕小便當數而反不數及多大便已頭卓然而痛其人足心必熱穀氣下流故也尉俗作尉鞕與硬同下利下流之下去聲數音朔二日當傳之時也反躁欲傳也尉其背亦火劫汗法也大汗出者悖道以治故出驟也大熱邪熱與火熱相摶也入胃胃屬土故火邪先之也水竭火盛則水涸也躁煩譫語皆內熱也十餘日過經同也振鼓戰栗悚縮作欲解之先兆也下利陰虛而津液偏於下走也欲解待解未解之詞故其汗從腰以下不得汗至大便硬一節乃承上文說猶未解之意言振栗若是作汗則熱散而病解今自利津液又偏於下泄胃中又不足所以待解不解汗不到下體干而不得小便陽氣不下通反上逆而嘔失猶言不也溲小便也足下惡風無陽以為衛護也大便硬無津液以為潤送也小便當數而反不數至末是反上文又說要解的意蓋言以人之津液偏滲而論之大便既硬則小便當多而頻數故以不數為反既反不數則津液又當回於胃中可知也及言待及津液由此而回足則大便得潤而當出出多者以待則久久故多也卓特也頭特然而痛陰氣上達也足心必熱陽氣下通也穀氣食氣也言待解未解以來為津液又不足陽不下陰不上是以猶不解今陰上達而頭獨覺痛陽下行而足心則熱者以胃中津液回足大便潤而得出食氣已下行也病雖不言解而解之意已隱然見於不言之表矣讀者當自悟可也三十一太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致此為小逆此原病變由於誤治因復推其未為大過亦嚴戒警之意關上脾胃之部位也細則為虛數則為熱所以知其誤於吐也一二日言病之初猶在太陽也腹中飢陽能化谷而吐後胃虛也口不能食胃受傷也三四日病在陽明也欲食冷食陽明惡熱也朝自寅至辰少陽之王時少陽未病故飲食如常也暮自申至戌陽明之王時陽明胃傷故當其時則吐也小逆言證未甚變邪未亂傳但以吐傷其胃氣致使止妨於飲食所以猶得為小逆也然逆雖曰小君子必求無逆而後可是故致戒如此三十二太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也此亦誤吐之變證不惡寒不欲近衣言表雖不顯熱而熱在裡也故曰內煩內煩者吐則津液亡胃中干而熱悗內作也三十三太陽病小便利者以飲水多必心下悸小便少者必苦裡急也飲水多而心下悸者心為火臟水多則受制也小便少則水停所以裡急也三十四太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表裡未和也十棗湯主之十棗湯方芫花熬甘遂大戟大棗十枚擘上上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末強人服一錢匕羸人服半錢溫服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養下利下少之下更皆去聲羸音雷養上聲乃可攻之以上喻人勿妄下早之意漐漐汗出至短氣言證雖有里猶未可下直至汗出不惡寒方是承上起下言當下以出其治然下之為下義各不同此蓋邪熱伏飲摶滿胸脅與結胸雖涉近似與胃實則大不相同故但散之以芫花達之以甘遂瀉雖宜苦用則大戟勝之必甘湯斯大棗是皆蠲飲逐水之物而用情自爾殊常羸瘦劣也糜粥取糜爛過熟易化而有能補之意三十五太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之桂枝人參湯方桂枝四兩去皮甘草四兩炙白朮三兩人參三兩乾薑三兩上五味以水九升先煮四味取五升內桂更煮取三升去滓溫服一升日再服夜一服數讀遲數有命之數音速數下利下之下去聲數言失於急遽下之太早所以原反而為反之互詞也協互相和同之謂言誤下則致裡虛外熱乘裡虛而入里裡虛遂協同外熱變而為利利即俗謂泄瀉是也不止裡虛不守也痞硬者正虛邪實中成滯礙痞塞而不通也以表未除也故用桂枝以解之以里下虛也故用理中以和之乾薑兼能散痞硬之功甘草亦有和協熱之用是故方則從理中加桂枝而易名義則取表裡期兩解之必效三十六太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之葛根黃連黃芩湯方葛根半斤黃連三兩黃芩二兩甘草二兩炙上四味以水八升先煮葛根減二升內諸藥煮取二升去滓分溫再服此與上條因同而變異利遂不止以上與上條上節兩相更互發明之詞脈促以下言變殊故治異也促為陽邪上盛陽主表故為表未解之診喘汗者裡虛陰弱而表陽不為之固護也夫表未解而利則屬胃有陽明之分也故肌之當解者從葛根以解之以喘汗不獨表實而有裡虛也故但從中治而用甘草以和之然利與上條同而上條用理中者以痞硬也此用芩連者以喘汗屬熱為多也然則四物之為用其名雖與上條殊其實兩解表裡則一耳三十七太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之下去聲上上聲氣上衝者陽主氣而上升風屬陽所以乘下后里虛入里而上衝也但上衝而不他變則亦有可下之機而不足為大誤然終以不先解表致有上衝之逆故曰可與桂枝湯方用前法言以桂枝湯與前番所下之湯法合湯再行表裡兩解之如桂枝加大黃之類是也若不上衝則非陽邪可知故曰不可與之三十八太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之桂枝去芍藥湯方於桂枝湯方內去芍藥一味余依桂枝湯法桂枝去芍藥加附子湯方於桂枝湯方內去芍藥加附子一枚下去聲去上聲凡下而證變者皆誤下也胸滿者陽邪乘虛入里而上摶於膈也用桂枝者散胸滿之陽邪也去芍藥者惡其走陰而酸收也微惡寒陽虛也加附子回陽也三十九喘家作桂枝湯加厚朴杏子佳佳一本作仁此揭言陽邪作喘治法之大要四十太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之桂枝加厚朴杏仁湯方於桂枝湯方內加厚朴二兩杏仁五十個余依桂枝湯法此詳上條而重出喘者氣奪於下而上行不利故呼吸不順而聲息不續也蓋表既未罷下則裡虛表邪入里而上衝裡氣適虛而下奪上爭下奪所以喘也然微者言氣但虧乏耳不似大喘之氣脫也以表尚在不解其表則邪轉內攻而喘不可定故用桂枝解表也加厚朴利氣也杏仁有下氣之能所以為定喘當加之要藥四十一太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈復下之下去聲此言病變由於誤治而明可愈不可愈之分以見道本自然人不可苟之意下原初誤痞言再誤表以誤汗言里以誤下言故曰俱虛陰指里陽指表無陽以俱虛言也陰獨謂痞也青黃脾受克賊之色微黃土見回生之色手足溫陽氣回於四末也言既經反覆之誤又見克賊之色肌膚瞤動而不寧則脾家之真陰敗而為難治今則土見回生之色四末得溫胃家之真陽復故為易愈也然則均誤也如彼變則難如此變則易自然而然所謂道也雖有智者豈能加毫末是故君子慎其初以求盡道不苟道以罔人小人反是四十二太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血凡在太陽皆表證也誤下則變亦有亂生而不可以一途拘者促為陽邪上盛陽盛於上而不結胸則邪必待散而欲愈可知浮為熱在上焦下後脈浮則邪熱上摶必結於胸可診緊則寒邪客於下焦下焦有少陰少陰之脈循咽挾舌本客邪為熱循經而上衝所以知必作咽痛也弦為邪摶少陽少陽之脈循脅所以知兩脅必拘急也細數者邪氣因循而欲傳故知頭痛未止也沉緊有寒氣也故氣上逆而必欲嘔沉滑邪乾水分也故必協熱作利浮滑氣傷血分也故知必致下血夫以病在太陽一誤下之餘而其變亂有如此者是故君子不可不慎也四十三太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余無汗劑頸而還小便不利身必發黃也大陷胸湯方大黃六兩去皮芒硝一升甘遂一錢另末上三味以水六升先煮大黃取二升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服懊影考切憹音農太陽之脈本浮動數者欲傳也浮則為風四句承上文以釋其義頭痛至表未解也言前證然太陽本自汗而言微盜汗本惡寒而言反惡寒者稽久而然也醫反下之至大陷胸湯主之言誤治之變與救變之治膈心胸之間也拒格拒也言邪氣入膈膈氣與邪氣相格拒而為痛也空虛言真氣與食氣皆因下而致虧損也客氣邪氣也短氣真氣不足以息也懊憹悔恨之意心為邪亂而不寧也陽氣客氣之別名也以本外邪故曰客氣以邪本風故曰陽氣以裡虛也因而蹈入故曰內陷陽性上浮故結於胸以胸有凶道而勢大也故曰大陷胸湯芒硝之咸軟其堅硬也甘遂之甘達之飲所也然不有勇敢之才定亂之武不能成二物之功用故必大黃之將軍為建此太平之主將若不結胸至末以變之亦有輕者言蓋謂邪之內陷或不結於胸則無有定聚但頭汗出者頭乃諸陽之本陽健其用故汗出也余處無汗者陰脈上不過頸陽不下通陰不任事故汗不出也小便不利者陽不下通陰不任事化不行而濕停也濕停不行必反滲土而入胃胃土本濕得滲則盛既盛且停必鬱而蒸熱濕熱內發色必外奪身之肌肉胃所主也胃土之色黃所以黃髮於身為可必也發黃可必而不言其治者以有其條也學者從其類以求之則道在矣四十四太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之晡幫孤切此明結胸有陽明內實疑似之辨晡日加申時也小有言微覺有也蓋不大便燥渴日晡潮熱從心下至少腹硬滿而痛皆似陽明內實而涉疑且變因又同惟小有潮熱不似陽明之甚可以辨差分苟非義精見切鮮有不致誤者所以陽明必以胃家實為正而凡有一毫太陽證在皆不得入陽明例者亦以此也詩云戰戰兢兢如臨深淵如履薄冰司命君子臨此任而無此心者難以與言仁也四十五病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也反音板此原結胸與痞之因發於陽發於陰見第八條結胸大抵以結硬高當於胸為名痞者痞塞於中而以天地不交之痞為義病發於陰而反下之不言熱入與末後申明上句而不及下句者皆欲人同推也然發於陽而下之早者未嘗無痞發於陰而下之早者亦有結胸疾病之機每多不期然而然蓋出於反常之變良由人之氣稟不齊事物之交不一如春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬必咳嗽冬傷於寒春必病溫此固聖人諭道之常經百世不易之定論然即今之病四病者而觀之必各於其時而各病其病者千百一二不拘於時雜錯而亂病者歲歲比比然也不言四病之故則已有言四病之故者必不能外聖人之經而異其說也是故君子道其常而善學聖人者則曰文載道之具也六經聖人之糟粕必求聖人之情於言語文字之外而後聖人之道明欲學仲景不可不勉四十六結胸者項亦強如柔痓狀下之則和宜大陷胸丸大陷胸丸方大黃半斤去皮葶藶半升熬芒硝半升杏仁半升去皮尖熬黑上四味搗篩二味內杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法王氏曰痓當作痙群並切余仿此此以結胸之劇者言變制以出其治大邪結硬於胸俯則礙而不利勢必常昂有反張之疑似如柔痙狀之謂也蓋病已至劇辨之不可不明治之不可不審是故大黃芒硝甘遂前有之矣葶藶有逐飲之能杏仁以下氣為用白蜜甘而潤導滯最為良名雖曰丸猶之散耳較之於湯力有加焉此誠因病制勝之良規譬則料敵添兵之妙算四十七結胸證其脈浮大者不可下下之則死此示人馮脈不馮證之要旨戒人勿孟浪之意夫結胸之為陽邪內陷法固當下下必待實浮為在表大則為虛浮虛相搏則表猶有未盡入而里未全實可知下則尚虛之裡氣必脫未盡之表邪皆陷禍可立至如此而命盡謂非醫咎何是故致戒也四十八結胸證悉具煩燥者亦死悉具其候皆見煩燥津液竭也津液竭者不可下下證具矣不下不可下之不可不死而何四十九太陽病先下之而不愈因復發汗以此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得里未和然後下之冒昏蒙言邪蒙冪而外蔽也汗出則邪散故表和也得謂知則得之也里以二便言蓋邪無定聚或前或後難以定擬故曰得舉大意而不出方不出方者以未得則方無可出也五十大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈亡無通後皆仿此復之為言反也未汗而下謂之反下已下而汗謂之反汗既反下又反汗謂之重亡津液津液重亡則小便少應不利非病變也故曰勿治言若治之以利其小便則小便無可利者不惟無益而反害害則轉增變矣亦戒慎之意五十一太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯主之先汗出脈經作先汗之此概舉汗下之大旨以為訣人用治之要法夫病而至於脈陰陽俱停則氣血轉和無相勝負可診矣然猶必先振栗乃得汗出而後始解者則其人本虛可知也但陽脈微先汗出而解者蓋經曰陽虛陰盛汗出而愈是也但陰脈微下之而解者難經曰陽盛陰虛下之而愈是也滑氏曰受病為虛不受病為盛唯其虛也是以邪湊之唯其盛也是以邪不入即外臺所謂表病里和里病表和之謂學者玩味而有得焉則於治也思過半矣五十二太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之中去聲三日傳遍三陽之時也壞言歷遍諸治而猶不愈則反覆雜誤之餘血氣已憊壞難以正名名也不中猶言不當也末三句言所以治之之法也蓋既不可名以正名則亦難以出其正治故但示人以隨機應變之微旨斯道之一貫斯言盡之矣蓋亦聖門傳心之要義輪扁所謂疾徐苦甘應手厭心者不可以言傳不猶是夫善學者心體而自得師焉則所謂三百九十七一百一十三者可以應病變萬有於無窮矣豈惟治中風傷寒云乎哉五十三太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈大柴胡湯方柴胡半斤黃芩三兩半夏半升芍藥三兩枳實四枚大黃二兩生薑五兩切大棗十二枚擘上八味以水一斗二升煮取六升去滓再煎溫服一升日三服過平聲下同過經與壞同不知何逆而二三下之適所以致逆耳故曰反也柴胡證仍在者言下而又下陽明雖未見傷而邪在少陽者亦未見除也先與小柴胡者賾之之意也嘔不止鬱郁微煩者邪擾二陽故曰未解也大柴胡者有小柴胡以為少陽之主治用芍藥易甘草者以郁煩非甘者所宜故以酸者收之也加枳實大黃者蕩陽明之鬱熱非苦不可也蓋亦一舉而有兩解之意五十四太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也胸中痛邪在膈也若曾極吐則應有心下溫溫欲吐何也以胃口已被吐傷邪熱上摶於膈反欲吐而不得吐也腹微滿鬱郁微煩邪在胃也若曾極下則應大便微溏何也以下則胃虛邪雖實於胃大便反不能結硬也故曰先此時自極吐下者與調胃承氣湯言當蕩其熱以和其胃也不爾言未極吐下也但欲嘔至末申明上文調胃承氣湯方見下篇五十五太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之桂枝加葛根湯方於桂枝湯方內加葛根三兩余依桂枝湯法𠘧音殊𠘧𠘧鳥之短羽者動則引頸𠘧𠘧然形容病人之頸項俱病者俯仰不能自如之貌蓋太陽之脈下頸挾脊太陽之筋其別者挾脊上項陽明之脈其支者從大迎下人迎循喉嚨入缺盆陽明之經其直者上腹而布至缺盆而結上頸上合於太陽故邪湊太陽則項背強加陽明則頸亦病故曰𠘧𠘧也反轉也言太陽未罷汗轉出不已而惡風猶在也以太陽尚在故用桂枝為主方以初有陽明故加葛根為引用蓋葛根者走陽明之經者也然則桂枝加葛根之所以為湯其太陽陽明差多差少之兼解歟舊本以葛根湯方為增補謬甚今依經文桂枝加例補注太陽一經分榮分衛桂枝麻黃所以同主一經陽明少陽經絡臟腑耳葛根柴胡所以各專一經矣五十六太陽與陽明合病不下利但嘔者葛根加半夏湯主之葛根加半夏湯方於葛根湯方內加半夏半升余依葛根湯法合見答切合之為言相配偶也輕重齊多少等謂之合蓋陽明切近太陽所以合也不下利乃對中篇必自下利而言兩相反之詞所以為彼此互相發明以見中風傷寒之分別也嘔大吐也蓋太陽膀胱也膀胱主水陽明胃也胃主飲風邪屬陽陽主氣陽邪協氣泛溢水飲而上湧得逆則與俱出此嘔之所以為嘔太陽陽明相合而為一家之證也桂枝葛根散風而解肌太陽陽明之的藥也半夏辛溫散氣而蠲飲主除熱堅而止嘔也然所謂葛根加者其葛根湯得非承上條而言指桂枝加葛根之葛根與以其無麻黃殊為允當也用者請更參詳不浮沉於謬訛何如五十七太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門椎與槌同俞靈樞作腧音庶並猶合也彼此相兼合而有輕重多寡之不同謂之並蓋少陽間陽明去太陽遠故但兼併也頭項強痛見首條眩目無常主而旋轉也冒昏蒙不明也二陽之脈起於目二眥風能羊角旋而善偃蔽少陽屬木故得之則眩太陽屬水故受之則冒或與時互言也少陽之脈絡脅而太陽內陷則為結胸雖非內陷然以並人則幾於陷矣故有時或似結胸而心下痞硬非謂真實常如此也然胸乃陽明之部分太少並陽明不言而可知矣肺俞在背第三椎下兩旁肝俞在第九椎下兩旁皆挾脊各去同身寸之一寸五分刺可入同身寸之三分肺俞留七呼肝俞留六呼夫肝與膽合刺肝俞瀉少陽之太過也而肺與膀胱非合也刺肺俞其以膀胱為津液之府氣化出焉肺主氣故刺之以通太陽膀胱之氣化與不可發汗者以不獨太而有少少陽無發汗法也譫語者心火熾而胃土燥也木火通明故木盛則火熾所以弦脈偏見也期門見第六十四條五十八太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之此承上條而又以勿下再出以明汗下俱不可行通下文所以為詳悉一證之意也蓋太少並病則五合之表裡俱傷而邪無定聚汗則偏損表下則偏虛里所以兩皆不可也頸項亦頭項之互詞上條言眩冒此有眩無冒差互詳略耳五十九太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩此又承上條出其誤下之變三條一證互發前條言慎不可發汗發汗則譫語脈弦則是譫語脈弦者誤汗之變也上言慎勿下之未言下之之變然則此條反下者以上條誤下之變言也結胸即下後陽邪內陷之結胸下利即協熱之下利水漿不下心煩結胸下利兩虛其胃也末後疑有脫簡六十傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之小柴胡湯方柴胡半斤黃芩三兩人參三兩半夏半升洗甘草三兩炙生薑三兩大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服咳溪介切此少陽之初證叔和以無少陽明文故猶類此凡如此者今皆從之傷寒五六日中風往來寒熱互文也言傷寒與中風當五六日之時皆有此往來寒熱已下之證也五六日大約言也往來寒熱者邪入軀殼之裡臟腑之外兩夾界之隙地所謂半表半裡少陽所主之部位故入而並於陰則寒出而並於陽則熱出入無常所以寒熱間作也胸脅苦滿者少陽之脈循胸絡脅邪湊其經伏飲摶聚也默靜也胸脅既滿穀不化消所以靜默不言不需飲食也心煩喜嘔者邪熱伏飲摶胸脅者湧而上溢也或為諸證者邪之出入不常所以變動不一也柴胡少陽之君藥也半夏辛溫主柴胡而消胸脅滿黃芩苦寒佐柴胡而主寒熱往來人參甘棗之甘溫者調中益胃止煩嘔之不時也此小柴胡之一湯所以為少陽之和劑與傷寒五六日中風往來寒熱脈經作中風往來寒熱傷寒五六日之後心煩作煩心心下作心中身有作外有後加減法若胸中煩而不嘔去半夏人參加栝蔞實一枚煩熱悶也去人參熱聚而悶不宜固氣也不嘔無伏飲以為逆也去半夏既無伏飲為逆不須辛散也栝蔞實者寒以泄熱苦以散滿也若渴者去半夏加人參合前成四兩半栝蔞根四兩渴津液不足也半夏燥津液故去之人參生津而止渴栝蔞根徹熱而益津所以加之也若腹中痛去黃芩加芍藥三兩腹中痛血澀而內寒也黃芩苦堅而寒中故去之芍藥通宣而愈痛故加也若脅下痞硬去大棗加牡蠣四兩脅下痞硬邪熱伏飲摶聚為實也去大棗甘能聚氣而令人中滿也加牡蠣咸能軟堅而主除寒熱也若心下悸小便不利者去黃芩加茯苓四兩悸心動也水停心下則悸所以小便不利也腎主水黃芩堅腎腎堅則水愈蓄故去之茯苓利竅竅利則水滲泄故加之若不渴外有微熱者去人參加桂三兩溫覆取微似汗愈不渴津液無虧也故不須人參以為潤外有微熱表未全罷也故加桂以解肌若咳者去人參大棗生薑加五味子半升乾薑二兩咳氣逆而嗽也去人參大棗者甘能益氣也水寒窒氣則咳本方有半夏水可燥也寒宜熱散故易生薑以乾薑之熱散其寒也然咳屬肺肺欲收加五味子者酸以收之也太陽一經惟榮衛之不同所以風寒分異治陽明一經雖屬經絡臟腑最為切近太陽榮衛之道在邇風寒之辨尚嚴少陽一經越陽明去太陽遠榮衛無相關經絡臟腑而已經絡臟腑無不同者經絡臟腑同風寒無異治經以傷寒五六日中風往來寒熱交互為文者發明風寒至此同歸於一治也斯道之精微其在於斯乎六十一傷寒中風有柴胡證但見一證便是不必悉具此承上條申言辨認少陽一經為病之大意六十二服柴胡湯已渴者屬陽明也以法治之已畢也渴亦柴胡或為之一證然非津液不足水飲停逆則不渴或為之渴寒熱往來之暫渴也今服柴胡湯已畢而渴則非暫渴其為熱已入胃亡津液而渴可知故曰屬陽明也六十三凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解柴胡證不罷言病雖不解亦不他變則宜再行和之可知也故曰復與柴胡湯蒸蒸而振作戰汗也必如此而後解者以下后里虛故也此與中篇第五十五條互義六十四婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之發熱惡寒即下文續得寒熱經水適來婦人血為主臨經不臨經邪熱內郁迫血妄行多則因而適然錯來也七八日邪當入里之時故外熱除而脈遲表罷而身涼也如似也言變胸脅下滿其狀有似下後陽邪內陷之結胸而譫語蓋雖非反下而經水之不當來而來猶之反下而然也血室榮血停留之所經脈集會之處即衝脈所謂血海是也其脈起於氣街並少陰之經挾臍上行至胸中而散故熱入而病作其證則如是也期門二穴在不容兩旁各去同身寸之一寸五分肝之募也肝納血故刺期門所以瀉血分之實熱也六十五婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之上條適來此言適斷反覆更互詳言也續謂續後得也寒熱以往來寒熱言與上條惡寒發熱意同適斷言值經水正來適然又斷止也熱入血室與上證同而義異適來者因熱入室迫使血來血出而熱遂遺也適斷者熱乘血來而遂入之與後血相摶俱留而不出故曰其血必結也如瘧狀申釋寒熱也上言刺此出小柴胡皆互相發明也六十六血弱氣盡腠理開邪氣因入與正氣相摶結於脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也小柴胡湯主之痛當作病此總上二條而申明之以決言小柴胡湯為的於用之意血弱氣盡以經水之適來適斷言也腠理開邪氣因入以中風之熱入血室言也脅下者少陽之部分也邪傳少陽熱既入於血室而不出則邪摶於脅下而不散明前條之如結胸狀也邪正分爭三句言正氣與邪氣並爭則寒熱交作分則退明上條之如瘧狀也默默不欲飲食者少陽經中或為之一證脾胃亦傷之故也臟腑相連者以主熱入血室之厥陰肝與主往來寒熱之少陽膽言而明其義也夫以臟腑論之心肺之配大小腸以言其居則有上下之遠隔腎配膀胱其相去則差別前後之分脾胃之為配合雖則皆位乎中亦是各開而不相著獨有肝之配膽乃得相連而不相離夫性必戀於婦所以陽邪之熱必下就而入於陰之血室陰主受故受其熱而通其往來所以謂之必必者定然之詞也邪高病下者言惟其邪乃陽邪陽上浮而居高惟其病在血室屬乎陰而低下下往上來脾胃間中雖不受病未免受傷嘔之為嘔者此也然小柴胡湯者出表入里往來寒熱之主冶也而熱入血室者乃下往上來之寒熱似不相同亦以之為主治何也曰出入上下雖不同其主往來為寒熱之少陽則一也邪屬少陽發表則無表可發攻裡則胃不可攻取之於血室則邪又結於脅下肝膽同歸一治婦道必從於夫故從少陽之小柴胡為解厥陰之血室乃主其夫婦之和而潮熱期之於必愈此熱入血室之為病所以決於用小柴胡而無二也中篇末條與此互相發明下篇無出由此其推也然則婦人風寒為病之治其所以殊於男子者止惟如此乎曰非謂止於如此也謂大要差在血氣之分耳循經以為治則一也觀熱入血室不外小柴胡一湯則他可知矣經之所以反覆詳明以示教豈非開諭後學當知致力於斯乎噫微矣哉
