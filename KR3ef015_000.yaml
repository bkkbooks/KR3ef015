body:
  text: 削傷寒例成無己本舊有傷寒例一篇今削之存此以備後照醫道之方法具備自仲景始故世稱仲景方法之祖傷寒論乃其書也考求其方法義例明甚何謂例如中風一也傷寒二也兼風寒俱有而中傷三也三病不同以皆同在太陽故皆發汗發汗云者非以例言乎何謂義如發中風之發發之以桂枝湯發傷寒之發發之以麻黃湯發兼風寒俱有而中傷之發發之以大青龍湯一例發汗而三湯則不同非以其各有所宜之義乎然則方法者道之用也例者所以行其方法也義則其行而宜之之謂是已是皆相須而不相離一致之謂道也啻此為然哉其餘各屬悉皆類此條目具在也夫何無己之注解不省義例原屬方法中法外又獨有傷寒之例獨例傷寒而置諸各屬舍義而獨曰例豈仲景之言其為後人之偽明亦甚矣偽例者誰或曰叔和謂叔和者以其編述也編述論而出始則叔和之於論誠功之首也乃若又偽此例則後之醫傷寒者不知通求各屬但務專擬於傷寒仿例而行仲景之道反愈晦而至今愈不明究其叛亂不由厄於此例以至如此乎以此言之則叔和者亦一罪之魁耳賢如叔和愚意其智不乃爾也或曰無己謂無己者以其注解也此則近似何也已任注解則當精辨論之條目詳悉各屬本義以迪諸後不當愎強苟且一概徇己朦朧訓為傷寒比之於例儼然一家口語以此擬己夫復何疑且例苟在己前亦當暴白其非不令得以迷誤繼述是也奈何懵此不為乃固為尾之以阿順可乎律以春秋大義譬如專國政之趙卿以不討賊而直受弒君之惡罪不能辭己亦有也雖然事屬久遠理在難明必欲求其人以實之斯亦鑿矣偽不容有無之可也既應無之削之是矣故從削跋昔人論醫謂前乎仲景有法無方後乎仲景有方無法方法具備惟仲景此書然則此書者盡斯道體用之全得聖人之經而時出者也後有作者終莫能比德焉是故繼往開來莫善於此愚自受讀以來沉潛涵泳反復紬繹竊怪簡篇條册顛倒錯亂殊甚蓋編始雖由於叔和而源流已遠中間時異世殊不無蠹殘人弊今非古是物固然也而注家則置弗理會但徒依文順釋譬如童蒙受教於師惟解隨聲傳誦一毫意義懵不關心至歷扞挌聱牙則又掇拾假借以牽合即其負前修以誤後進則其禍斯時與害往日者不待言也所謂舟一也操之而善則有利濟之功不善則不惟適足以殺人而反並己亦淪胥以自溺者猶是也是故君子慎術不亦可懼也夫於是不憚險遙多方博訪廣益見聞慮積久長晚忽豁悟乃出所舊得重考修輯屬草於萬曆壬午成於去歲己丑倩書謄脫方幸字得頗佳而校討點畫則又率多訛謬自慨今年七十一矣不免強拭眵昏力楷託梓復客留後凡若干萬言移整若干條考訂若干字曰傷寒論者仲景之遺書也條辨者正叔和故方位而條還之之謂也嗚呼仲景聖當時而祖百代其神功妙用聞而不可得見所可見者僅存是書泝是書以求其道由其道以纘其宗亦惟系乎人之心志用不用何如耳今也以生乎千五百年之下而欲淵源千五百年上人之遺言鍵發其神妙以懋率由豈可以容易言哉然時世雖殊人心則一不一者事至一者道誠能心仲景之心志仲景之志以求之則道在是也道得則仲景得矣尚何時世之間可以二言邪是故具述其本末粗陳大義俟諸來哲大家精詳允期斯道協陟重明以之修己治人進之拱盛順化念茲在茲施於有政庶幾將來雖或時災平循通轍克綏正命則仲景在我而聖賢之宗風不墜是非吾人顧念天之所以與我而我當求盡其所以體之全之之一事邪他固非愚之所可豫知也曷敢道哉抑揣余景衰肘醜蹐何可以入人目而乃劬劬若是以取身後嗤唾邪不然也蓋亦不過遠惟或者得徹觀於有道在任則亦尚可以少見競競專致操存於一筆之不敢苟云爾萬曆二十一年歲次癸巳仲冬閏辛巳朔粵三日癸未朏新安方有執自跋傷寒論條辨本草鈔神農本經藥三百六十五種效法周天三百六十五度之數應三才而合四時此本草之所以權輿也厥義尚矣梁陶隱居進明醫別録倍之為七百三十種而義猶在焉逮夫唐本圖經蜀唐慎微證類以至宋嘉祐政和重定重修義皆不論旁搜遠訪務在增多凡見聞所及有關用驗者莫不兼收並録實總一千七百四十六種而藥無遺品本草稱大備疾病之需衛生之具天下至今為永賴焉然一百一十三方用者九十一種耳舊本皆一一注性味於各方藥下煩冗無義今具鈔而附説以為初學倉卒易於檢對之便余則略云桂枝桂味甘辛大熱有小毒主溫中利肝肺氣霍亂轉筋頭痛出汗止煩堅骨節通血脈理疏不足宣導百藥無所畏神農本經有牡桂菌桂辛溫無毒無桂枝桂別録以下有桂上文鈔者是皆無桂枝別説云仲景傷寒論發汗用桂枝桂枝者枝條非身干也取其輕薄而能發散愚按諸家本草桂雖云辛甘大熱本經則言辛溫皆無發散之説經於發汗曰宜麻黃湯曰宜桂枝湯云云者以例言也出汗不出汗有權在經深思宜之一字則有所宜者必有所不宜者在宜於此者必有不宜於彼者在此經之言外意讀者要當潛心察識然後可以用經之權而能神經之妙矣苟徒泥於發散發汗云云此成無己所以鑿發散之謬注也後此人人遂皆自然其説而以為説殊不思人之用桂大率皆皮而無用枝者經於桂枝凡用皆云去皮去皮者非謂去其枝上之皮也以桂之用皆皮惟經用枝故有去皮云耳經既去皮而用枝則是去人之所用於不用而用人之所不用以為用用不與人同而意正與人相反可知矣豈取發散云乎哉不在此也然則所取何曰用不與人同而意正與人相反則是枝必桂中奇才妙用人雖皆未及知而經則獨知之深者以其從陽而敏於走衛也得之者惟主理疏不足宣導百藥無所畏是也麻黃味苦溫無毒主傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱通腠理疏解肌泄邪惡氣消黑赤斑毒不可多服令人虛陶隱居云用之折除節節止汗故也先煮一兩沸去上沫沫令人煩藥性論根節能止汗日華子通九竅開毛孔皮膚葛根味甘平無毒主消渴身大熱解諸毒療傷寒中風頭痛解肌發表出汗開腠理陶隱居云生者搗取汁飲之解溫病發熱藥性論云能治天行上氣嘔逆近世方書謂野葛有毒傷胎遂將妊娠婦人方中葛根改為家葛殊不思本草作於神農氏當此之時人尚無家葛焉家哉有野葛者自是一種大毒殺人不啻傷胎而已魏武啖至一寸者是也非葛也若因此物道聽途説豈不迂哉柴胡味苦平無毒主寒熱邪氣推陳致新除傷寒心下煩熱諸痰熱結實胸中邪逆五臟間遊氣藥性論云主時疾內外熱不解蕭炳云主痰滿胸脅中痞柴本經作茈廣韻如此芍藥味苦酸微寒有小毒主邪氣腹痛寒熱癥瘕通順血脈緩中散惡血去水氣利膀胱大小腸時行寒熱中惡腹痛本經一耳別録分赤白為二用赤者利小便下氣白者止痛散血古人採自山野山野多赤後世好奇尚白取辦於種蒔雖得白多而肥大乃出自人為而物已失其天性矣故難責效風寒所用義自赤者經無明文古意本來如此若芍藥甘草湯方明書白者此用白也藥性論云能蝕膿衍義云血虛寒人禁此一物甘草國老味甘平無毒主五臟六腑邪氣長肌肉溫中解百藥毒反大戟芫花甘遂海藻陶隱居云國老即帝師之稱雖非君為君所宗故能安和草石而解諸毒也藥性論云忌豬肉栝蔞根味苦寒無毒主消渴身熱煩滿大熱除腸胃中痼熱八疸身面黃唇乾口燥反烏頭日華子云治熱狂時疾實名黃瓜主胸痹圖經云療時疾發黃心狂煩熱悶不識人近時方書及稱呼皆無栝蔞根惟有天花粉謂天花粉即栝蔞根殊不知栝蔞者載在本經而天花粉者自本經別録以至唐蜀諸家本草皆所未有在政和以後所收七十五種之內功用雖相若而物則殊別正爾謂彼即此亦失論矣黃芩味苦平大寒無毒主諸熱黃疸腸澼泄利療痰熱胃中熱藥性論云能治熱毒骨蒸寒熱往來腸胃不利日華子云主天行熱病黃連味苦寒無毒主明目腸澼腹痛下利五臟冷熱調胃厚腸日華子云止驚悸煩躁天行熱疾藥性論云忌豬肉惡冷水半夏味辛平生微寒熟溫有毒主傷寒寒熱心下堅下氣喉咽腫痛頭眩胸脹咳逆消心腹胸膈痰熱滿結咳嗽上氣時氣嘔逆邇來下俚因經有渴者去半夏之文釋者以燥津液為説遂訛為燥謂半夏燥藥凡用以貝母代之誇奇矜貴以自高炫道邪悖邪誠可笑也藥性論云開胃健脾忌羊血飴糖反烏頭生地黃味甘寒無毒除寒熱本經止於乾地黃下云生者尤良無生名麥門冬味甘平微寒無毒主心腹結氣心下支滿虛勞客熱口乾燥渴定肺氣安五臟日華子治時疾熱狂人參味甘微溫無毒主補五臟安精神定魂魄止驚悸療胸脅逆滿霍亂吐逆調中止消渴反藜蘆術味苦甘溫無毒主風寒濕痹止汗除熱消食風眩頭痛消痰水除心下急滿及霍亂吐下不止陶隱居云術乃有兩種白朮葉大有毛而作丫根甜而少膏可作丸散用赤朮葉細無丫根小苦而多膏可作煎用藥性論云忌桃李雀肉菘菜青魚日華子云治山嵐瘴氣衍義云古方及本經止言術未見分蒼白二種也只緣陶隱居言術有兩種自此人多貴白者今人但貴其難得惟用白耳往往將蒼朮置而不用如古方平胃散之類蒼朮為最要藥功效尤速殊不詳本草原無白朮之名近世多用亦宜兩審謹按嘉祐本草序謂本草雖世傳作於神農氏蓋仲景華他諸賢之所編述也然則經文術上其曰白者無乃後之好事者之所加歟惟白之加則今之術皆出種蒔務白以求售醫之為道本來面目尚存幾何哉大戟味苦寒有小毒主十二水腹滿急痛積聚利大小腸反甘草日華子云泄天行黃病瘴瘧澤漆根也澤瀉味甘鹹寒無毒除五臟痞滿逐膀胱三焦停水扁鵲云多服病人眼藥性論云宜通水道知母味苦寒無毒主消渴療傷寒久瘧煩熱陶隱居云甚療熱結旋覆花味鹹溫冷利有小毒主結氣脅下滿去五臟間寒熱消胸上痰結唾如膠漆心脅痰水膀胱留飲葶藶味辛苦寒無毒主癥瘕積聚通利水道下膀胱水伏留熱氣皮間邪水上出面目浮腫藥性論云有小毒能利小便抽肺氣上喘息急止嗽衍義云用子味有甜苦兩等其形則一也經既言味辛苦即甜者不復更入藥也大概治體皆以行水走泄為用故曰久服令人虛甘遂味苦寒有毒主大腹癥瘕腹滿面目浮腫留飲利水穀道下五水散膀胱留熱反甘草五味子味酸溫無毒主益氣咳逆上氣蘇恭云皮肉甘酸核中辛苦都有鹹味此則五味具也茵陳蒿味苦平微寒無毒主風濕寒熱邪氣熱結黃疸遍身發黃小便不利日華子云治天行時疾熱狂蕘花味苦辛寒有毒主傷寒溫瘧下十二水破積聚大堅癥瘕蕩滌腸胃中留癖飲食寒熱邪氣利水道療痰飲衍義云仲景傷寒論以蕘花治利者以其行水也水去則利止其意如此然今人用時當以意斟酌不可使過與不及也仍須有是證者方可用之細辛味辛溫無毒主咳逆頭痛腦動百節拘攣風濕痹痛破痰利水道反藜蘆陶隱居云最能除痰明目藥性論云忌生菜日華子云忌貍肉衍義云今惟華州者佳柔韌極細真深紫色味極辛嚼之習習如椒治頭面風不可缺也葉如葵葉赤黑非此即杜蘅杜蘅葉形如馬蹄俗云馬蹄香是也近時用者皆此物人亦莫知其非別説云單用不可過半錢匕多即氣悶塞不通者死雖死無傷近年關中或用此毒人者聞平涼獄中嘗治此故不可不記非本有毒但以不識多寡之用因以有此連翹味苦平無毒主寒熱衍義云治心經客熱最勝翹經作軺注云連翹根也今之用者皆於本草無明文用者宜審桔梗味辛苦微溫有小毒主胸脅痛如刀刺除寒熱風痹療喉咽痛藥性論主氣促嗽逆衍義云治肺熱氣奔促咳逆肺癰排膿當歸味甘辛溫無毒主咳逆上氣溫瘧寒熱洗洗在皮膚中婦人漏下絶子諸惡瘡瘍日華子云治一切風一切血藥性論云補女子諸不足別説云氣血昏亂者服之立定此蓋能使氣血各有所歸恐聖人立當歸之名必因此出矣通草味辛甘平無毒除脾胃寒熱通利九竅出音聲陳士良云莖名木通主理風熱淋疾小便數急疼小腹虛滿升麻味甘苦平無毒主解百毒闢癘疫瘴氣中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡圖經云解傷寒頭痛本經無別録有大黃將軍味苦寒無毒主下瘀血血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水穀調中化食安和五臟平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹痛諸老血留結日華子云通宣一切氣調血脈利關節泄壅滯水氣四肢冷熱不調溫瘴熱疾利大小便並俌一切瘡癤癰毒別説云謹按大黃收採時皆以火燒石煿干欲速貨賣更無生者用之不須更多炮炙少蒸煮之將軍者言戡定禍亂建立太平止戈為武之謂也葳蕤味甘平無毒主中風暴熱不能動搖陶隱居云按本經有女葳無葳蕤別録無女葳有葳蕤日華子云除煩悶止渴潤心肺治天行熱狂圖經云主賊風手足枯痹四肢拘攣按陶云則女葳葳蕤之為物雖不殊而文字之差誤則明甚天門冬味苦甘大寒無毒主諸暴風濕偏痹保定肺氣去寒熱博物志云禁食鯉魚藥性論云誤食鯉魚中毒浮萍解之衍義云治肺氣之功為多其味苦但專泄而不專收寒多人禁服貝母味辛苦微寒無毒主傷寒煩熱療腹中結實心下滿洗洗惡風寒反烏頭藥性論云主胸脅逆氣療時疾黃疸與連翹同日華子云消痰潤心肺別説云能散心胸鬱結之氣殊有功蜀漆味辛微溫有毒主瘧及咳逆寒熱腹中癥堅痞結積聚療胸中邪結氣吐出之常山苗也藥性論云能主療鬼瘧多時不瘥去寒熱瘧治溫瘧寒熱不可多進令人吐逆下肥氣積聚商陸根味辛酸平有毒主水脹疝瘕除癰腫殺鬼精物療胸中邪氣水腫痿痹腹滿洪直疏五臟散水氣如人形者有神圖經云俗名章柳根花赤者根赤花白者根白蘇恭云白者入藥用赤者見鬼神甚有毒但貼腫外用若服之傷人乃至利血不已而死也日華子云得大蒜良通大小腸瀉蠱毒墮胎協腫毒敷惡瘡本經無根字海藻味苦鹹寒無毒主癭瘤氣項下核破散結氣癰腫癥瘕堅氣腹中上下鳴下十二水腫療皮間積聚暴㿉留氣熱結利小便厚朴味苦溫無毒主中風傷寒頭痛寒熱驚悸氣血痹溫中益氣消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止泄利淋露除驚去留熱心煩滿厚腸胃藥性論云忌豆食之者動氣味苦辛大熱能主療積年冷氣腹內雷鳴虛吼宿食不消除痰飲去結水破宿血消化水穀止痛大溫胃氣嘔吐酸水主心腹滿病人虛而尿白日華子云健脾主反胃霍亂轉筋冷熱氣瀉膀胱泄五臟一切氣衍義云不以薑製則棘人喉舌平胃散中用最調中至今此藥盛行既能溫脾胃氣又能走冷氣為世所須也枳實味苦酸寒無毒主大風在皮膚中如麻豆苦癢除寒熱結止利長肌肉利五臟除胸脅痰癖逐停水破結實消脹滿心下急痞痛逆氣脅風痛安胃氣止溏泄藥性論云解傷寒結胸入陷胸湯用主上氣喘咳腎內傷冷陰痿而有氣加而用之衍義云枳實枳殼一物也小則其性酷而速大則其性祥而緩故張仲景治傷寒倉卒之病承氣湯中用枳實此其意也皆取其疏通決泄破結實之義他方但導散風壅之氣可常服者故用枳殼其意如此竹葉䈽竹葉味苦平大寒無毒主咳逆上氣除煩熱風痙喉痹嘔吐淡竹葉味辛平大寒主胸中痰熱咳逆上氣苦竹葉及瀝療口瘡目痛明目利九竅陶隱居云竹類甚多此前一條云是䈽竹次用淡苦爾藥性論云淡竹燒瀝治卒中風失音不語日華子云苦竹作瀝治中風失音功用與淡竹同食療云淡竹瀝大寒主勞復茹主噎膈鼻衄大棗味甘平無毒主心腹邪氣安中養脾昉十二經平胃氣通九竅補少氣少津液身中不足和百藥補中益氣除煩悶療心下懸腸澼生者味甘辛多食令人多寒熱羸瘦不可食陶隱居云南棗大惡孟詵云第一青州次蒲州者好諸處不堪入藥生者食之過多令人腹脹日華子云牙齒有病人切忌食之食療云多食動風發冷風並咳嗽衍義云先青州次晉州此二等可煞曝入藥益脾胃為佳余止可充食用杏核仁味甘苦溫冷利有毒主咳逆上氣雷鳴喉痹下氣時行頭痛解肌消心下急解錫毒陳藏器云利喉咽潤五臟去痰嗽生熟俱得半生半熟殺人日華子云實多食傷神損筋骨有數種皆熱小兒尤不可食多致瘡癰及上膈熱桃核仁味苦甘平無毒主瘀血血閉癥瘕邪氣殺小蟲止咳逆上氣消心下堅除卒暴擊血破癥瘕通月水止痛衍義云桃有數種惟以山中自生者為正梔子味苦寒無毒主五內邪氣胃主熱氣胸心大小腸大熱心中煩悶酒炮皶鼻藥性論云殺蟅蟲毒去熱毒風利五淋解五種黃病治時疾除熱衍義云仲景治發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯治之虛故不用大黃有寒毒故也梔子雖寒無毒治胃中熱氣既亡血亡津液腑臟無潤養內生虛熱非此物不可去吳茱萸味辛溫有小毒主溫中下氣止痛咳逆寒熱除濕血痹逐風邪開腠理去痰冷腹內絞痛諸冷實不消中惡心腹痛藥性論云治霍亂轉筋胃中冷氣吐瀉腹痛不可勝忍者可愈孟詵云主心痛下氣除嘔逆臟冷開目者不堪食衍義云須深湯中浸去苦烈汁凡六七過始可用此物下氣最速腸虛人服之愈甚梓白皮味苦寒無毒主熱去三蟲別録云主吐逆胃反黃柏本經柏木味苦寒無毒主五臟腸胃中結熱黃疸腸痔止泄利療驚氣在皮間肌膚熱赤起目熱赤痛口瘡衍義云今用反蜀椒味辛溫有毒主邪氣咳逆溫中逐骨節皮膚死肌寒濕痹痛除六腑寒冷傷寒溫瘧大風汗不出心腹留飲宿食腸澼下利泄精開腠理通血脈堅齒髮調關節耐寒暑多食令人乏氣口閉者殺人衍義云須微炒使出汗又須去附紅黃殼去殼法先微炒乘熱入竹筒中以梗舂之播取紅用秦皮味苦寒無毒主風寒濕痹洗洗寒氣除熱目中青翳白膜藥性論云主明目去肝中久熱圖經云浸水便碧色書紙看之青色者真梅實味酸平無毒主下氣除熱煩滿止下利好唾口乾陶隱居云此亦是今烏梅也用當去核微熬治傷寒煩熱陳藏器云去痰主瘴瘧止渴調中除冷熱利止吐逆日華子云多啖傷骨蝕脾胃令人發熱又云除勞治骨蒸去煩悶澀腸止利衍義云食梅則津液泄水生木也津液泄故傷齒腎屬水外為齒故也芫花味辛苦溫有小毒主咳逆上氣喉鳴喘咽腫消胸中痰水喜唾水腫久服令人虛藥性論云有大毒能治心腹脹滿去水氣利五臟寒痰涕唾如膠者及一切毒風四肢攣急不能行步能瀉水腫脹滿附子味辛甘大熱有大毒主風寒咳逆邪氣溫中金瘡破癥堅積聚血瘕寒濕踒躄拘攣膝痛腳疼冷弱不能行步腰脊風寒心腹冷痛霍亂轉筋下利赤白堅肌骨強陰墮胎為百藥長陶隱居云凡用三建皆熱灰微炮令拆勿過焦惟薑附湯生用俗方每用附子皆須甘草人參生薑相配者正制其毒故也衍義云烏頭烏喙天雄附子側子凡五等皆一物也止依大小長短似像而名之後世補虛寒則須用附子仍取其端平而圓大及半兩以上者其力全不僣風家即多用天雄亦取其大者以其尖角多熱性不肯就下故取辛散也此用烏頭附子之大略餘三等則量其材而用之白頭翁味苦溫無毒主溫瘧狂易寒熱癥瘕積聚癭氣逐血止痛蘇恭云甚療毒茯苓味甘平無毒主胸脅逆氣憂恚驚邪恐悸心下結痛口焦舌乾利小便止消渴大腹淋漓膈中痰水水腫淋結開胸腑調臟氣伐腎邪藥性論云忌米醋豬苓味甘苦平無毒主痎瘧解毒蠱疰不祥利水道藥性論云解傷寒溫疫大熱發汗主腫脹腹滿急痛司馬彪云治渴衍義云行水之功多久服必損腎氣昏人目巴豆味辛生溫熟寒有大毒主傷寒溫瘧寒熱破癥瘕結聚堅積留飲痰癖大腹水脹蕩練五臟六腑開通閉塞利水穀道去惡肉爛胎不利丈夫陰殺斑蝥毒藥性論云忌蘆筍醬豉冷水中巴豆毒黃連汁大豆汁解之陶隱居云最能瀉人陳藏器云主癥癖痃氣痞滿腹內積聚冷氣血塊宿食不消痰飲吐水赤小豆味甘酸平無毒主下水排癰腫膿血寒熱熱中消渴止泄利小便吐逆卒澼下脹滿陶隱居云性逐津液久服令人枯燥陳士良云微寒療水氣解小麥熱毒圖經云甚療腳氣麻子味甘平無毒主補中益氣中風汗出逐水利小便破積血復血脈藥性論云治大腸風熱結澀及熱淋日華子云逐一切風氣長肌肉益毛髮去皮膚頑痹下水氣及下乳止消渴催生治橫逆産陳士良云主肺氣潤五臟利大小便疏風氣不宜多食損血脈滑精氣痿陽氣婦人多食髮帶疾豉味苦寒無毒主傷寒頭痛寒熱瘴氣惡毒煩躁滿悶虛勞喘吸及兩腳疼冷藥性論云治時疾熱病發汗粳米味甘苦平無毒主益氣止煩止泄陶隱居云此即人常所食米但有白赤小大異族四五種同一類也孟詵云常食乾飯令人熱中唇口乾不可和蒼耳食之令人卒心痛即急燒倉米灰和蜜漿服之不爾即死不可與馬肉同食之發痼疾衍義云白晚米為第一早熟米不及也平和五臟補益胃氣其功莫逮然稍生復不益脾過熟則佳酒味苦甘辛大熱有毒主行藥勢殺百邪惡毒氣陶隱居云大寒凝海惟酒不冰量其性熱獨冠群物藥家多有以行其勢人飲之使體弊神惛是其有毒故也蘇恭云酒有數種惟米酒入藥陳藏器通血脈潤皮膚散石氣消憂發怒宣言暢意又云酒後不得臥黍稷食豬肉令人患大風凡酒忌諸甜物酒漿照人無影不可飲酒不可合乳飲之令人氣結白酒食牛肉令人腹內生蟲孟詵云久飲傷神損壽苦酒味酸溫無毒主消癰腫散水氣殺邪毒醋也陶隱居云亦謂之醯以有苦味俗呼苦酒不可多食損人肌臟陳藏器云破血運除癥塊堅積消食破結氣日華子云殺一切魚肉菜毒多食不益男子損人顏色論語云或乞醯焉是也膠飴味甘微溫主補虛乏止渴去血本草飴糖圖經軟糖粳米粟米大麻子白朮黃精枳椇子等並堪作惟以糯米作者入藥孟詵云健脾胃氣日華子云消痰止嗽並潤五臟衍義云多食動脾風以上五種本經皆無或疑五種者皆人食用之常不煩採取開物之初不以流品論尚未收録與未知然否乾薑味辛溫主胸滿咳逆上氣溫中止血出汗逐風濕痹腸澼下利寒冷腹痛中惡霍亂脹滿皮膚間結氣止唾血生者尤良主傷寒頭痛鼻塞止嘔吐久服去臭氣通神明乾者太熱生者微溫皆無毒唐本乾者久服令人目暗藥性論乾薑主霍亂不止治嗽溫中秦艽為使陳藏器云生薑須熱即去皮要冷即留皮蔥白平可作湯主傷寒寒熱出汗中風面目腫傷寒骨肉痛喉痹不通安胎歸目除肝邪氣安中利五臟殺百藥毒日華子云治天行時疾頭痛熱狂通大小腸霍亂轉筋及賁豚氣腳氣心腹痛食療云少食則得可作湯不得多食虛人患氣者多食發氣上衝人五臟悶絶為通利關節出汗故也切不得與蜜相和食之促人氣殺人薤味辛苦溫無毒除寒熱去水氣溫中散結利病人陶隱居云凡用蔥薤皆去青留白白冷而青熱也孟洗云不可與牛肉同食令人成瘕食療云骨鯁在咽不去者煮食之即下衍義云葉如金燈葉差狹而更光故古人言薤露者以其光滑難佇之義千金用治肺氣喘急亦取其滑泄也大抵此物葉如韭根如蔥江南閩浙之間絶少淮西河南北多有之瓜蒂味苦寒有毒主大水身面四肢浮腫下水殺蠱毒咳逆上氣及食諸果病胸腹中皆吐出之去鼻中息肉療黃疸陶隱居云甜瓜蒂也用早青者日華子云無毒治腦塞熱齆眼昏吐痰食療云瓜有兩鼻者殺人沉水者殺人食多腹脹可食鹽化成水病癥癖人不可食之石膏味辛甘寒無毒主中風寒熱心下逆氣驚喘口乾舌焦不能息除時氣頭痛身熱三焦大熱解肌發汗止消渴煩逆腹脹暴氣喘息咽熱藥性論云能治傷寒頭痛如裂壯熱皮如火燥出毒汗主通胃中結煩悶心下急煩躁和蔥煎茶去頭痛日華子云治天行熱狂圖經云止頭目昏眩痛赤石脂味甘酸辛大溫無毒主養心氣明目益精療腹痛泄澼下利赤白大抵此物能治大腸寒滑本經無別録有禹餘糧味甘寒平無毒主咳逆寒熱煩滿下利赤白血閉癥瘕大熱療小腹痛結煩疼藥性論云主治崩中芒硝味辛苦大寒主五臟積聚久熱胃閉除邪氣破留血腹中痰實結搏通經脈利大小便及月水破五淋推陳致新生於朴硝衍義云以暖水淋朴硝取汁再經熬煉減半傾入水盆中經宿遂結芒有廉稜者故其性和緩今按本經止言硝石朴硝而無芒硝芒硝有自別録以後經中何得用芒硝芒疑朴誤滑石味甘寒無毒主身熱泄澼女子乳難癃閉利小便蕩胃積聚寒熱通九竅六腑津液去留結止渴令人利中衍義云治暴得吐逆不下食代赭味苦甘寒無毒主鬼疰賊風蠱毒殺精物惡鬼腹中毒邪氣除五臟血脈中熱血痹血瘀大人小兒驚風入腹鉛丹味辛微寒主吐逆胃反驚癇癲疾除熱生於鉛陶隱居云即今熬鉛所作黃丹也藥性論云主治驚悸狂走嘔逆消渴日華子云涼無毒鎮心安神療反胃止吐血人溺療寒熱頭疼溫氣童男者尤良日華子云療血悶熱狂撲損瘀血運絶及困乏衍義云氣血虛無熱者不宜多服性寒故也婦人裩襠主陰易病當陰上割取燒末服方寸匕童女裩益佳若女患陽易即男子裩也陰易病者人患時行病起後合陰陽便相著甚於本病其候小便赤澀寒熱甚者是服此便通利按此與經文有同有異臨證者宜兩審以上二種本經皆無別録有白蜜味甘平無毒主心腹邪氣諸驚癇痙安五臟諸不足益氣補中止痛解毒除衆病和百藥養脾氣除心煩食飲不下止腸澼肌中疼痛口瘡明耳目色白如膏者良本經石蜜衍義云石乃白字龍骨味甘平無毒主心腹鬼疰精物老魅咳逆泄利膿血夜臥自驚恚怒伏氣在心下不得喘息止汗縮小便溺血養精神定魂魄安五臟藥性論云忌魚止夢泄精夜夢鬼交圖經云大抵此物世所稀有孫光憲北夢琑言云石晉時鎮州接邢臺界嘗鬪殺一龍鄉毫曹寬見之取其雙角角前有一物如藍色文如亂錦人莫之識曹寬未經年為寇所殺鎮帥俄亦被誅衍義云諸家之説紛然不一既不能指定終是臆度西京穎陽縣民家忽崖壤得龍骨一副皮體頭角悉具不知其蛻也其斃也若謂其蛻斃則是有形之物而又生不可得見死方可見謂其化也則其形獨不能化焉嘉靖癸丑余客邳之宿遷縣時淮泗大水河無岸際霜後水落河中新吐一洲上有龍骨一副頭角身尾全具居民驚異競渡取之人有以角半隻相貽者其色白形即枯骨舐之黏舌入藥用甚效竟莫知其所由姑録之以俟博識阿膠味甘平微溫無毒主心腹內崩勞極灑灑如瘧狀腰腹痛四肢痠疼女子下血安胎丈夫小腹痛虛勞羸瘦陰氣不足腳痠不能久立養肝氣出東阿陶隱居云出東阿故曰阿膠入湯微炙丸散須極燥陳藏器云阿井水煎成人間用者多非真也凡膠俱能療風止泄補虛驢皮膠主風為最圖經云今鄆州皆能作之以阿縣城北井水作煮為真造之阿井水煎烏驢皮如常煎膠法其井官禁真膠極難得都下貨者甚多恐非真尋方書所説所以勝諸膠者大抵以驢皮得阿井水乃佳耳今屬東昌府有小土城無縣治井如故仍官禁以古迹因名其城曰阿城膠則造時官取水至府煮作皮出自庫真膠民間難得如昔蔡氏書傳曰吳興沈氏言古説濟水伏流地中今歷下凡發地皆是流水世謂濟水經過其下東阿亦濟所經取其井水煮膠謂之阿膠用攪濁水則清人服之下膈疏痰蓋其水性趨下清而重故也豬膽味苦大寒主傷寒熱渴劉禹錫云通大便膚諸家本草無載此者文蛤味鹹平無毒主咳逆胸痹腰痛脅急雞子主除熱火瘡癇痙卵白微寒療目熱赤痛除心下伏熱止煩滿咳逆小兒下泄醯漬之一宿療黃疸破大煩熱陳藏器云雞子益氣多食令人有聲藥性論云液能治目赤痛黃治久瘧日華子云雞子鎮心安五臟止驚安胎治懷妊天行熱疾狂走及開聲喉忌蒜虻蟲味苦微寒有毒主逐瘀血破下血積堅痞癥瘕寒熱通利血脈及九竅女子月水積聚除賊血在胸腹五臟者及喉痹結塞圖經云木虻最大而緑色幾若蜩蟬蜚虻狀如蜜蜂黃色醫方所用虻蟲即此也又有一種小虻名鹿虻大如蠅咂牛馬亦猛三種大抵同體俱能治血而方家相承只用蜚虻他不復用淮南子虻散積血本經木虻蜚虻水蛭味鹹苦平微寒有毒主逐惡血瘀血月閉破血瘕積聚無子利水道又墮胎陳藏器云收干蛭當展其身令長腹中有子者去之此物難死雖加火炙亦如魚子煙燻經年得水猶活以為楚王之病也蜀本云採得用䈽竹筒盛待乾又米泔浸一宿後曝乾以冬豬脂煎令焦黃然後用之勿誤日華子云畏石灰衍義云畏鹽牡蠣味鹹平微寒無毒主傷寒寒熱溫瘧灑灑驚恚怒氣除留熱在關節榮衛去來不定煩滿止汗止渴除老血澀大小腸止大小便療泄精喉痹咳嗽心脅下痞熱藥性論云止盜汗治溫瘧土瓜根本經王瓜味苦寒主消渴內痹瘀血月閉寒熱別録一名土瓜療諸邪氣熱結衍義云其根即土瓜根也日華子云土瓜根通血脈治天行熱疾酒黃病壯熱心煩悶漿水味甘酸微溫無毒主調中引氣宣和強力通關開胃止渴霍亂泄利消宿食解煩去睡調理腑臟粟米新熟白花者佳煎令醋止嘔噦本經無別録鈔甘瀾水潦水二種本草皆無斗升合律呂之管十二皆徑三分有奇空圍九分而黃鐘長九寸以之審量而量多少則其容子谷秬黍千二百為籥十籥為合十合為升十升為鬥十斗為斛銖分兩以黃鐘之籥平衡而權輕重則其所容千二百黍其重十二銖分其半六銖為分兩籥二十四銖計四分為兩十六兩為斤三十斤為鈞四鈞為石銖則今之四分一釐六毫有奇分則今之二錢半也方寸匕匕匙也古用竹木今用銅其制正方一寸取抄散不落可重一分以為一服寸則以一黍為一分黃鐘長九十分分之十也以之審度而度長短則亦以黃鐘之寸生丈尺此黃鐘所以為萬事根本㕮咀言搗令大小適中其粒顆可以咀嚼之而有味也嘉祐本草謂凡酒湯膏藥舊方皆云㕮咀者謂稱畢搗之如大豆又使吹去細末此於事殊不允當藥有易碎難碎多末少末稱兩則不復鈞平今皆細切之較略令如㕮咀者乃得無末而又調和也傷寒論條辨或問問經何十二曰應十二辰數也曰六而本之三陰三陽者道生於三一陰一陽之推也是故言六則十二在其中言十二則五臟六腑四體百骸周身內外所有無一物不在其中矣經在人身中一定而不移無時而不然病發於人身舍經何言哉昧者不察但醉生夢死於傷寒傳六經之一語六經豈獨傷寒之一病為然哉病病皆然也又若小智則亦知一不知二舍手而言足愎彼而迷此殊不知人身之陰陽天地之陰陽也陰陽之在天地而於其升降往來進退消長之所以然者可容以一毫智故言哉手經之陰陽居人身之半足經之陰陽亦居人身之半若謂傳一半不傳一半則是一身之中當有病一半不病一半之人也天下之病傷寒者不為不多也曾謂有人如此乎有則是矣如曰無之則是自眯其目而謂人不見見不明不亦大謬乎孔子曰道之不明也我知之矣智者過之愚者不及也愚者之不及則亦已矣道固自若也大智如舜聞其好問而好察邇言用其中於民矣未聞何過也故惟小智一或過之非穿則鑿一鑿與穿百邪蜂起道何如哉雜矣亂矣晦塞矣厄矣道本乎天而曰厄矣天將謂之何天下可言哉後學君子達而明之上也未至於達不厭而勉焉次也勉而力不足寧畫可也無若小智焉不為斯道厄道之幸也天之慶也天下之望愚之日望也問素靈之言六經起於中焦手太陰肺陽明大腸次足陽明胃太陰脾次手少陰心太陽小腸次足太陽膀胱少陰腎次手厥陰心包少陽三焦次足少陽膽厥陰肝復從肝別貫膈上注肺傷寒論之言六經起於太陽次陽明次少陽太陰少陰厥陰兩不相同何也曰六經之在人身猶六合之在天地本無終始之可言素靈之起於手太陰肺一陰而一陽手而足足而手如此而終於厥陰肝又復注肺者蓋以血氣之在經道中流行而循環分拆不開無起止可言借肺以言始平人之常也傷寒論之起於太陽遍三陽而後歷三陰者蓋以風寒之中傷人人是通身四面上下皆當之其邪亦是如此而皆進然其進也有漸故次第人身外體之軀殼為三重第一薄外皮膚一重太陽所主之部位也第二肌肉一重陽明之部位也第三軀殼裡腑臟外匝空一重少陽之部位也如此一重一重逐漸而進三陽主表之謂也及其進里裡面內臟亦第為三層逐層亦是如此而漸上三陰主裡是也蓋經是各居其所的其各該所轄部屬方位之處所皆拱極而聽命的以邪之進也不由經道而在部位方所上超直而徑進故但提綱挈領舉六該十二以為言病情事實文字之權宜也二説之所以不同者各就事理以言其規則耳非謂必如此以為始終之定體也後人不肯以身體察只管在紙筆上拗氣譬如水底摸月形影不知空自紛紛鑿鑿千五百年來舉世若説夢豈不大為可笑大為可笑問太陽有綱有紀有目余皆不然何也曰經為綱變為目六經皆然也太陽一經緊關有始病榮衛之道二所以風寒單合而為病三三病之變證一百五十八故分三病為三紀以為各皆領其各該所有之衆目以統屬於太陽邪過太陽而交余經則榮衛皆不在論矣以榮衛自後皆不在論故皆即病於經但仍皆舉綱張目而省紀不須問經之為經一也太陽何獨分三治曰太陽一經猶邊疆也風也寒也風寒俱有也三病猶三寇方其犯邊之初南北東西隨其所犯御之當各明辨其方法譬如陸之車馬水之舟船有所宜有所不宜是故桂枝麻黃用之在各當其可夫是之謂道也余經猶服里四夷入服為寇則同隨在執之是已不在屑屑必以種類為別也問太陽篇中之言傳陽明少陽篇中又皆言轉夫傳則傳矣而又曰轉轉非回轉之謂乎曰非也二字皆當音去聲而讀囀傳是驛傳之傳轉是輪轉之轉傳轉無文六書之轉注字仲景之所以更互而迭用者蓋以明其合為一音義欲人思而得之之意也蓋風寒遍歷人身之六經正猶人行轉路而過處所耳後人不思只單讀傳為平聲如字而置轉於不理會此義不明妄鑿傷寒傳六經之謬説遂使雜亂紛然蜂起而聚訟卒致此書於閣置孽由此作也論語曰學而不思則罔注曰不求諸心則昏而無得嗚呼一人之昏禍延天下流毒至今為學而至此可不令人長嘆哉問傳轉皆讀囀此書之音義如此然則七傳間臟傳之傳與此音義異同何如曰不同七傳間臟傳是五臟自病病自內出蓋五臟有相生相剋之性能故以夫婦之相剋而有七傳母子之相生而有間臟傳正得父子相代而相傳之天然故曰傳流傳之謂也風寒本天之二氣於人病為外邪故其漸次經歷人身之六經有如轉路行過方所之委曲傳轉之謂如此其義自別何可以同言問素靈之起太陰而經以十二言固是言平人之常傷寒論之起太陽而經以六言則是言病時之變也惟其常故無議以其變故多口歟曰傷寒論之書本素問熱論之旨也熱論略傷寒論詳以略而言譬如八卦起艮之連山起坤之歸臟也以詳而言譬如六十四卦起乾之易也孟子曰前聖後聖其揆一也有能繼之者則皇極經世可得擬而有也世無堯夫故口多耳以多口言之譬如猩猩與鸚鵡囂囂諜諜安知其心不以為能出乎其類而自諒哉噫可慨也已問榮衛曰榮衛者三病始分之二道也二道明三方對則三病無餘治此仲景之所以聖也二道迷三方惑則雖三百九十七一百一十三猶以為未之足其鑿鑿之所以囂囂與未及六七日而風寒有不救者榮衛不明之罪也問傳轉曰傳轉者六經盈縮之璣衡也六經明則傳轉之機審傳轉昏則拘拘數日以論經此風寒之所以有治不治之分也已過十三日而有不愈者傳轉不明之罪也問兩感曰以虛者受病言之風寒之病表虛而病也表虛則裡實故曰熱雖甚不死然則兩感於寒而病必不免於死者蓋以表裡俱虛言也惟其俱虛故為不治仲景亦付之不論大羌活湯要亦不過存此活人之心云耳則可烏在能奈何兩感之萬一於可必哉然亦智者過之之一事近世以其自謂能治兩感而不察遂用之為通治風寒之套藥是又焉得不謂之愚者不及知之一叕邪問醫有內外內者何曰人是也外者何曰天是也知人而不知天知內不知外也知天而不知人知外而不知內也知天知人則知道矣舍天人而言內外者非道也謬也問風寒必自太陽而中傷而諸家乃有各經自中之説其説何如曰自中不在此中論此書之論論外入也以論外入故始太陽太陽者皮膚也皮膚之固護人身猶城郭之衛護治所經絡臟腑者譬如城中之百物耳寇盜雖強豈能不由城郭騰空犯內而傷人害物哉無是理也今以太陽揭中傷而言傳陽明更轉以互音義少陽言陽去入陰通章之大旨而玩味之則風寒浸進之實義昭然甚明又何必亂鑿叛經之剩説然則各經無自中邪曰非謂無也人病不外則內以內出言何可謂無中經中絡中腑中臟是也此書無此此義不明則自誤矣一有自誤則必誤人是故古之君子為學必專務實用其力於為已今人則不然欲求無誤難矣哉問條目中太陽中風陽明中風少陽中風三陰亦如此而歷言非各經自中之謂乎曰非也蓋謂中風矣初起證見太陽則謂之太陽中風明日又明日證轉見陽明而少陽則又謂之陽明中風少陽中風三陰亦如此傷寒亦如此蓋此書通篇大義是自首貫串至尾一氣説下來脈絡分明無有間斷與諸家零零星星一節一意不相聯屬者不同學者務要瞻前顧後徹首徹尾反來復去千遍熟讀沉潛深思則義理自見自然有得洪範曰思曰睿睿作聖思是聖學工夫為學不可不思問説者皆在中傷感冒上認病辨輕重諸説孰優曰中傷是素靈互用之二字兩感是熱論推病之轉語冒是吳俗之常談認病當如嘗酒醇醨美惡只可在水米麴蘖中理虛實不當向醟篘漉上清滋味問先夏至為病溫後夏至為病暑曰暑必小暑令行而氣至小暑在夏至後一氣故謂夏至前猶是溫言春氣未全除也夏至後始是暑節令已行也然自意為醫以來溫變為瘟暑為寒寒遍四時瘟滿天下夏之至不至無復論矣欲生民之命各不失其正其可得乎問天有六氣風寒暑濕燥火風寒暑濕經皆揭病出條例以立論而不揭燥火燥火無病可論乎曰素問言春傷於風夏傷於暑秋傷於濕冬傷於寒者蓋以四氣之在四時各有專令故皆專病也燥火無專令故不專病而寄病於百病之中猶土無正王而寄王於四時辰戌丑未之末不揭者無病無燥火也條目中理會自見問虛者受病衛中風也而曰榮虛何也曰風之中也本榮實而衛虛也風既中矣則衛實而榮虛矣虛以對實為言衛家本虛得助則實榮家本實無助反虛故醫家之言虛實凡虛皆正氣虛凡實皆邪氣實非別家泛言虛實之可比也經曰邪氣盛則實精氣奪則虛又曰入者為實出者為虛此之謂也問經之用方皆言主之後人則云專治兩意同否曰不同主之者示人以樞紐之意也專治則必人以膠柱矣問桂枝辛甘大熱經之用其取發散為陽之義歟曰中風發熱汗出衛不固而表疏發散何取哉然一則曰發汗二則曰發汗何也曰經不云乎桂枝本為解肌又不云乎汗不出者不可與也既曰本為解肌又曰汗不出者不可與則豈發汗之謂哉桂枝有固衛之良能解肌乃中風之奧義妙不可言也然則發汗者果為誰也曰熱粥也妙在此也韓信以死地與士卒得效死之士卒而收背水之功仲景以汗法與熱粥得逼汗之熱粥而成桂枝之效醫道與將道通也非天下之至神其孰能與於此謂桂枝難用者曾知此乎噫仲景遠矣可以與之語夫此者誰哉賈生有言可為長太息者此也問桂枝本為解肌而一則曰發汗宜桂枝湯二則曰發汗宜桂枝湯何也曰風之為病外邪也故於其初也法曰常發汗然汗既自出也衛行脈外故曰本為解肌發汗以例言發語之辭也解肌以義言核實之謂也故曰解肌乃中風之奧義妙不可言也學者能了悟桂枝發汗解肌之義例則於入此書之道已過第一關隘矣不患不升堂入室也謂桂枝難用與凡類集桂枝湯方於已之傷寒門謂為有汗傷寒之治者徒知桂枝發汗之例何嘗知其解肌之義哉問𠘧𠘧曰幾自説文以來皆言鳥之短羽者不能遠飛動則引頸𠘧𠘧然故仲景取以形容病人之頸項俱病者俯仰不能自如之貌肖峰吳氏六書總要文如此注鳥飛遠影蓋有據也然此以訓釋仲景書故但從舊説而於文之是非注之得失則皆不論問風土之異東南偏暖西北偏寒故説者謂東南之人不病風寒偏病暑濕西北之人不病暑濕偏病風寒其説然否曰難以此拘也靈樞謂夫天之生風者非以私百姓也其行公平正直犯者得之避者得無殆非求人而人自犯之然則四氣之所以為人病在人之自犯不自犯何如耳不在四氣之偏不偏乃爾也以犯而言則東南之人何嘗不病其東南之風寒西北之人豈可不病其西北之暑濕何也事有偶然機有不測理不可以一途取也今也必欲以偏言則淮南子曰胸奴出穢裘干越生葛絺各生所急以備燥濕各因所處以禦寒暑並得其宜物便其所故兵家有言朔陲積陰之野食肉飲酪其人理密故耐寒百粵多陽之地其人理疏故耐暑是其天性然也如此則是地雖限人以偏天則全人以性天地以生物為心而謂以其氣之所不能齊者適所以病人豈天地之自然哉亦過論矣且夫得氣之先莫如禽鳥以燕雁同有無之鄉言之彼此雖偏相差不甚相遠可知也乃若積冰不雪不青不毛之地此固判然天地之殊方異域偏之甚無過於此矣然而大禹聖人定千八百國解衣入裸無所不之賢如諸葛五月渡瀘深入不毛牧羝大窖中餐氈齧雪十九年而生還諸如此者雖履偏之甚猶且不病非有主不犯之明驗乎是故君子立言必以天下之常人所同有者明道以垂大中至正之教不作聰明騁奇僻誕浮泛以鑿無馮之濫説經曰知犯何逆隨證治之知犯何逆以法治之蓋謂知是風則以風治之知犯寒則以治寒之法治之明知是三陽主犯則治以三陽知已在三陰則治以三陰何嘗專東專西執南執北駕偏言以惑亂天下後世哉故世稱聖言其正也問太陽與少陽並病以眩也故刺肝俞以冒也故刺肺俞夫膽與肝合故刺肝俞所以瀉少陽也而肺非膀胱之合膀胱之合腎也不刺腎俞而刺肺俞何也曰東方肝木其臟則實其俞可刺而況在少陽之眩乎腎居北方其臟屬水其官作強有虛無實有補無瀉不可刺也然腎生氣肺主氣膀胱必氣化而出且肺為相傅之官放不可刺之腎而曲暢旁通其治於肺焉至德要道也精微之妙學者不可不知問胃實曰胃廩水穀而幾死生膀胱主分清而關通塞實由熱燥而後結結由清分而後成分清在闌門論道曰胃實醫家多婉辭蓋道有經有權也可與語經而不可與語權惡足與語道哉故曰權者聖人之大用問背惡寒説者引經謂背為陽夫水冰地凍皸膚墮指而面獨不畏寒者以諸陽皆聚於面故也今背惡寒而謂為陽何病而至陰陽之乖戾有如此乎曰病在少陰少陰綴脊而屬背也以太陽之脈挾脊循背則背似可以陽言以腑為陽而居前臟為陰而麗背則背又不可以陽言矣天地以北為背北天地之陰方也故君主之位必南面重向陽也六書北肉為背北肉則違陽矣然則謂背為陽為其違之訛邪故曰經傳謂背為陽者其猶歷家謂日月為右旋之説與謂日月為右旋之説者有所取用而左其説也此背之所以為陽而惡寒也問風寒之病大勢未除藥補太早恐邪留不去似非治法所宜以五六日之間邪屬半表半裡往來寒熱正熾方用人參三兩其義何居曰表裡者人身之陰陽也往來者邪氣之出入也故曰入而並於陰則寒出而並於陽則熱人參何補邪固氣之物也是故主之以柴胡以其能除寒又除熱也人參固其氣不使其走進又走出也謂人參補藥者觀場之矮子徒聞人參之補名未見人參之補義也問陰陽易勞復孰輕重曰事雖兩端理則一致皆死道也易是不怕死復是不顧死無輕重可言經雖有治蓋欲令人於死中求活期一二於千百之意耳豈謂十全可必哉孟子曰知命者不立乎巖牆之下君子無輕生以自取可也問今人病風寒每多食復經何無食復曰有食禁矣又何復哉不出復者立法惟嚴不可玩也問平人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸一呼再至一吸再至呼吸是何處見行是如何行至是如何至曰一呼一吸是以診家言至是以尺寸言一至再至是以出入言越人法也先越人時十二經之至皆用也越人用他皆不用矣行是以經隧言三寸六寸是順循環而演推步也應九九而成八百一十丈者一晝夜五十度周身通該之具數也理貴得中過猶不及此虛實盛衰壽夭死生所以不能逃乎三指一按之下也問經隧與尺寸曰脈者血之府血之榮於人身猶水之行地中鑿地得泉不可謂水專在是血脈亦然經隧猶原泉而江河尺寸猶河之有洪泉之有瀑故在經隧則流而不息藏精而神不露所以行而有常在尺寸則動而不靜著靈而用以顯故至而可診然行者何常不至特俱隱耳至者亦豈不行但不兩見耳一之則不明二之則不是蓋一而二二而一並行不悖神化莫測此之謂道也問來去二字且如凡物之來也必轉身回頭才好去及其去也亦必轉身回頭才好又來脈之一來一去可是如此否曰不來不去無以言至來去者所以明至也至是個活字來去極要看得活脈道譬如江河血譬如水氣譬如風來去至止譬如波浪水淺風小則波水深風大則浪江河只是波浪大海必定起濤人大脈大人小脈小同此理也腎脈重十五菽亦濤也人所同也十二經皆有動脈難經開卷第一語然則十二經皆至不獨尺寸也三難曰關之前陽之動也關之後陰之動也如此則是以動字互至字讀則通來去至止皆容易明白大抵看脈家書要當求作者之精微於言語文字之外才可不然損至亦是至厥厥動搖亦是動於此等不以意逆而體貼詳細只管尋章摘句而咬文嚼字若之何其可以了了於胸中乎問呼吸者脈之頭也頭訓頭緒何也曰脈無頭尾可言頭緒俗謂頭腦是也蓋脈之所以為脈由人之一呼一吸使之而然而呼吸之所以為呼吸者要皆無非陰陽二氣屈伸舒斂以神其用而為之也然氣無常用概而言之則盈虛盛衰呼吸亦因之而更變極而言之在則有呼吸而人以生去則呼吸亡而人以死故曰呼吸者脈之頭也此語極精顧人味之何如耳脈經無吸字以無吸字只就呼者脈之頭也而觀之似覺不費解些然精詳少一吸字則非仲景語便看得出來了叔和於此處不檢點可見叔和不過只好做得個叔和而仲景畢竟到底還是個仲景一毫也不錯問仲景曰聖賢之生不偶然也本草作而醫道興有農氏以生民之疾病為己憂者天啓之也是故有本草則必有素靈有素靈則必有難經有難經則必有傷寒論何也曰天以斯道濟斯民必生若聖若賢者先後開繼符合若一以全其成也説者謂軒岐為托是蓋意其有所不屑而於斯道小視云耳孫思邈曰不知大易不足以言醫程子曰五經如藥方春秋如治病用藥醫可小云乎哉治道也竊嘗思之素靈之書有自文字之始其來久遠若謂八十一篇之中有無弊雜誠不可知而曰渾不出於帝伯君臣之問答則開物成務之微言非聖非賢必不能有此其初也仲景生於漢季發身孝廉則其所以為仲景可知矣以宗族二百餘口不十年而死者三之二傷寒居其七以著論嗚呼斯時也傷寒何如是其多邪建安去上世千餘年矣有法無方道未備也醫於此時者謂不冥行索塗邪此仲景之書所以證如此者名曰中風曰桂枝湯主之證如彼者名曰傷寒曰麻黃湯主之傳病如此治如此方變證如彼治如彼方托論傷寒以名書實經綸斯道錯綜條貫之本末畢舉開示後學以為斯道之日星吃緊繼素難而作也非天啓邪方其去長沙而上手京師非由其不忍當日生民不得其正命之心而發邪則其本諸身者無非天德之良故其措諸事業而所以繼述墳典者一皆皇道之正此其所以聖當時祖百代賈生所謂不居朝廷者至是而愈足徵焉素難以下一人而已朱子曰天不生仲尼萬古如長夜唐子西嘗於郵亭梁間見此語由此語而觀之則凡行道之人無有不知孔子之所以為孔者可知也愚每讀此書蓋嘗竊嘆天不生仲景萬病如黑漆耳醫門孔子之稱不有以哉故曰儒必孔子正為儒必宗孔子醫必仲景正學醫必宗仲景儒而不宗孔子儒名而墨行者有之醫而不宗仲景醫名而賈事者紛紛然也嗟乎今之時去仲景之時益遠矣鈐捶活人類證纂要賈炫以泛濫於天下人各以意為醫而仲景之道不盡湮沒者徒此虛文籲醫可以意言哉大學之道以誠意貫終始朱子曰正意不可無邪意不可有今之所謂意者果何如其意邪願矣鄉人之所願也君子之所願哉昔者楊墨之説橫流乃所願則學孔子者孟子一人卓然之意如是也愚雖不敏竊嘗願學孟子之所學矣以疾厄奪因願學仲景是故條辨者願來學學仲景之愚意也問傳謂以宗族二百餘口不十年而死者三之二傷寒居其七乃著論然則假使當日張氏之宗族不如此則仲景之論亦著否曰圖出而卦畫書出而疇敘麟出而春秋作者道在聖人聖人所以有神物之感也不然南人不夢駝北人不夢象神無所交也蓋天生聖人而寄之以道所以聖人一感一動無非天理之自然故其文之著猶天之垂象自夫人之見之雖有多得少得之不同而其立教垂範之所以然者則有以通乎百世而無弊此聖人之所以為聖人也是書之著不猶是乎想當張氏宗族之不幸時天下之不幸有如張氏之宗族者殆不知其幾何也本草之經述矣論不著乎道未備也傳家以張氏之宗族為仲景之感愚為仲景之感必有非傳筆之所能盡知者而不如此其拘也何哉宗族之不幸則宗族之不能知仲景可知也宗族之不能知則天下之不能知亦可知也悲夫有仲景如斯而宗族天下之不能知則天下與宗族之不得其正命宜若一也而謂感此而寂彼豈知仲景之所以為仲景者哉然則論也者道本乎天天下萬世之攸系也不可以不著也知此則仲景之所以為仲景者可求而得也嗚呼安得有求仲景之所以為仲景者吾與之共論此問嗇嗇淅淅惡風惡寒如何辨別曰嗇慳吝也惡寒者譬如慳吝嗇細懼事之人恁的常常怯怯然畏惡也淅淅米也孟子接淅而行是也惡風者譬如裸體之人被人卒然以水灑淅於身驀地驚恐恨恨然畏惡也然特迎風動扇則如此間靜坐臥則不惡此二者所以有大同小異之分也一而言之乃當在太陽時事過太陽則無此矣問合併曰六國合從秦並六國六國不並秦不合理勢之必然也知此則知合併之義矣問讀傷寒論曰當如程子朱子教人讀論語法然今人之醫置此書於不讀也久矣久矣置此書於不讀而謂醫門有人可乎問醫道曰道者日用事物當然之理也理在事物是故君子不能外事物以言道醫之事物治病用藥是也窮藥病之理核藥病之實病與藥對藥到病解醫家日用常行之所當然此之謂道也精此則神明此則妙外此而談神論妙者要皆不過渺茫臆度而無捉摸譬之無根之木無源之水何足與言道之所以為道哉夫是則所謂理之所自出者安在可得聞乎曰人之理在脈脈之理在難經不讀難經焉知脈道病之理在素靈不讀素靈焉知病道藥之理在本草不讀本草焉知藥道然則傷寒論云何曰以上言之各一其道也以此書言之總其道而會其全也故傳曰古今治傷寒未有能出其外者以書之名言也豈惟傷寒哉又曰扁鵲倉公無以加之者以盡道言謂倉扁雖神其道未易求而此書之道可求也由此觀之欲求醫道舍此何之問醫務曰醫務莫要於務實實謂何不虛是也實有諸己實見得病真實用得藥對切切實實平平正正做將去一毫不虛假實不期神而實自神實不求妙而實自妙乃若指天説地稱神道妙者是猶畫道然耳何也畫家多不好畫眼前物件爭好畫鬼畫龍畫鬼畫龍者欺人所不見易神易妙而易售也以眼前言之近小簡易莫如瓠𤬛即使奪化之工為之止不過模舊式描得出兩個扁扁圈子相纍耳置一渾淪圓瓠𤬛質其旁而責之畫雖金陵壁手莫不縮項努目張口吐舌斂手避席不能奈何倣佛於毫釐矣故曰依樣畫瓠𤬛何以不得病情影向而尋虛尋補言之非畫龍畫鬼何要皆謂之不切實非邪然則切實當何如曰醫醫人也傳曰道不遠人又曰道不離日用間今也只在俯仰天地間寒溫冷熱中尋常眼面前穿衣吃飯上著實備細跟尋然後質之先聖之格言不復迷惑於淫邪之虛妄如此而若謂不得實竊敢言斷斷乎無此理斷斷乎無此理問醫病曰醫病莫大於病鑿鑿謂何曰天生萬物莫不各皆賦之以事有此物事則有此道故曰道本乎天天者理也自事物之得於理之所固有者而言之莫不各皆無餘無欠無虧無剩而各成其自然而然是故決不可不循此自然而然者以行之於日用事物之間而後可以言道加之毫釐損其絲忽差失其所當然移易其所以然要皆道之鑿也故曰一本萬殊之謂道至善之謂道大中至正之謂道醫之有道自本草素靈難經傷寒論淵源而來數千年矣世遠人亡經殘教弛正學失傳愚者不及知則亦已矣乃智者知之過則有厭常而喜新增多以為高改古以翻今好奇而立異作聰明騁私曲支離破碎譸張為幻者出而道於是乎鑿鑿然矣嗚呼鈐非邪之首鑿之魁邪活人不佁鑿邪類證巫鑿也捶綱漫鑿也例逆鑿也賦禬鑿也注解僕妾之鑿耳何足以與鑿例至若多鑿紛紛鑿以誤鑿鑿鑿相尋者難以枚數淮南子曰今釋正而追曲背是而從衆是與俗儷走而內行無繩習鑿之謂也醫而至於習鑿生民之命縣之鑿手言之可不痛心然心此則愛愛則仁仁則非道不行此道之所以道也不則忍忍由徇己己則何所不至不流於鑿不已也此鑿之所以鑿與蓋事無兩適出乎此必入乎彼出乎彼必入乎此此近時之醫所以又有鑿燥為糙者出也夫燥掃音也鑿之為糙不陋甚乎醫之風頽矣後學君子苟志於道當先正此頽風夫然後茲則庶乎其可也問任醫曰任醫如任相相受天子九錫之榮而司天下萬民之命當正大體不當親細務是故進退百官調和鼎鼐燮理陰陽其要在於公天下之賢才察識其所能而器用之於天下以天下利天下焉爾天下無虞則修禮樂以和樂之設有警焉則整干戈以戡定之斟酌前代之成法而損益以因革之不作聰明以生事於承平不為貪鄙以幸禍於危亂論語曰危而不持顛而不扶則將焉用彼相不知此不足與論任醫之道問治病曰治病如治寇寇為天下害不治則禍亂不息鼠竊狗偷一擊或可若夫雲集而烏合蜂屯而蟻聚其勢至於據險守僻稱名僭號者豈等間師旅所可驅除哉要必雄軍大將堅甲利兵搗穴破巢梟渠磔傑收功端在於擒王王擒而天下之事定矣卒徒雖有逸者旋可息伏若拘拘惟卒是圖不殄元惡元惡既在禍亂終當復起離之上九曰王用出徵有嘉折首獲匪其醜無咎知夫此而後可與辨夫治病之理問用藥曰用藥如用兵兵非可玩之器文修武備盛世長策無事而動不惟徒取費耗殆將啓釁招尤事不容已兵興師出我既為師彼則為敵大敵在前必察其情虛實真偽得其情而可以無疑矣毋驕兵以輕敵毋慢兵以失機順天時因地利率人和承物宜旗鼓嚴明士卒用命有定謀有成算整行陳飭奇正然後戰勝攻取可必不則憧憧禦敵其不敗也鮮矣易曰師出以律否減凶不知此不足與言用藥之義問立方曰立方如立國得國在得君當紛亂擾攘之時際臣佐使之會者苟非立國則無以安天下國不得君則國非其國矣蓋濟時主治人君自有一代之真非偽似者所可覬覦徼幸於其間也得其真則鼓行列陳可以收倒戈迎刃之功失其真則雖汗馬血兵不過徙為疽背噬臍之多事耳是故具正法眼者的知沐猴井蛙之不足與定禍亂也傳曰一正君而國定知乎此而後可與議夫立方之法問春溫夏暑秋涼冬寒者四時之令氣也而素問言四氣之所以為人病則曰春傷於風夏傷於暑秋傷於濕冬傷於寒夫冬夏之傷於寒暑無容議矣乃春則不以溫言而言傷於風秋則不以涼言而言傷於濕何也曰冬傷於寒春必病溫溫在病矣雖不言傷而傷在不言之中可知也且溫主生生則亦不可以傷言又可知也然四時皆有風何謂春獨傷曰四時皆有風唯春獨動動則萬物皆蟲生所以人亦傷也夏生飧泄何也曰風屬木木邪盛則土受害人身之土脾胃是也脾主化輸胃廩水穀飧泄者水穀利也古人謂水飯曰飧民間水飯用於夏長夏土令行木邪發而餐泄作者物盛必衰土敗木賊也秋何不以涼言曰盛夏酷暑爍石流金人如坐甑中得秋涼而解且涼主收彼方解而收不傷人可知矣故惟涼不傷人人故無涼病濕者何曰黃梅雨節五月則然土潤溽暑大雨時行長夏之令也於此不以濕言乃於秋氣至涼風生暑毒退水痕收天氣清地氣爽之時而曰傷於濕者人病不外則內以人身中之自內出者言也內出者何曰萬物至秋成物成人味厚味厚則痰多痰廣韻胸上水病濕莫濕於水水寒相搏則咳所以冬必咳嗽者以歲言之冬至子之半水泉動也若以日言夜分亦子之半亦水泉動也故人之病咳嗽者以歲計則冬半發以日計則夜分發應水泉之動而動也不然若以外入之濕言病發則當為腫為滿為脹為痛為痿為痹不當咳嗽也嗚呼道明必自物格始傳曰物格而後知至知至而後意誠故又曰誠則明矣然不誠則無物有何道可言哉問人皆曰醫者意也意可以言醫乎曰意可以入醫亦足以亂醫不可以言醫何謂也曰醫有道道本乎天意由諸己己則未免雜於妄天則誠而已故意正而誠乃所以造道邪而妄適足以害道不察害道之意而直指意以言醫是亦亂醫云爾烏可以言醫乎且意能害道不獨醫為然果齋李正叔曰自夫子設教洙泗以博文約禮授學者顏子曾子子思孟子相與共守之未嘗失墜其後正學失傳士各以意為學其務於該洽者既以聞見積纍自矜而流於泛濫駁雜之歸其溺於徑約者又謂不立文字可以識心見性而陷於曠蕩空虛之域儒之以意害道蓋聞其弊有如此矣醫自藥始於本草理原於素靈脈著於難經中正之道成乃剖腹則異於華祕方又奇於倉神農之家事蕪帝伯之大道塞人亦各皆以意為醫其務於阿世媚俗而以賈為事者則藉口於調胃補虛以悅人其好為索隱行怪而以詭炫售者則又放言謂通仙如神以自誕矜方玩法析治分科以相嫌隙先正謂醫與相通道而其所以壞則又相符如此儒尚且爾醫何足怪哉嗚呼是皆道之厄也儒之厄周程張子起而闢之於前朱子統而正之於後而後聖人之道如日中天今則鬱郁乎盛矣醫之厄仲景起方法一道大備論而正之方甫定仲景死其言未及韋而湮不奈曲學喪心懵經愎意鑿道營私論經則訛其傳而昧其轉是非莫辨致傷寒有七十二之妄言久道則以子代父而占世賢不肖殽使救敲之不暇者得以撒驕而自縱厄則極矣竊聞之物極則反信斯言也奚謂無挽邪天將厭其極則必有再闢者出出則此書者非再闢之璣衡邪故條辨之蓋亦庶幾有補於將來缺略之萬一云爾若夫刪繁剔誤是則幸望後賢問者俞俞爰付梓痙書敘余以魯鈍於醫初未學也慨自連困兩番喪內病皆起於中傷風寒遍求多醫治殊弗效致變俗謂虛怯竟墮不滿三十而短世前後若一兒女遭驚風歷殤者五厄苦慘痛悽悽無聊客遊淮楚值彼旱疫正熾適罹其災死信宿而重生重生者疫蓋素問熱病傷寒類也淮楚重治傷寒不輕用藥以故不藥而自死不藥而自生骨立而起起而髮膚悉更是豈偶然天也追思往事藥病之在道初以求道於人卒不得見聞人之有道既而聽命於天乃幸荷天之慶人固不能策功於道以直全正命於人天則乃爾曲全於我然則天之所以不欲我死必欲再造我以重生者留我之意莫非試我以警將欲畀我以致用於斯乎我苟不能仰體以俯而知之則不得與善事乎天者同日而語矣於是念念集斯道之大成聖古今而祖方法者在仲景乃購求其遺書僅得其金匱之略傷寒之卒病論皆世所閣置塵穢之殘煙啓而讀之凜凜然驚心駭目病歷多艱論皆顯印顧念幸生既得於脫死之後後若舍此而外慕遠求則亦不可以為能從事於求祥言矣庸是篤志專此鋭力憤敏涉苦萬端鬢霜而後豁悟默契潛通其言外之緒趣悔恨曾前俗謂之虛怯冤屬論中壞病之謬訛慚不可及矣乃汲汲揚煙滌穢條辨其顛倒錯亂疏其祲蝕重整成卷梓布有年以痙向未齊同實則二書之一事何謂邪病起太陽證惟強耳強而汗汗而濕濕而寒寒而痙寒痙者世俗之口頭語中庸之邇言甚易知也且痙因於多汗多汗因於血虛血虛惟兒家為最以未充也新産婦人次之以在蓐也大人間有以方剛也老者得無以既衰也今之驚風概是如此以此參求亦甚易明也昧者不察又不識強痙二字之名義更不省痙亡於痙亂一見有強懵懂鶻突便哆抽筋及至痙作捉摸不著又妄誕著駭倉卒揣摩不來遂濫謬驚風誣詭名而奪痙位汨沒天真冤命禍世害道釀厄因循至今千餘年矣我既感天之警覺幸見天則克全豫命以嗣諸後得諸己矣若或隱忍坐視諸人鉗口畏懦而不讜言則亦自負適所以為違天自棄咎不反歸我乎懼此更集是篇梓附條辨以報天命以申同倫以一體遐邇焉嗚呼是篇也書云乎哉我於書但好讀古人者耳我無書也曷敢直以書言借也文云乎哉我無文也曷敢驟以文言非也然則謂何曰無謂也蓋欲希望由是將來冤斯可雪禍斯可熄道斯可明厄斯可解則庶乎盡己可言而回天有待抑以張諸後此遙為鑿道造祅昏時惑世含血噴天以自汙之龜鑑云耳萬曆戊戌孟秋既望有執自敘痙書素問曰諸痙項強皆屬於濕痙音頸強上聲下皆仿此諸猶凡也痙廣韻風強病俗謂打寒噤是也項頸後也強筋脈牽強木徑而不和柔反拗而不順從受病之經其經之筋皆然濕則下文是也金匱曰太陽病發汗太多因致痙金匱痙皆痓叔和注痓當作痙今從之以便初學太陽病傷寒論曰太陽之為病脈浮頭項強痛而惡寒是也發汗本傷寒之治法而中風之治亦在法中其例一也太多者汗法以微似為度苟至於如水流漓而濕則過度而為太多也此舉傷寒而言雖不及中風與濕而中風與上文濕義具見言表可知矣致與下文變意同千金曰太陽中風重感於寒濕則變痙也中音衆寒濕者中風本自汗出出不已而至於如水流漓則與發之過多而濕濕而生寒其義一也上條舉發汗包自汗而言此舉中風該傷寒而言通前三條並而觀之文雖出於三家而風寒變痙之所以然者具見義則誠如互發學者最宜精玩痙自素問以來其見於傷寒論者乃叔和所述金匱之略也千金雖有此語未見其精悉自此以下無痙文字可稽近來鄉俗未聞曾有一人能言痙者雖醫亦然不但痙也強亦未見有能分曉者斯道之不明豈其遭痓訛誤以致如斯乎誠可嘆惜愚以兩娶五出一女四男皆殤於驚風遍觀兒醫之家驚風之論辭甚鄙野大都末流之俚諺古無此等荒唐之説來歷不明其詳不可考疑憾數年不能自釋既而偶病傷寒死信宿而重生感天有所警也改故業而致身仲景之門受讀金匱傷寒論憤力敏求私淑其旨趣寤寐其神妙以病時多艱印證二書條目心融意會恍如鑑對夢醒若有默迪在前難以告語人者見叔和痓當作痙之注憶病初項強𠘧𠘧之不能自勝念兒家口不能言之自苦豈旁窺側測之所能喻及大悟驚風之謬悉皆痙語之訛因集諸痙刷正警非別為次序如今竊案以候照對云金匱又曰太陽病發熱脈沉而細者名曰痙為難治傷寒論無為難治三字太陽者以太陽經所主之部屬皮膚言也皮膚為人一身之表表之為言外也風寒本天之二氣於人身為外物故其中傷於人必自外而內人之中傷之必皮膚先受起以病方在皮膚皮膚屬太陽故曰太陽病蓋舉大綱而言始以見周身之皮膚具病所包詳備辭簡而意周微哉旨也後人不察如諸家紛紛爭以經絡之一線而器訟豈不大謬發熱風寒之邪客於太陽與正交爭蒸而為熱也然病在太陽其脈必浮沉細者重感寒濕變也六經主病其各該所主之經絡部屬靈素自有章章明文道之原也凡病無有不屬六經者言病必稱六經古意原來如此仲景為方法之祖祖是道也末流不究騁以小智妄鑿非端求其己私無過務為矜誇炫售媒糵名利而已非為道也識者鄙之適所以見其弄巧賣乖叛經悖道徒自取垢招尤則亦竟成何益來學賢能切宜省戒太陽發熱具見上矣驚風論云治驚要識驚風痰熱四個字又自飾云小兒血氣虛弱虛則生熱熱盛生痰痰盛生驚驚盛生風風盛發搐夫既曰虛矣虛則無物無物如何生出熱來熱是何物如何又生得痰出來痰雖有形驚是著駭心之知覺神之感應耳無蹤迹可尋也痰如何駭得人生出驚來驚於自己且無蹤迹有何生出風來風雖寓形於動搐是如何動六書無搐義不可稽夫熱既無一毫實可言只是生於虛起從頭一直虛到底畢竟仍是沒來由虛空不可稽之搐結證天下有此事理乎然則人雖虛弱驚駭不致卒生妄熱肢體雖動不屬無稽之搐但卒感風寒太陽必當發熱變則筋脈牽強必痙可知以此言之驚之謬痓之訛大端明矣想當愎驚謬論之初謬家多應未讀仲景之書未睹叔和之注見病若然一則不知痙亡於痓二則不識強之名義只是必定個驚駭以為應當膠固誣在兒家身上更不思病情正理致妄謬端厄道釀禍至死不寤流毒至今痛惜兒家口不能言含冤莫雪豫甚哀之天既覺豫以警豫既覺之而不言其如與謬同歸何竊為此懼故不避僭以致吊如斯誠不得已也然虛之一字大抵弊在醫門其為不明久矣明而以正言者必也君子乎仲景以下惜乎豫未見其人也嗚呼不亦可慨也夫夫痙脈按之緊如弦直上下行緊則為寒如弦直上下行申釋上文脈經云痙家其脈伏堅直上下伏猶前沉細大意與上同蓋脈經乃叔和所述金匱乃仲景之書世謂叔和為仲景之徒以此觀之亦不為虛稱也金匱曰太陽病發熱汗出而不惡寒者名曰柔痙惡去聲下同此以自中風而變者言風為陽而屬木木性曲直故曰柔謂和軟也此與下文剛是反對驚風之慢此痙之柔也下皆金匱太陽病其證備身體強𠘧𠘧然脈反沉遲此為痙栝蔞桂枝湯主之𠘧音殊其承上指太陽也證備言頭項強痛汗出惡風寒具見也身體強太陽陽明合也𠘧𠘧者頸項俱痛俯仰不能自如也此互上條而出治驚風之抽掣搐搦不識此強而濫謬也栝蔞桂枝湯方栝蔞根三兩桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘上六味以水九升煮取三升去滓分溫三服取微似汗汗不出食頃啜熱稀粥發之此桂枝湯加栝蔞根之六物也湯義見傷寒論蓋擅固表之能神解肌之奧栝蔞根消渴而生津導濕以徹熱肌表解而濕熱徹強不待疏而疏自至矣太陽病其證備或惡熱項背強手足拘攣者痙也桂枝葛根湯主之此以太陽初交陽明言病在太陽則惡風寒交陽明則反惡熱太陽之熱翕翕陽明之熱蒸蒸拘攣拘束而蜷攣也庸俗不識強之所以為痙者狃於俚諺而文理字義之不明也桂枝葛根湯方桂枝三兩去皮葛根三兩芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘上六味以水九升先煮葛根減二升內諸藥煮取三升服如上法內音納此亦桂枝加葛根之六物也葛根者陽明經之的藥也以太陽初交陽明故用桂枝以加葛根經絡明而藥物對理意至而功效奏矣太陽病發熱無汗而反惡寒者名曰剛痙此以自傷塞而變者言寒為陰而屬水水寒則冰故曰剛堅徑也與上柔對舉而互發以見陰陽二義彼此兩相反而寓戒謹致勿誤之意學者不可不知然無汗不濕不濕何痙曰太陽強已微而內隱矣痙則強之發而外著耳驚風之急此剛之訛也太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之上上聲小便少氣上衝胸寒飲湧逆也口為脾之竅而胃脈夾口環唇噤脾虛胃寒而寒栗也欲作待作未作之意此亦互上條而出治夾音協葛根湯方葛根四兩麻黃三兩去節桂枝二兩去皮芍藥二兩甘草二兩炙生薑三兩切大棗十二枚擘上七味㕮咀以水一斗先煮葛根麻黃減二升去沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌麻黃散太陽之表葛根解陽明之肌桂枝主營衛之和則強自釋而痙自定矣病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也傷寒論病下無者字目下有脈字卒讀倉卒之卒反音板身熱陽明主肌肉也足寒陽不下也頸屬陽明項屬太陽急者強之甚時謂不常也三陽聚於頭面熱陰不生也赤表未解也太陽之脈挾脊循背反張者不柔和不順從牽強益甚也此蓋以痙之具證言亦風寒俱中傷之致變與凡久而至於劇者為然耳反張灼然在背驚風遠謬角弓則是忘其背而不知有其身知逐物而不知有道夫如是安得不鑿空而濫謬乎痙為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯齘音械胸滿即氣上衝胸之互文臥不著席亦反張之互詞也腳攣急脾陰主四肢而胃陽為之合陰陽不相順接而厥逆也必定然之詞齘者齒上下相抵之謂蓋胃寒變熱胃家實熱甚而不和也此謂齘齒驚風乃謬咬牙天生牙咬物何物能咬牙哉鄙俚不經無足道也且兒醫之家於痘既以咬牙為寒顫乃又授以為驚使之然豈不自相矛盾乎大承氣湯方大黃四兩酒洗厚朴半斤去粗皮炙枳實五枚炙芒硝三合本經無芒硝芒疑朴誤上四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一二沸分溫再服得下利止後服陽明主胃胃廩水穀為五臟六腑之海百骸藉養於斯而人之吉凶死生系焉故病凡入陽明而胃不和則無論輕重皆當先以和胃為要務承氣者和胃藥也胃凡不和以此和之皆得愈故古今通行和胃皆以之世固有懼其大黃毒而不敢行者殊不知本草大黃無毒而藥道之論良毒亦不在此蓋謂對病為良苟不對病雖良亦毒也然藥不自對對之者醫主藥而不主對醫云乎哉近時俗習爭言藥而不言對夫藥無非物也用之於病之謂藥對不言矣其如病何其如爭尚何謂道不在厄吾不敢允也噫可慨也已問曰新産婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新産血虛多汗出喜中風故令病痙去血復汗寒多故令鬱冒亡津液胃燥故大便難産婦鬱冒其脈微弱不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之三病雖殊其為血虛則一所以併為設一問答而同出方見傷寒論病解能食七八日更發熱者此為胃實宜大承氣湯此結上文三病而言以致慎余之意方見前想設問答之意其亦有所為而然與且以痙言之如今時之人絶無言此病者而言産後驚風者則紛紛然何哉只緣痙在亂亡人皆不識痙名又不識強字之義所以妄認筋脈牽強為抽筋而謾讕抽掣搐搦之謬夫以驚誣諸兒家兒家幼癡不能言誠難審理乃又以誣婦人而曰産後驚風婦人者以産育為任者也既産矣兒女在抱矣方幸慶慰天下皆稱賀喜喜不自勝矣何驚邪婦人雖愚懦不似兒家無知識也病雖惑亂不似兒家不能言也痙必作輟當其輟時有虛己詳細以審問之心誠求之無有不得其情者審得被駭則驚不為誣不駭則痙明而斯案定矣夫何難哉惜乎人固逞己傲物不屑如此耳雖然苟或此而不詳細則又不可夫風病下之則痙復發汗必拘急風必自汗表固虛矣下則又虛其里所以痙也仍復發汗以更虛其表是謂重亡津液拘急者津液重亡而強益甚也瘡家雖身疼痛不可發汗汗出則痙血熱則生瘡身疼痛者血澀不利乖而不和也汗者血之液發而迫使之出則血愈乖而愈不和傷之矣故亦致痙也傷寒頭痛翕翕發熱形象中風常微汗出自嘔者下之益煩心中懊憹如飢發汗則致痙身強難以屈伸熏之則發黃不得小便灸則發咳唾形象中風與傷寒論第九篇病如桂枝證異文同旨而互發故曰常微汗出以上三條皆通前申致叮嚀戒謹之意案成藏諸金𤵄以待越明年生今男三歲亦病驚風時值外出家人促歸困頓已二日啓𤵄照案急以寸匕灌之不待終劑應手立蘇而回生案斯對矣效斯驗矣嗣後慎斯法由斯道而行行皆若是周旋四十餘年於斯矣坦坦如也今老矣男有孫矣顧念天之所以與我不敢棄天條辨傷寒論時欲附此語痙濕暍篇中以彼此詳略不同未之及也茲以不敢忘宿念痛斯民斯道困於厄而不敢忍故訂案具書以申請當道君子詳允施行庶幾將來幸輔撥痓以弭其禍亂正經而反其風土底績平成風土平成而痓削痓削而痙復痙復而道明道明而厄解則於醫門雖未可以得仁言而於求仁之方實則不外是矣志仁後彥其勗之哉痙書或問問兒醫之家驚風之論其説何如曰鑿設耳鑿謂何曰此論乃鑿虛而起從頭至尾句句皆是生出來的説話理之所無不可稽也請申之其言曰治驚要識驚風痰熱四個字大意如此故其又自飾曰小兒血氣虛弱虛則生熱熱盛生痰痰盛生驚驚盛生風風盛發搐殊不知血氣之在人身虛莫虛於有生之初初生雖虛未聞即此便有生熱之説繼之以乳哺而不熱者乳血氣物也故資於乳哺而血氣生生而齒生生之徵也試可飲食而不熱繼之以飲食之養資於養而血氣充齒更髮長天癸至充之徵也三十而壯充而實也四十而強實而盛也物盛必反故五十則反衰七十而老此固人血氣虛實盛衰之自然不待安排至當不易之正理外此而言虛道實亂斯生矣夫虛則純而無邪無邪則異釁無自而端故自然而然如此謂虛則生熱有此理乎以熱盛生痰言之痰之為物與血氣俱靜則為養動則為病三者一也不偏有之與生俱生無時無有褚澄有言血枯死氣絶死痰盡死謂痰可治而能使之無不知死也謂生於熱熱無形痰有質有質生於無形亦無此理痰盛生驚驚盛生風風為何物而謂生於驚驚為何物而謂生於痰邪人當定而安靜則不驚必有事焉驟聞惡聲卒見怪狀則惕然猛驚茫然自失蓋見聞者感也驚應也所以感而應者心之知覺神之虛靈無蹤迹可尋也驚於自已且無蹤迹可尋而謂生於痰又能生得出風來理安在哉詳觀三者皆謂由盛而生熱則摸不著事故乃反駕説生於虛自相豫盾亂言若此不知生不知死而謂知醫可乎風盛發搐搐不出於六書六書無文義不可考而又蔓延抽掣與搦抽即掣也掣亦抽也物在器中拔而出之抽掣之謂也故世有抽籤掣籤之説國有抽分掣鹽之法人之肢體頂天立地病何如而何抽何掣乎搦是讜而按杜之之謂故械有讜衆軍有搦戰人至治所見讜衆則畏而不敢犯致師至敵陳見搦戰則持而不能騁其義一也戒嚴防間之謂耳不在動作上言何病而人之身溺何邪以此言之此論之無稽如此不謂之鑿將謂之何然則熱者何曰外入之病必起於太陽太陽之脈起於目內眥上額交巔入腦還出別下項挾脊抵腰中故病在太陽則其經之筋脈皆牽強而疼痛邪正交爭則發熱熱而自汗或發汗汗出過多則濕濕則寒寒則痙也所謂強痛者證則內隱事屬病者自省耳診家不審則未易覺察兒家無言察覺尤難鹵莽忽略則誤在此矣驚風之異不端於此乎逮夫頭搖手徑乃痙而外著也識見不真則抽掣之祆不造於此乎卒口噤腳攣急痙著而甚也目邪心亂則搐搦之怪不罔兩於此乎背反張痙甚而危殆也指鹿為馬則角弓之水底月不倒影於斯乎孰知強者痙之機痙者強之劇痙在廣韻注風強病強在六書強之省文居良切則平聲弓有力也故從弓從疆聲也又疆界也渠兩切則上聲木徑而不和柔反拗而不順從也又弓之反拗而張也強痙音義如此太陽病之證亦如此仲景用之誠如此本始於素問淵源固如此千金略之而未詳道猶垂於一線綿如此金匱言背而不言角弓病不在弓而弓義具背幌然盎於不言中所以皆指見在之實無論男婦大小之言道本一視同仁可推此則仲景之所以仲景也嗚乎仲景歿痙亡於痓而此義不明此義不明而斯道晦斯道晦而驚風之亂起亂起而兒家之禍興禍興而角弓之炫售角弓一不是人身二不病此病三又不在目前抽掣搐搦事理皆不可求論之鑿不妄何啻妄哉不盲乎醫婦人者盲以群盲鑿以習鑿而産後驚風之蘖突不順非而效尤暝行而索途何此屬易知易明而亦不審不察非後人之所以後人歟然則大人亦有此病否曰中傷風寒為病一也有無視汗多寡不均耳不可以無言在大人則病者亦不省診家皆不審不審則袖手捏譎不省則枉命銜冤舉家眛矇至今不醒余以幸荷上天試病之感身親經歷死而重生力致體究遂覺悟素匱言外之緒醞千金發而未白之躍如竊案候對兆報己子用經成效歷履有年顧惟異端之害不闢則墳典之道不行墳典之道不行則積昏之暗不曉以是不敢懷迷敬復修此梓告多方上以盡祈副蒼蒼之特意旁以期維挽滔滔之沉昏庶幾同心同好同歸正覺則同在同聚安知不至同際一休徵乎雖以鄙野質朴不文然扣鍾求聲蓋出於端本澄源之傾心也重明三古則在仰望賢智仁孝於將來痙書跋書以載道載而不醇則反害書乎哉醫家之書自本草素靈難經以至傷寒論方法具而體用備書少而義精道之原也末流紛紛汗牛充棟多遂橫少遂塞以橫之牽矯蹈附獵名媒利適所以成繩蠹祲氛而言之醇乎哉蓋不過徒為鑿鑿擾擾道愈昏而世愈惑雖多亦奚以為醫道與儒道通夫何讀儒家書三年則必有魁天下而名世之儒出讀醫書雖經世計未便見有醫之能良者出於其間為何如人焉儒難邪醫難邪世固有小視夫醫而以易易言者蓋亦未之思而云然爾愚於儒且憚不能今乃醫何也天既倓然以醫之道勉我我雖不敏不敢不勉也苟欲勉則凡在為道皆不可不勉而後庶乎可以能勉言是故痙有道帝伯仲景道之矣後人不道也而又反以驚風之妄謬害之禍世厄道不為不久矣此其醫之所以難也歟誠有所不能忍見者故敢申明其道而復書之以與知我者同從事於勉焉痙書之謂也萬曆己亥正月人日九龍山人方有執自跋
