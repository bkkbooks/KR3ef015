front:
  text: 後序傷寒論者仲景氏辨傷寒而論之之謂也傷寒何為而辨論也亂傷寒者中風並中風寒雜傷寒者溫病風溫霍亂本氣自病與凡痙濕暍皆與傷寒相涉於疑故一一條辨而例論之然後各皆始得分曉而不惑此傷寒論之所以作也然諸病之所以有待於條辨例論而後各皆始得分曉而不惑者以皆統於六經也六經各一經絡臟腑惟太陽獨多始病榮衛之兩途諸病論經論經者經辨而病明也傷寒與中風則於論經之中吃緊關係嚴辨又在太陽之榮衛蓋風則病衛寒則病榮風寒俱有則榮衛皆受而俱病太陽一也榮衛二而病則三焉此太陽所以分當嚴辨而與余經不同也過太陽陽明以下辨論乃得各歸於經所以自微而著自少而多剩徒法而以方法具備者計之籌其條目法則迤邐已三百九十七方則因仍已一百一十三然而法中乃有一則曰知犯何逆隨證治之之條二則曰知犯何逆以法治之之目法言若是豈非以其絲辨縷論積多若是猶不足以盡風寒之所欲論之謂邪噫仲景氏所以作論之心於此可以想見其萬一於言語文字之外矣曾謂非辨非論顧可以清雜亂而正傷寒之名實乎不能也是故傷寒不可以作經而但可以作論者其意不在此歟名雖曰論實則經也説者謂醫家之有此書猶儒家之有語孟蓋以其渾融該博曲盡精微恢恢乎足以股肱素難而為斯道之日星信矣然其舉綱振目經綸闔闢首尾條貫脈絡分明近則可以言倣佛學庸遠則可以議屬比春秋而法象乎易説者遺之似亦未可以言其全知此書之純粹也嗟惟文字去古未遠辭簡義奧讀而道其道者要皆不過模形範影蹤迹湯丸錯擇名利以求鑿柄於盲瞽之餘譬之樂師習包隱以治鍾鼓琴瑟節奏雖工求其所謂正六律諧五音通八風而能與天地同和者難言也叔和類集而編次之各為一篇獨於太陽分而為三一一以辨標其篇目夫既以辨標其篇目則論歸重於辨叔和已得之矣既分太陽為三篇則太陽一經歸重於三辨叔和已明之矣自今觀之各篇之中不合於辨者歷歷可指也而太陽三篇尤溷溷然無辨於三也似此編次徒賴叔和之名存豈復叔和之實在哉必由後之輕浮有如類證之輩者不諳論義不會辨意騁以卑陋計圖剽竊務為欺炫紛更錯亂顛倒變易法則斷股離肢方則裒多益寡將謂不如此不足以動衆惟徇私己罔解誤人然冠履倒置望者必駭薰蕕同爇嗅者必憎或出重輯亦未可知是以匡郭縱完而體骨終失遂使晚見狐疑卒致非全書之謬雖專醫之門咸置之而不讀夫以此書為非仲景氏之全書置而不讀彼業不在醫無足怪也以業既在醫亦視為非全書而不讀則其為醫也可得謂之全醫乎何不思之甚也於是斯文湮沒至道蓁蕪民膺斯疾幸邪不邪不敢必也竊謂此懼跋履山川冒蒙荊棘崎嶇南北東抵齊魯西涉川陝委志從正以趣明師期還叔和之故以通仲景之源風霜二十餘年顏黴鬢雪神其默迪一旦豁然徵之道途足成小試倦老思休歸田閉閣考衆本之殊同反離異而訂正一師友之授傳竊僭負為此集八經寒暑稿脫七謄深慚蛙吹玷荷驥附雖不足以合叔和之雅調而宣仲景氏之遺音至於溯流窮源欲伸長包隱而擬望六律正五音諧八風通天地和同底民物於康阜以上際唐虞之盛之心所以延頸企踵於任斯道之君子者未嘗有一息之不然此其所以寧負僭竊而不敢逃避也謹書揭簡以告同志云辛卯冬日長至歙靈山方有執書於溪南無逸所
