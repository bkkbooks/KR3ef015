body:
  text: 卷之五辨太陰病脈證並治第六凡九條方二陰經皆屬臟臟病不易治雖然治之得其道則反易愈由其不似陽經之數於變也三陰惟太陰之條目少者孤臟也然以大概言之首尾只病三陽而病者極多蓋太陽主表先太陽而病者常也天人之自然也各經之自中鑿說也無此事理也且三陽當病之時得治則愈又況一入陽明則不復轉所以病陰證而病者絶少臨病切要仔細端詳不可苟且忽略謠俗專以交口陰陽偶爾中傷執為陰證下醫又快售乃習迷而同醉遂致普通大謬數音速夫以病在三陽而謂之陽證病在三陰而謂之陰證非甚高遠難知也而徇俗者乃膠固執迷而不醒道之不明有以夫一太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬太陰脾經也其脈起於大趾之端上循膝股內廉入腹屬脾絡胃上膈挾咽連舌本靈樞曰是動則舌本強食則嘔胃脘痛腹脹身體皆重是主脾所生病者舌本痛體不能動搖食不下蓋脾為胃之合自利益甚者脾苦濕病而不能為胃以行其津液水穀不分也時腹自痛者靈樞曰足太陰之別名曰公孫去本節之後一寸別走陽明其別入絡腸胃實則腸中切痛是也胸下結硬者足太陰之脈其支者復從胃別上膈注心中故誤下則邪反聚其別也二太陰中風四肢煩疼陽微陰澀而長者為欲愈四肢四末也脾主四末素問曰風淫末疾是也陽微陽經無邪也陰澀太陰統血血凝氣滯也長陽氣勝也陽主發生故邪自退而病欲愈也三太陰病脈浮者可發汗宜桂枝湯浮為在表太陰之脈尺寸俱沉細今見浮則邪見還表可知然浮為風宜桂枝湯者以太陰之中風言也方見太陽上篇四自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩自利不渴濕勝也太陰濕土故曰有寒四逆之輩皆能燠土以燥濕故曰溫之也五傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實穢腐當去故也此條二節自不能發黃以上與陽明第四十一條上節同下節相反蓋同感異變而各成一家之證也然彼以至七八日反大便硬為轉陽明此以至七八日暴下利穢腐當去為脾家實何也蓋脾主為胃以行其津液暴下利則脾得以為胃行其津液矣所以脾為實而證為猶系太陰也彼大便硬者由脾不能為胃行其津液而反為約所以為轉陽明也然則一脾胃也而反覆之變不同有如此者醫之為道豈可以易易言哉六本太陽病醫反下之因爾腹滿時痛者屬太陰也桂枝加芍藥湯主之桂枝加芍藥湯方於桂枝湯方內更加芍藥三兩隨前共六兩余依桂枝湯法腹滿時痛者脾受誤傷而失其職司故曰屬太陰也以本太陽病而反下也故仍用桂枝以解之以太陰之被傷而致痛也故倍芍藥以和之七大實痛者桂枝加大黃湯主之桂枝加大黃湯方桂枝三兩去皮大黃一兩芍藥六兩甘草二兩炙生薑二兩切大棗十二枚擘上六味以水七升煮取三升去滓溫服一升日三服此承上條而又以胃家本來實者言本來實者舊有宿食也所以實易作而痛速故不曰陽明而曰大實例之變也桂枝加大黃者因變以制宜也然曰桂枝加則補方者當一例如上文云云不當載成方且以本方加也而用芍藥六兩水七升不合數皆後人之苟用者當斟酌焉八太陰為病脈弱其人續自利便設當行大黃芍藥者宜減之以其人胃氣弱易動故也此承上條申致戒謹之意九太陰病欲解時從亥至醜上亥子醜太陰所王之三時也欲解者正王則邪不勝也辨少陰病脈證並治第七凡四十六條方十五三陰先太陰者太陰正位中宮統倉廩也少陰居下而先於厥陰者陰道逆自下而上也一少陰之為病脈微細但欲寐也少去聲下皆同少陰腎經也脈微細者少陰居於極下其脈起於小趾之下也靈樞曰是主所生病者嗜臥但欲寐嗜臥也蓋人肖天地天地之氣行於陽則闢而曉行於陰則闔而夜故人之氣行於陽則動而寤行於陰則靜而寐然則病人但欲寐者邪客於陰故也二少陰病始得之反發熱脈沉者麻黃附子細辛湯主之麻黃附子細辛湯方麻黃二兩去節細辛二兩附子一枚炮去皮破八片上三味以水一斗先煮麻黃減二升去上沫內藥煮取三升去滓溫服一升日三服發熱邪在表也脈沉少陰位北而居里也以其居里邪在表而發熱故曰反也以邪在表不在裡故用麻黃以發之以其本陰而標寒故用附子以溫之細辛辛溫通於少陰用之以佐主治者以其專經而嚮導也三少陰病得之一二日口中和其背惡寒者當灸之附子湯主之附子湯方附子二枚去皮破八片茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服口中和謂不燥不渴里無熱也少陰之脈貫脊脊背呂也背字從北從肉北天地之陰方也北肉為背人身背陰之處也陽脈在背根陰之義也經傳謂背為陽者其猶謂桂枝發汗與夫歷家謂月行速之意歟腎居北方其行屬水生於天一故曰少陰然則陰寒湊於少陰宜乎背惡寒而他處不惡也灸之以火者火能助陽而陰自消也主之以附子者附子溫經而寒自散也人參甘寒補其氣以扶陽於生芍藥酸平收其陰而為陽之附茯苓甘淡淡以利竅逐水以消陰甘以入心順火以從陽術味甘苦苦以燥濕制水而燠土甘以益脾和中而固本也四少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也欲吐不吐心煩者少陰之脈循喉嚨其支者從肺出絡心注胸中故也自利者腎氣實水無制也虛故引水自救釋上文之渴也白寒色也病形悉具以其本病之口燥舌乾言也小便白者至末反覆申明上文所以曉人勿認煩渴為熱以致誤之意五病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利陰陽俱緊傷寒也傷寒不當有汗故謂汗為反出亡與無同古字通用無陽者汗乃血之液陰主血寒為陰而傷血陰邪湊於少陰陰盛矣故謂無陽以為之衛護而汗所以反得自出也咽痛者少陰之脈循喉嚨也其臟屬水所以不惟咽痛而復吐利水無制也六少陰病脈細沉數病為在裡不可發汗細沉而數裡熱也故曰病為在裡不可發汗惡虛其表也七少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之微者氣不充故曰無陽無陽則化不行故汗不可發也尺以候陰弱澀者陰血不足也故謂復不可下蓋少陰藏寒其官作強有出無入有虛無實有補無瀉所以汗下皆不可行而反覆叮嚀以示禁止如此八少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也少陰之脈從足走腹循喉嚨其支別至肺自下而上者也受火之劫火性炎上循經而蒸爍於肺肺傷則氣逆所以咳也下利者少陰屬水其臟虛寒劫迫則滑脫也滑脫而虛故生熱亂而譫語也強責謂過求也小便與汗皆血液也少陰少血劫汗奪血則小便之涸竭故難也九少陰病下利若利自止惡寒而踡臥手足溫者可治下利陰寒盛也自止寒邪退也惡寒而踡臥其臟本虛寒也手足屬脾溫者脾土和也土和則萬物生故曰可治也十少陰病惡寒而踡時自煩欲去衣被者可治惡寒而踡承上條而言也時或自煩欲去衣被陽熱復也猶之手足溫故亦曰可治也十一少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈緊寒邪也自下利脈暴微者陰寒內泄也故謂手足為反溫言陽回也陽回則陰退故謂緊反去為欲解也夫寒邪在陰而脈緊得自利脈暴微手足溫緊去為欲解者猶之邪在陽脈數而熱得汗出脈和身涼數去為欲愈之意同陰陽勝復之理也十二少陰中風陽微陰浮者為欲愈陰陽詳見二難三難陽微風邪散而表氣和也陰浮者裡氣勝而邪外出也十三少陰病欲解時從子至寅上子醜寅陽生之時也各經皆解於其所王之時而少陰獨如此而解者陽進則陰退陽長則陰消且天一生水於子子者少陰生王之地故少陰之欲解必於此時歟十四少陰病八九日一身手足盡熱者以熱在膀胱必便血也膀胱屬太陽太陽者六經之長也為諸陽主氣與少陰腎為合陰從陽化裡熱達表故一身手足盡熱也熱在膀胱太陽多血腎司開闔陰主下降故熱亂則血出於二便也十五少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治必動其血者汗為血之液不得汗則得血也或從口鼻或從目出者迫則錯經而妄逆也下厥以少陰居下而熱深言也上竭以妄逆言也十六少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯陰寒吐利法當厥逆者以無陽也手足不逆冷則陽自若而脾胃和故以熱為反發者婉詞也然陽自若則陰為有制脾胃和則五臟六腑皆得以受其氣而生也灸之者以其有可生之道所以通其經以遂其生也十七少陰病惡寒身踡而利手足逆冷者不治陰盛則陽竭故曰不治十八少陰病吐利燥煩四逆者死陰寒吐利而至於燥煩津液內亡而成枯竭也加之四肢厥逆脾土敗絶也十九少陰病下利止而頭眩時時自冒者死頭眩俗謂昏暈是也諸陽在頭然則下利止而頭眩者津液內亡而陰已虛竭陽無依附浮越於外而神氣散亂故時時自冒也二十少陰病四逆惡寒而身踡脈不至不煩而躁者死四肢溫和為順故以厥冷為逆不順也踡不伸也陰主屈故也諸證具見而脈又不至則陽已先絶可知矣不煩而躁孤陰亦欲自盡也二十一少陰病六七日息高者死息呼吸氣也嘆聲曰息言嘆息之聲高而散漫無接續生息之意蓋陽氣欲絶故其聲息如此二十二少陰病脈微沉細但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死脈微沉細但欲臥少陰之本病也汗出而不作煩熱無陽也欲吐經中之邪不退也自利臟病進也更復煩躁不得臥寐者陽欲絶而擾亂不寧也二十三少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也麻黃附子甘草湯方麻黃二兩甘草二兩炙附子一枚炮去皮上三味以水七升先煮麻黃一兩沸去上沫內諸藥煮取三升去滓溫服一升日三服無里證謂不吐利燥煩嘔渴也以無里證而表又不見故用附子以佐麻黃雖曰微發汗而用甘草以易細辛蓋亦和解之意也二十四少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之黃連四兩黃芩一兩芍藥二兩雞子黃二枚阿膠三兩上五味以水五升先煮三物取二升去滓內膠煬盡小冷內雞子黃攪令相得溫服七合日三服少陰本欲寐反心中煩不得臥者風邪客於裡熱甚而里不和也黃連黃芩清膈以除風擁之裡熱雞黃阿膠和血以益不足之真陰然阿膠者黑驢皮之膏液也故能逐陰經之邪風雞黃者巽木禽之誕卵也故能定邪風於少陰芍藥下氣以和陰所以為少陰風熱之佐使也二十五少陰病身體痛手足寒骨節痛脈沉者附子湯主之少陰腎也腎主骨寒淫則痛然則身體痛手足寒骨節痛者傷寒也沉為在裡是故附子湯者溫里以散寒之要藥也二十六少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之桃花湯方赤石脂一斤一半全用一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫服七合內赤石脂末方寸匕日三服若一服愈余勿服腹痛寒傷胃也小便不利下利不止者胃傷而土不能制水也便膿血者下焦滑脫也石脂之澀固腸虛之滑脫乾薑之辛散胃虛之裡寒粳米甘平和中而益胃故三物者所以為少陰下利便膿血之主治也二十七少陰病下痢便膿血者桃花湯主之古利無疒疒後人所加此比上條差輕以便膿血同故治亦同二十八少陰病下痢便膿血者可刺此承上二條而申著其輔治之意刺所以通其壅瘀也壅瘀通便膿血自愈可者僅可之詞二十九少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之吐則耗陽利則損陰厥冷者陰損而逆也煩躁陽耗而亂也茱萸辛溫散寒暖胃而止嘔人參甘溫益陽固本而補中大棗助胃益脾生薑嘔家聖藥故四物者為少陰扶危之所須也方見陽明篇三十少陰病下利咽痛胸滿心煩者豬膚湯主之豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和相得溫分六服下利寒甚而水無制也咽痛胸滿心煩臟病與經病具見也豬膚本草不載義不可考說者不一用者不同然既曰膚則當以燖豬時所起皮外毛根之薄膚為是但豬屬亥宜入少陰膚乃外薄宜能解外其性則涼固能退熱邪散而熱退煩滿可除也白蜜潤燥以和咽咽利而不燥痛可愈也白粉益土以勝水土王水制利可止也豬膚湯義意者其在於茲乎三十一少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯甘草湯方甘草二兩上一味以水三升煮取一升半去滓溫服七合日二服桔梗湯方桔梗一兩甘草二兩上二味以水三升煮取一升半去滓分溫再服咽痛邪熱客於少陰之咽喉也甘草甘平而陰陽故能主除寒熱桔梗苦甘而任舟楫故能主治咽傷所以微則與甘草甚則加桔梗也三十二少陰病咽中痛半夏散及湯主之半夏散及湯方半夏洗桂枝去皮甘草炙以上各等分以上三味各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煮七沸內散一兩方寸匕更煎三沸下火令少冷少少咽之咽痛與上同而治不同者此以風邪熱甚痰上壅而痹痛者言也是故主之以桂枝祛風也佐之以半夏消痰也和之以甘草除熱也三物者是又為咽痛之一治也三十三少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之苦酒湯方半夏洗破如棗核大十四枚雞子一枚去黃內上苦酒著雞子殼中上二味內半夏著苦酒中以雞子殼置刀鈈中安火上令三沸去滓少少咽下不瘥更作三劑服之咽傷而生瘡則比痛為差重可知也不能語言者少陰之脈復入肺絡心心通竅於舌心熱則舌不掉也聲不出者肺主聲而屬金金清則鳴熱則昏而塞也半夏主咽而開痰絡苦酒消腫而斂咽瘡雞子甘寒而除伏熱以上三條證同而治殊蓋各適其因之宜然爾三十四少陰病下利白通湯主之白通湯方蔥白四莖乾薑一兩附子一枚生去皮破八片上三味以水三升煮取一升去滓分溫再服少陰病而加下利者不獨在經而亦在臟寒甚而陰勝也治之以乾薑附子者勝其陰則寒自散也用蔥白而曰白通者通其陽則陰自消也三十五少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生蔥白四莖乾薑二兩附子一枚生去皮破八片人尿五合豬膽汁一合以上三味以水三升煮取一升去滓內膽汁人尿和令相得分溫再服若無膽汁亦可用尿與溺同奴吊切此承上條復以其甚者言脈微陽虛也厥逆無脈乾嘔煩者熱藥治寒寒甚者格拒而不入湯不為用反爭而逆亂也人尿性寒膽汁微寒以之為嚮導者經曰逆者從之此之謂也暴出燭欲燼而焱烈也微續真陽回而漸復也然屬加減耳成方疑後人所增三十六少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之真武湯方茯苓三兩芍藥三兩生薑三兩切白朮二兩附子一枚炮去皮破八片上五味以水八升煮取三升去滓溫服七合日三服腹痛小便不利陰寒內甚濕甚而水不行也四肢沉重疼痛寒濕內滲又復外薄也自下利者濕既甚而水不行則與谷不分清故曰此為有水氣也或為諸證大約水性泛濫無所不之之故也真武者北方陰精之宿職專司水之神以之名湯義取之水然陰寒甚而水泛濫由陽困弱而土不能制伏也是故術與茯苓燥土勝濕芍藥附子利氣助陽生薑健脾以燠土則水有制而陰寒退藥與病宜理至必愈後加減法或為諸證之治若咳者加五味子半升細辛乾薑各一兩水寒相搏則咳細辛乾薑之辛散水寒也既散矣肺主咳而欲收五味子者酸以收之也若小便利者去茯苓茯苓淡滲而利竅小便既利不須滲也若下利者去芍藥加乾薑二兩芍藥收陰而停液非下利者所宜故去之乾薑散寒而燠土土燠則水有制故加之若嘔者去附子加生薑足成半斤嘔氣逆也去附子以其固氣也加生薑以其散氣也三十七少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之通脈四逆湯方甘草二兩炙乾薑三兩強人可四兩附子大者一枚生去皮破八片上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈下利清穀手足厥冷脈微欲絶而裡寒者陰甚於內也身反不惡寒面色赤而外熱者格陽於外也陰陽不相通所以逆亂而有或為諸多證利雖止邪欲罷也脈仍不出陽氣未復也夫脈者血氣之道路血陰也非陽不行姜附辛熱助陽也甘草甘平益氣也湯本四逆而分兩殊通脈則加姜之謂後加減法同前面色赤者加蔥九莖面色赤陽格甚也加蔥通陽氣也腹中痛者去蔥加芍藥二兩腹中痛真陰不足也去蔥惡其順陽也加芍藥收陰也嘔者加生薑二兩見前咽痛者去芍藥加桔梗一兩咽痛氣結也去芍藥聚氣也加桔梗利咽也利止脈不出者去桔梗加人參二兩利止脈不出見上去桔梗者嫌其載而少暢通也加人參者生其陽而和其陰也三十八少陰負趺陽者為順也此承上文自利而言以示人通診吉凶利害之大意蓋謂少陰屬水其自利者以陰寒甚土弱而水無制也趺陽主胃而屬土負謂趺陽有脈土尚強土強則水有制而少陰反為輸負矣順言不以受制為拘也蓋水惟其有制則卒遵道不得終於泛濫而成大害且萬物資生於土而百骸藉養於胃水土平成物類又安非天下之至順乎古今謂趺陽有脈者不死有以哉三十九少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之四逆散方甘草炙枳實破水漬炙乾柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服分去聲上同人之四肢溫和為順故以不溫和為逆但不溫和而未至於厥冷則熱猶為未入深也故用柴胡解之也枳實泄之也然熱邪也邪欲解本陰也陰欲收芍藥收之也甘草和之也分今之二錢五分也後加減法同前咳者加五味子乾薑各五分並主下痢咳見前並主下利亦散水寒收泄氣之意悸者加桂枝五分心主悸桂枝通心氣也小便不利者加茯苓五分見前腹中痛者加附子一枚炮令坼腹中痛寒甚也附子溫之也泄利下重者先以水五升煮薤白三升煮取三升去滓以散三方寸匕內湯中煮取一升半分溫再服下重氣滯也薤白疏泄也四十少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之下利固乃陰寒甚而水無制六七日咳而嘔渴心煩不得眠者水寒相搏蓄積不行內悶而不寧也豬苓湯者瀉利以分清其水穀之二道也二道清則利無有不止者利止則嘔渴心煩不待治而自愈矣方見陽明篇四十一少陰病得之二三日口燥咽乾者急下之宜大承氣湯口燥咽乾者少陰之脈循喉嚨挾舌本邪熱客於經而腎水為之枯竭也然水乾則土燥土燥則水愈干所以急於下也方見陽明篇下同四十二少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣水腎邪青肝色腎邪傳肝也心下必痛者少陰之脈其支別者從肺出絡心注胸中也口乾燥見上故治同四十三少陰病六七日腹脹不大便者急下之宜大承氣湯腹脹不大便胃實可知急下者少陰屬水惡土實也四十四少陰病脈沉者急溫之宜四逆湯脈沉寒邪深入於裡也溫之不容以不急也方見太陽中篇下同四十五少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯飲食入口則吐少陰主喉嚨而寒邪客之也少陰之脈絡心注胸中實謂痰壅而上塞也寒以虛言溫有補意四十六少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之數音朔更平聲反少之少上聲微陽虛也澀血少也汗出陽虛不能外固陰弱不能內守也更衣見陽明篇反少者陽虛則氣下墜血少所以勤努責而多空坐也上謂頂百會是也灸升舉其陽以調養夫陰也辨厥陰病脈證並治第八凡五十四條方六一厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止撞陟降切蛔音回厥陰肝經也其脈起於大趾叢毛之上循股入陰中環陰器抵小腹消渴者飲水多而小便少也蓋厥陰屬木邪由少陰傳來少陰屬水木為水之子子能令母虛厥陰之邪熱甚則腎水為之消腎消則引水以自救故消而且渴渴不為水止也氣上撞心心中疼熱者心屬火木火通氣肝氣通於心也飢不能食者胃司食而屬土木邪甚土受制也吐蛔者蛔在胃中無食則靜聞食臭則出也下之利不止者邪屬厥陰下則反虛陽明陽明屬土土虛則木益賊其所勝也二厥陰中風脈浮為欲愈不浮為未愈風脈當浮以厥陰本微緩不浮故微浮則邪見還表而為欲愈可診不浮反不然三厥陰病欲解時從醜至卯上厥陰屬木王於醜寅卯之三時正氣得其王時邪退而病解在六經皆然夫以六經各解於三時而三陽解自寅至亥三陰解自亥至卯厥陰之解至寅卯而終少陽之解自寅卯而始何也曰寅為陽初動陰尚強卯為天地闢陰陽分所以二經同王其病之解由此而終始也然則三陽之王時九各不相襲三陰之王時五太陰與少陰同子醜少陰與厥陰同醜寅何也曰陽行健其道長故不相及陰行純其道促故皆相躡也四厥陰病渴欲飲水者少少與之愈厥陰屬木木生於水欲飲水求生也少少與潤之也愈木得潤則生也五諸四逆厥者不可下之虛家亦然四逆見少陰篇厥見下蓋厥為四逆之極陰陽既不相順接下則必至於脫絶故禁勿用也六傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死反音板應平聲反猶左也言不順於道也黃芩湯寒藥也徹亦除也應亦當也反能食者胃欲絶引食以自救也中以胃言死謂萬物無土不生也七傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也食以之食與飼同索當作素數音朔食以飼之也素常也謂以素常所食之餅餌飼之以頤其情也一說無肉曰素謂不令犯食禁也不發熱言所食之餅化消而無患故曰知胃氣尚在也暴熱謂厥而猛然得熱見陽回之意也故曰其熱續在期之旦日夜半愈也旦日明日平旦朝而陽長之時也夜半陰盡陽生之時也所以然者以下至夜半愈乃反覆申明上文之意數以候熱癰膿者厥陰主血血熱持久則壅瘀壅瘀則腐化故可必也八傷寒先厥後發熱而利者必自止見厥復利先厥起於陰也後發熱陽勝也見厥謂復厥也九傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹此承上條而言汗出咽中痛陽勝而熱上行也濕則痹咽中痛而曰痹者痰亦濕也厥以得濕為陽回故發熱雖無汗而利亦必自止便膿血亦協熱也十傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤應平聲厥者必發熱寒極而熱復也前熱者後必厥陽極而內陷也厥深熱亦深厥微熱亦微以大概言也厥應下之謂邪在裡也口傷爛赤厥陰之脈上與督脈會於巔其支者從目系下頰裡環唇內所以誤汗則熱散亂而唇口傷也十一傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈厥五日熱亦五日陰陽勝復無偏也當復厥不厥陽氣勝也陽主生故自愈可知也十二凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也此揭厥而明其義以申其狀案脈經流注手之三陰從腹走至手手之三陽從手走至頭足之三陽從頭下走至足足之三陰從足上走入腹然則手之三陰與手之三陽相接於手足之三陰與足之三陽相接於足陰主寒陽主熱故陽氣內陷不與陰氣相順接則手足厥冷也然手足為四肢王之者脾也脾為陰陽不與陰相順接而手足逆冷又可知也十三傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非為蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久痢方烏梅丸方烏梅三百個細辛六兩乾薑十兩黃連一斤當歸四兩附子六枚蜀椒四兩去汗桂枝六兩黃柏六兩人參六兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三稍加至二十丸禁生冷滑物臭食等脈微而厥統言之也膚冷言不獨手足以見陽氣內陷與上文互意也躁無暫安時言熱深且極也臟厥言非在經皆互詞也寒言尚未變熱也桂枝姜附細辛蜀椒勝寒而退陰也人參固氣當歸和血除煩而止嘔也烏梅之酸連柏之苦安蛔使之靜也蓋蛔之為物類有情識聞酸則伏得苦則安利本濕熱所以滯下得苦則泄惟酸能收故雖曰治蛔而下利膿血可通主也十四傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血熱少厥微邪淺也所以手足不冷而但指頭寒默默謂無言也不欲食厥陰之脈挾胃也煩躁則內熱故以小便利色白為熱除也欲食邪退而胃回也厥而嘔胸脅煩滿者厥陰脈挾胃貫膈布脅肋也便血肝不納也十五傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血邪在表則熱入里則厥厥少則邪散熱多則正復故病為當愈也熱不除至末與上條末三句互相發明十六傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也此反上條而言進謂加重也十七傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死灸所以通陽也陽不回故於法主死也十八傷寒發熱下利厥逆躁不得臥者死腎主躁不得臥臟氣絶也十九傷寒發熱下利至甚厥不止者死此與上條大意同二十發熱而厥七日下利者為難治厥七日而下利陽不復而裡虛也二十一傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也發熱而利裡虛邪入也故曰有陰汗出不止表陽外絶也故曰無陽二十二病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也關元在臍下三寸為小腸募故小腹滿按之痛不上結於胸陽虛也下結於膀胱關元者陰寒勝故曰冷結也二十三傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死濡音軟亡與無通腹濡邪在經而里陰虛也脈者血之府脈虛故知無血也血亦陰下之死者重亡其陰也二十四傷寒脈促手足厥逆者可灸之促謂短促陽氣內陷而脈不至故厥逆也灸通陽也二十五傷寒脈滑而厥者里有熱也白虎湯主之滑以候熱然而厥者熱本寒因故曰里有熱也與太陽下篇第十三條文相反而意則同互相發明者也故治同而方見彼二十六手足厥寒脈細欲絶者當歸四逆湯主之當歸四逆湯方當歸三兩桂枝三兩去皮芍藥三兩細辛二兩通草二兩甘草二兩炙大棗二十五枚擘上七味以水八升煮取三升去滓溫服一升日三服寒與逆同本陽氣內陷也細則為虛陰血不足也當歸芍藥養血而收陰通草細辛行脈而通閉桂枝辛甘助陽而固表甘草大棗健脾以補胃夫心主血當歸補其心而芍藥以收之肝納血甘草緩其肝而細辛以潤之脾統血大棗益其脾而甘草以和之然血隨氣行桂枝衛陽氣固則血和也若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之當歸四逆加吳茱萸生薑湯方於前湯方內加吳茱萸半升生薑三兩上九味以水六升清酒六升和煮取五升去滓分溫五服一本水酒各四升久寒謂宿昔素常臟腑有沉寒也吳茱萸溫臟以散寒也生薑者佐棗以和陰陽也二十七大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之大汗出陽虛而表不固也熱不去言邪不除也內拘急四肢疼者亡津液而骨屬不利也下利厥逆而惡寒者亡陽而陰寒內甚也四逆湯溫以散寒回陽而斂液者也方見太陽下篇二十八大汗若大下利而厥冷者四逆湯主之此與上同而較輕故治同二十九傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也漬資四切金匱曰水停心下甚者則悸然則悸為水甚而厥則寒甚也寒無象而水有質水去則寒消入胃者水能滲土也方見太陽下篇三十傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之麻黃升麻湯方麻黃二兩半去節升麻一兩一分當歸一兩一分知母十八銖黃芩十八銖葳蕤十八銖石膏六銖碎綿裹白朮六銖乾薑六銖芍藥六銖天門冬六銖去心桂枝六銖茯苓六銖甘草六銖上十四味以水一斗先煮麻黃一兩沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈唾吐臥切下部脈不至者邪乘下後裡虛深入而陽內陷也咽喉不利者厥陰之脈貫膈上注肺循喉嚨之後也唾膿血者肺金燥而痿也難治者表裡雜亂而不清陰陽暌而不相順接也夫邪深入而陽內陷寸脈沉而遲也故用麻黃升麻升舉以發之手足厥逆而下部脈不至也故用當歸薑桂溫潤以達之然芍藥斂津液而甘草以和之咽喉可利也葳蕤門冬以潤肺而黃芩知母以除熱膿血可止也術能燥土茯苓滲濕泄利可愈也石膏有徹熱之功所以為斡旋諸佐使而妙其用焉三十一傷寒四五日腹中痛若轉氣下趣少腹者此欲自利也腹中痛厥陰之脈抵小腹挾胃也轉氣下趣者裡虛不能守而寒邪下迫也三十二下利清穀不可攻表汗出必脹滿此申上條而致戒此條汗出與上條汗出不同上條以自出言此以攻之則出言上言已然者此言未然者脹滿可必者汗法則亡陽而陰獨治也三十三下利清穀裡寒外熱汗出而厥者通脈四逆湯主之下利故曰裡寒陰不守也外熱故汗出陽不固也通脈四逆救表裡通血氣而復陰陽也三十四下利腹脹滿身體疼痛者先溫其里乃攻其表溫里四逆湯攻表桂枝湯此承上而申致用治之次序腹脹滿裡虛也故溫之身體疼痛表實也故攻之惟虛也故必先之惟其實故可後焉四逆湯方見太陽下篇上皆同桂枝湯方見太陽上篇三十五下利譫語者有燥屎也宜小承氣湯既下利而曰有燥屎何也胃熱則屎燥若服湯不能和胃則徒利津液其燥屎固自若所以譫語也宜小承氣者厥陰易於下也方見陽明篇三十六下利後更煩按之心下濡者為虛煩也宜梔子豉湯更煩言本有煩不為利除而轉甚也虛煩並方見太陽中篇三十七傷寒下利日十餘行脈反實者死實言邪勝也三十八下利有微熱而渴脈弱者令自愈微熱陽漸回也渴內燥未復也弱邪退也令自愈言不須治也三十九下利脈數而渴者令自愈設不瘥必清膿血以有熱故也清與圊通脈數與上文微熱互相發明清猶言便膿血也四十下利脈數有微熱汗出令自愈設復緊為未解此與上二條互相發明汗出亦陽回氣徹也緊寒未除也四十一下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也諸陽聚於面少赤亦陽回也故曰戴陽鬱冒作汗也微厥邪正爭也下虛指利而言也四十二下利手足厥冷無脈者灸之不溫若脈不還反微喘者死喘言息短而聲不續陽氣衰絶也四十三下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死晬音碎晬時周時也此與上條互相發明四十四下利寸脈反浮數尺中自澀者必清膿血清與圊同寸反浮數者熱轉上逆也尺中自澀者熱壅而血瘀也四十五下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死下重謂滯下也大則病進微弱者邪氣衰也四十六熱利下重者白頭翁湯主之白頭翁湯方白頭翁三兩黃連三兩去須黃柏三兩去皮秦皮三兩上四味以水七升煮取二升去滓溫服一升不愈更服一升此申上條而出其治白頭翁逐血以療癖秦皮洗肝而散熱黃連調胃而厚腸黃柏者除熱而止泄也四十七下利欲飲水者以有熱故也白頭翁湯主之有熱謂亡津液而內燥所以欲飲水也方同上四十八乾嘔吐涎沫頭痛者吳茱萸湯主之厥陰之脈挾胃屬肝上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者復從肝別貫膈上注肺故靈樞曰是肝所生病者腹滿嘔逆然則厥陰之邪循經而上逆故其證見如此方見陽明篇四十九嘔而發熱者小柴胡湯主之小柴胡或為有嘔故通其治五十嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之脈弱雖似邪衰而小便復利則是里屬虛寒也故曰見厥者難治以身有微熱也故雖厥可以四逆湯得救其陽之復五十一嘔家有癰膿者不可治嘔膿儘自愈肝脈其支者上注肺肝主血善嘔血熱瘀與肺痿者皆為癰而嘔膿不可治者謂膿當嘔與邪逆而嘔者不同也五十二傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之乾薑黃連黃芩人參湯方乾薑三兩去皮黃連三兩去須黃芩三兩人參三兩上四味以水六升煮取二升去滓分溫再服寒格謂藥寒致成格拒也乾薑人參正治以遏其吐黃連黃芩反佐以通其格五十三傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也上條以藥吐下言此以水發汗言亦互明之意五十四傷寒噦而腹滿視其前後知何部不利利之則愈噦承上條而言腹滿即寒生䐜脹也前後謂二便也三條疑太陽中篇錯簡
